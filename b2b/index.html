<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal B2B | Crazy Fantasy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="banner-full-width">
            <img src="banner.png" class="banner-img" alt="Crazy Fantasy B2B">
        </div>
        <nav class="nav-bar">
            <div id="menu-categorias" class="menu-scroll-container"></div>
            
            <div class="header-right">
                <button onclick="toggleCarrinho()" class="btn-cart-trigger">
                    🛒 <span id="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main class="main-layout">
        <div class="titulo-sessao">
            <h2>🔥 TABELA EXCLUSIVA | DESCONTOS B2B PROGRESSIVOS</h2>
        </div>
        <div id="produtos" class="produtos-grid"></div>
    </main>

    <div id="carrinho-drawer" class="drawer">
        <div class="drawer-header">
            <h3>🛒 MEU PEDIDO</h3>
            <button onclick="toggleCarrinho()" class="btn-fechar-drawer">✕</button>
        </div>
        
        <div class="drawer-content">
            <div id="status-carrinho" class="status-container"></div>
            
            <div id="lista-itens-carrinho" class="lista-itens"></div>
            
            <div class="dados-nf">
                <h4>DADOS PARA FATURAMENTO</h4>
                <input type="text" id="razao" placeholder="Razão Social / Escola *">
                <div class="row-inputs">
                    <input type="text" id="whatsapp-cliente" placeholder="WhatsApp *">
                    <input type="email" id="email-cliente" placeholder="E-mail">
                </div>
                <textarea id="obs" placeholder="Observações ou Endereço de Entrega" rows="3"></textarea>
            </div>
        </div>

        <div class="drawer-footer">
            <button class="btn-finalizar zap" onclick="enviarWhatsApp()">
                ENVIAR PEDIDO VIA WHATSAPP
            </button>
            <div class="row-inputs">
                <button class="btn-finalizar pdf" onclick="alert('Gerando PDF...')">GERAR PDF</button>
                <button class="btn-finalizar limpar" onclick="limparCarrinho()">LIMPAR</button>
            </div>
        </div>
    </div>

    <footer class="footer-crazy">
        <p><b>GALVAO ARTIGOS PARA FESTAS LTDA (Crazy Fantasy)</b></p>
        <p>CNPJ: 54.128.539/0001-01 | Valinhos, SP</p>
        <p style="font-size: 10px; margin-top: 10px; opacity: 0.6;">© 2026 - Portal B2B Exclusivo</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
