<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy B2B</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<img src="banner.png" class="banner-img">

</header>



<nav class="nav-bar">

<div id="menu-categorias" class="categorias"></div>

<input
type="text"
id="busca"
class="busca-input"
placeholder="Buscar fantasia, peruca ou acessório..."
onkeyup="filtrarBusca()"
>

<div class="cart-icon" onclick="toggleCarrinho()">
🛒 <span id="cart-count">0</span>
</div>

</nav>



<main class="container">

<h1 class="titulo-sessao">
🔥 TABELA EXCLUSIVA PARA PARCEIROS
</h1>

<div id="produtos" class="produtos-grid"></div>

</main>



<!-- DRAWER CARRINHO -->

<div id="carrinho-drawer" class="drawer">

<div class="drawer-content">

<span class="close-btn" onclick="toggleCarrinho()">×</span>

<h2>Seu Pedido</h2>

<div id="status-carrinho"></div>

<div id="lista-itens-carrinho"></div>



<div class="dados-cliente">

<label>Razão Social / Nome</label>
<input type="text" id="razao-social">

<div class="dados-grid">

<div>
<label>CNPJ / CPF</label>
<input type="text" id="cnpj">
</div>

<div>
<label>Inscrição Estadual</label>
<input type="text" id="ie">
</div>

<div>
<label>Email</label>
<input type="email" id="email">
</div>

<div>
<label>Telefone</label>
<input type="tel" id="telefone">
</div>

</div>



<label>Forma de Pagamento</label>

<select id="pagamento">

<option value="">Selecione</option>
<option>PIX</option>
<option>Boleto</option>
<option>Cartão</option>
<option>Transferência</option>

</select>



<label>Forma de Frete</label>

<select id="frete">

<option value="">Selecione</option>
<option>Correios</option>
<option>Transportadora</option>
<option>Motoboy</option>
<option>Retirada</option>

</select>

</div>



<div class="menu-envio">

<button onclick="toggleMenuEnvio()" class="btn-enviar">

📤 Enviar Pedido

</button>

<div id="menu-envio-opcoes" class="menu-opcoes">

<button onclick="enviarWhatsApp()">📲 WhatsApp</button>

<button onclick="gerarPDF()">📄 PDF</button>

<button onclick="enviarEmail()">✉ Email</button>

</div>

</div>



<button onclick="limparCarrinho()" class="btn-limpar">

🗑️ Limpar Carrinho

</button>

</div>

</div>



<!-- MODAL IMAGEM -->

<div id="modal-img" class="modal" onclick="fecharModal()">

<img id="img-ampliada">

</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js"></script>

</body>
</html>
