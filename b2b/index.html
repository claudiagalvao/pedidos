<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Crazy Fantasy | Catálogo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS de emergência caso seu style.css tenha algum erro no drawer */
        .drawer {
            position: fixed;
            top: 0;
            right: -400px; /* Começa escondido */
            width: 380px;
            height: 100%;
            background: #0f172a;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            color: white;
        }
        .drawer.open {
            right: 0; /* Aparece quando tem a classe open */
        }
        .drawer-header { padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        #lista-itens-carrinho { flex: 1; overflow-y: auto; padding: 20px; }
        .dados-nf { width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        .btn-pdf-ativo { background: #ff00ff; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-whatsapp-ativo { background: #25d366; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; margin-bottom: 5px; }
        .btn-desativado { background: #334155; color: #64748b; cursor: not-allowed; width: 100%; padding: 12px; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="header-container" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #0f172a; border-bottom: 1px solid #334155;">
            <div class="logo">
                <h1 style="color: #ff00ff; margin: 0; font-size: 1.5rem;">CRAZY <span style="color: #00ffff;">FANTASY</span></h1>
            </div>
            
            <div class="busca-container">
                <input type="text" id="busca" placeholder="Buscar produto..." onkeyup="filtrarBusca()" style="padding: 8px; border-radius: 20px; border: 1px solid #334155; background: #1e293b; color: white;">
            </div>

            <div class="cart-icon-container" onclick="toggleCarrinho()" style="cursor: pointer; position: relative;">
                <span id="cart-count" style="position: absolute; top: -5px; right: -5px; background: #ff00ff; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px;">0</span>
                <svg viewBox="0 0 24 24" width="28" fill="white"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </div>
        </div>
    </header>

    <nav id="menu-categorias" style="padding: 10px; display: flex; gap: 10px; justify-content: center; background: #0f172a;"></nav>

    <main id="produtos" class="produtos-grid" style="padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;"></main>

    <div id="carrinho-drawer" class="drawer">
        <div class="drawer-header">
            <h3 style="margin:0">Seu Pedido</h3>
            <button onclick="toggleCarrinho()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer">✕</button>
        </div>

        <div id="barra-progresso" style="padding:15px; background:#1e293b">
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#94a3b8; margin-bottom:5px">
                <span>Mínimo: R$ 200</span>
                <span id="falta-texto"></span>
            </div>
            <div style="width:100%; height:8px; background:#334155; border-radius:10px; overflow:hidden">
                <div id="barra-fill" style="width:0%; height:100%; background:linear-gradient(90deg, #ff00ff, #00ffff); transition:0.3s"></div>
            </div>
        </div>

        <div id="lista-itens-carrinho"></div>

        <div id="formulario-fechamento" style="padding:15px; background:#0f172a; border-top:1px solid #334155">
            <input type="text" id="razao-social" class="dados-nf" placeholder="RAZÃO SOCIAL">
