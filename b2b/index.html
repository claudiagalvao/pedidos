<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal B2B | Crazy Fantasy</title>
    <link rel="stylesheet" href="style.css?v=35">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <header class="header-b2b">
        <div class="banner-full">
            <img src="banner.png" class="banner-img" alt="Crazy Fantasy B2B">
        </div>
        
        <nav class="nav-bar">
            <div id="menu-categorias" class="menu-cats"></div>
            <div class="header-right">
                <input type="text" id="busca" class="input-busca" placeholder="🔍 Buscar produto..." onkeyup="filtrarBusca()">
                <button class="btn-carrinho-abrir" onclick="toggleCarrinho()">
                    🛒 <span id="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main class="main-layout">
        <h2 class="titulo-sessao">🔥 TABELA EXCLUSIVA | DESCONTOS B2B PROGRESSIVOS</h2>
        <div id="produtos" class="produtos-grid"></div>
    </main>

    <div id="carrinho-drawer" class="drawer">
        <div class="drawer-header">
            <h3>🛒 Seu Pedido</h3>
            <button class="btn-fechar" onclick="toggleCarrinho()">✕</button>
        </div>
        <div class="drawer-content">
            <div id="status-carrinho" class="status-info"></div>
            <div class="barra-progresso-container"><div id="barra-fill" class="barra-progresso-fill"></div></div>
            <div id="lista-itens-carrinho" class="mini-lista"></div>
            <form id="form-pedido" action="https://formsubmit.co/lojacrazyfantasy@hotmail.com" method="POST">
                <input type="hidden" name="Resumo_Pedido" id="pedido-corpo">
                <div class="dados-nf">
                    <input type="text" name="Razao_Social" id="razao-social" placeholder="Razão Social / Escola *" required>
                    <div class="row">
                        <input type="text" name="WhatsApp" id="whatsapp" placeholder="WhatsApp *" required>
                        <input type="email" name="Email" id="email-nf" placeholder="E-mail *" required>
                    </div>
                </div>
            </form>
        </div>
        <div class="drawer-footer">
            <button type="button" class="btn-finalizar zap" onclick="finalizar('zap')">FINALIZAR WHATSAPP</button>
            <button type="button" class="btn-finalizar email" onclick="finalizar('email')">ENVIAR POR E-MAIL</button>
            <div class="row-botoes">
                <button type="button" class="btn-secundario" onclick="gerarPDF()">PDF</button>
                <button type="button" class="btn-limpar" onclick="limparTudo()">LIMPAR</button>
            </div>
        </div>
    </div>

    <footer class="footer-crazy">
        <p><b>GALVAO ARTIGOS PARA FESTAS LTDA (Crazy Fantasy)</b></p>
        <p>CNPJ: 54.128.539/0001-01 | Valinhos, SP</p>
    </footer>

    <div id="modal-img" class="modal" onclick="this.style.display='none'"><img id="img-ampliada"></div>
    <script src="script.js?v=35"></script>
</body>
</html>
