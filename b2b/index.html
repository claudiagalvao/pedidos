<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal B2B | Crazy Fantasy</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <header class="header-b2b">
        <div class="banner-container">
            <img src="banner.png" class="banner-img" alt="Banner Crazy Fantasy">
        </div>
        <nav class="nav-bar">
            <div id="menu-categorias"></div>
            <div class="busca-container">
                <input type="text" id="busca" placeholder="🔍 Buscar produto..." onkeyup="filtrarBusca()">
            </div>
        </nav>
    </header>

    <main class="main-layout">
        <section class="catalogo-section">
            <h2 class="titulo-b2b-destaque">🔥 Tabela exclusiva para parceiros | Descontos B2B progressivos</h2>
            <div id="produtos" class="produtos-grid"></div>
        </section>

        <aside class="checkout-section">
            <h2 id="tituloCarrinho">🛒 Pedido (0 itens)</h2>
            <div id="status-carrinho" class="status-carrinho"></div>
            
            <div class="barra-progresso-bg">
                <div id="barra-fill" class="barra-progresso-fill"></div>
            </div>

            <div class="economia-destaque">
                Economia: <span id="valor-economia">R$ 0,00</span>
            </div>

            <div class="checkout-scroll-area">
                <div id="lista-itens-carrinho" class="mini-lista"></div>
                <div style="text-align: right; margin-bottom: 10px;">
                    <a href="javascript:void(0)" onclick="esvaziarCarrinhoTotal()" class="link-esvaziar">Esvaziar Carrinho</a>
                </div>

                <form id="form-pedido" action="https://formsubmit.co/lojacrazyfantasy@hotmail.com" method="POST">
                    <input type="hidden" name="_cc" value="claus.galvao@hotmail.com">
                    <input type="hidden" name="_subject" id="email-assunto" value="Novo Pedido B2B">
                    <input type="hidden" name="Resumo_Pedido" id="pedido-corpo">
                    
                    <div class="dados-nf">
                        <h4>Dados para Faturamento</h4>
                        <input type="text" name="Cliente" id="razao-social" placeholder="Razão Social / Nome Completo *" required>
                        <div class="row">
                            <input type="text" name="CNPJ_CPF" id="cnpj" placeholder="CNPJ / CPF *" required>
                            <input type="text" name="IE_RG" id="ie" placeholder="IE / RG">
                        </div>
                        <div class="row">
                            <input type="text" name="WhatsApp" id="whatsapp" placeholder="WhatsApp *" required>
                            <input type="email" name="Email" id="email-nf" placeholder="E-mail *" required>
                        </div>
                        <textarea name="Endereco" id="endereco" placeholder="Endereço de Entrega Completo *" required></textarea>

                        <h4>Pagamento e Envio</h4>
                        <div class="row">
                            <select name="Pagamento" id="forma-pagamento" class="select-crazy" required>
                                <option value="" disabled selected>Pagamento *</option>
                                <option value="PIX">PIX</option>
                                <option value="TED">TED</option>
                                <option value="Boleto">Boleto</option>
                            </select>
                            <select name="Envio" id="forma-envio" class="select-crazy" required>
                                <option value="" disabled selected>Envio *</option>
                                <option value="Transportadora">Transportadora</option>
                                <option value="Correios">Correios</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>

            <div class="botoes-finalizacao">
                <button type="button" id="btn-zap" class="btn-desativado" onclick="finalizarTudo()">FINALIZAR WHATSAPP</button>
                <div class="row">
                    <button type="button" id="btn-pdf" class="btn-desativado" onclick="gerarPDF()">GERAR PDF</button>
                    <button type="button" class="btn-limpar" onclick="limparFormulario()">LIMPAR</button>
                </div>
            </div>
        </aside>
    </main>

    <footer class="footer-crazy">
        <p><b>GALVAO ARTIGOS PARA FESTAS LTDA (Crazy Fantasy)</b></p>
        <p>Rua Itália, 170 - Centro - Valinhos, SP</p>
    </footer>

    <script src="script.js?v=2"></script>
</body>
</html>
