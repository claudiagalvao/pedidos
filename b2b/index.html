<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal B2B | Crazy Fantasy</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>

    <header>
        <div class="banner-full-width">
            <img src="banner.png" class="banner-img" alt="Crazy Fantasy B2B">
        </div>
        <nav class="nav-bar">
            <div id="menu-categorias"></div>
            <div class="header-right">
                <button onclick="toggleCarrinho()" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer">
                    🛒 <span id="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main class="main-layout">
        <div id="produtos" class="produtos-grid"></div>
    </main>

    <div id="carrinho-drawer" class="drawer">
        <div class="drawer-header">
            <h3>MEU PEDIDO</h3>
            <button onclick="toggleCarrinho()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer">✕</button>
        </div>
        <div class="drawer-content">
            <div id="status-carrinho"></div>
            <div id="lista-itens-carrinho"></div>
            <div class="dados-nf">
                <input type="text" id="razao" placeholder="Razão Social / Escola">
                <textarea id="obs" placeholder="Observações do pedido" rows="2"></textarea>
            </div>
        </div>
        <div style="padding:20px">
            <button class="btn-finalizar zap" onclick="alert('Enviando WhatsApp...')">FINALIZAR WHATSAPP</button>
        </div>
    </div>

    <footer class="footer-crazy">
        <p><b>GALVAO ARTIGOS PARA FESTAS LTDA (Crazy Fantasy)</b></p>
        <p>CNPJ: 54.128.539/0001-01 | Valinhos, SP</p>
    </footer>

    <script src="script.js?v=1.1"></script>
</body>
</html>
