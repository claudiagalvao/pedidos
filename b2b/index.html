<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy - B2B Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero-banner">
        <img src="banner.png" class="banner-img" alt="Crazy Fantasy">
    </header>

    <nav class="nav-bar">
        <div id="menu-categorias" class="categorias"></div>
        <input type="text" id="busca" class="busca-input" placeholder="Buscar produto..." onkeyup="filtrarBusca()">
        <div class="cart-icon" onclick="toggleCarrinho()">
            🛒 <span id="cart-count">0</span>
        </div>
    </nav>

    <main class="container">
        <h1 class="titulo-sessao">🔥 TABELA EXCLUSIVA PARA PARCEIROS</h1>
        <div id="produtos" class="produtos-grid"></div>
    </main>

    <div id="carrinho-drawer" class="drawer">
        <div class="drawer-content">
            <span class="close-btn" onclick="toggleCarrinho()">×</span>
            <h3 class="drawer-title">Seu Pedido</h3>

            <div id="status-carrinho">
                <div class="progress-container">
                    <div class="progress-steps">
                        <span class="step">Mínimo</span>
                        <span class="step">12% OFF</span>
                        <span class="step">15% OFF</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progress-bar"></div>
                    </div>
                    <div id="feedback-progresso"></div>
                </div>
            </div>

            <div id="lista-itens-carrinho"></div>
            
            <div id="resumo-valores-container"></div>

            <div class="secao-faturamento">
                <h4 class="titulo-faturamento">Dados para faturamento</h4>
                
                <div class="campo-grupo">
                    <label>Razão Social / Nome</label>
                    <input type="text" id="razao-social" placeholder="Ex: Galvão Artigos para Festas">
                </div>
                
                <div class="dados-grid">
                    <div class="campo-grupo">
                        <label>CNPJ / CPF</label>
                        <input type="text" id="cnpj" placeholder="00.000.000/0000-00" oninput="mascaraCNPJ(this)">
                    </div>
                    <div class="campo-grupo">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="email@exemplo.com">
                    </div>
                    <div class="campo-grupo">
                        <label>Telefone</label>
                        <input type="text" id="telefone" placeholder="(00) 00000-0000" oninput="mascaraTel(this)">
                    </div>
                    <div class="campo-grupo">
                        <label>I.E.</label>
                        <input type="text" id="ie" placeholder="Inscrição Estadual">
                    </div>
                </div>
                
                <div class="dados-grid">
                    <div class="campo-grupo">
                        <label>Pagamento</label>
                        <select id="pagamento">
                            <option value="">Selecione</option>
                            <option>PIX</option>
                            <option>Boleto</option>
                            <option>Cartão</option>
                        </select>
                    </div>
                    <div class="campo-grupo">
                        <label>Frete</label>
                        <select id="frete">
                            <option value="">Selecione</option>
                            <option>Correios</option>
                            <option>Transportadora</option>
                            <option>Retirada (Valinhos)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="acoes-carrinho">
                <div class="menu-envio">
                    <button onclick="toggleMenuEnvio()" class="btn-enviar">📤 Enviar Pedido</button>
                    <div id="menu-envio-opcoes" class="menu-opcoes">
                        <button onclick="enviarWhatsApp()">📲 WhatsApp</button>
                        <button onclick="gerarPDF()">📄 Gerar PDF</button>
                        <button onclick="enviarEmail()">✉ Email</button>
                    </div>
                </div>
                <button onclick="limparCarrinho()" class="btn-limpar">🗑️ Esvaziar Carrinho</button>
            </div>
        </div>
    </div>

    <div id="modal-img" class="modal" onclick="fecharModal()"><img id="img-ampliada"></div>

    <footer class="footer-crazy">
        <div class="footer-bottom">© 2026 Crazy Fantasy — Todos os direitos reservados</div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
