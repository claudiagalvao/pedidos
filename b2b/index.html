<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal B2B | Crazy Fantasy</title>
    <link rel="stylesheet" href="style.css?v=4">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <header class="header-b2b">
        <div class="banner-container">
            <img src="banner.jpg" class="banner-img" alt="Crazy Fantasy B2B">
        </div>
        <nav class="nav-bar">
            <div id="menu-categorias" class="menu-cats"></div>
            <div class="busca-container">
                <input type="text" id="busca" placeholder="🔍 Buscar produto..." onkeyup="filtrarBusca()">
            </div>
        </nav>
    </header>

    <main class="main-layout">
        <section class="catalogo-section">
            <h2 class="titulo-b2b-destaque">🔥 Tabela de Parceiros | Preços Exclusivos</h2>
            <div id="produtos" class="produtos-grid"></div>
        </section>

        <aside class="checkout-section">
            <h2 id="tituloCarrinho">🛒 Pedido (0 itens)</h2>
            <div id="status-carrinho" class="status-info"></div>
            <div class="barra-progresso-bg"><div id="barra-fill" class="barra-progresso-fill"></div></div>
            <div id="box-economia" class="economia-destaque">Economia: R$ 0,00</div>

            <div class="checkout-scroll-area">
                <div id="lista-itens-carrinho" class="mini-lista"></div>
                <button onclick="esvaziarCarrinhoTotal()" class="btn-esvaziar">🗑️ Esvaziar Carrinho</button>

                <form id="form-pedido" action="https://formsubmit.co/lojacrazyfantasy@hotmail.com" method="POST">
                    <input type="hidden" name="_cc" value="claus.galvao@hotmail.com">
                    <input type="hidden" name="_next" value="https://pedidos-taupe-mu.vercel.app/b2b/sucesso.html">
                    <input type="hidden" name="Resumo_Pedido" id="pedido-corpo">
                    
                    <div class="dados-nf">
                        <h4>Dados de Faturamento</h4>
                        <input type="text" name="Cliente" id="razao-social" placeholder="Razão Social / Nome *" required>
                        <div class="row">
                            <input type="text" name="Documento" id="cnpj" placeholder="CNPJ / CPF *" required>
                            <input type="text" name="IE" id="ie" placeholder="IE / RG">
                        </div>
                        <div class="row">
                            <input type="text" name="WhatsApp" id="whatsapp" placeholder="WhatsApp *" required>
                            <input type="email" name="Email" id="email-nf" placeholder="E-mail *" required>
                        </div>
                        <textarea name="Entrega" id="endereco" placeholder="Endereço Completo *" required></textarea>
                        
                        <div class="row">
                            <select name="Pagamento" id="forma-pagamento" required>
                                <option value="" disabled selected>Pagamento *</option>
                                <option value="PIX">PIX</option>
                                <option value="Boleto">Boleto (Sob consulta)</option>
                                <option value="TED">TED</option>
                            </select>
                            <select name="Envio" id="forma-envio" required>
                                <option value="" disabled selected>Envio *</option>
                                <option value="Transportadora">Transportadora</option>
                                <option value="Correios">Correios</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>

            <div class="botoes-finalizacao">
                <button type="button" id="btn-zap" class="btn-desativado" onclick="finalizar('zap')">FINALIZAR POR WHATSAPP</button>
                <button type="button" id="btn-email" class="btn-desativado" onclick="finalizar('email')">ENVIAR POR E-MAIL</button>
                <div class="row">
                    <button type="button" id="btn-pdf" class="btn-desativado" onclick="gerarPDF()">PDF</button>
                    <button type="button" class="btn-limpar" onclick="limparTudo()">LIMPAR</button>
                </div>
            </div>
        </aside>
    </main>

    <div id="modal-img" class="modal" onclick="this.style.display='none'"><img id="img-ampliada"></div>

    <script src="script.js?v=4"></script>
</body>
</html>
