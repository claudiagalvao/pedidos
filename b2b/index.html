<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>B2B - Crazy Fantasy</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>


<header class="header-b2b">

<div class="banner-container">
<img src="banner.png" class="banner-img">
</div>


<nav class="nav-bar">

<div class="menu-scroll-container">

<div id="menu-categorias" class="menu-cats">
<button class="cat-btn active">Todos</button>
</div>

</div>


<div class="header-right">

<div class="busca-container">
<input type="text" id="busca" placeholder="Buscar produto..." onkeyup="filtrarBusca()">
</div>

<button class="btn-carrinho-abrir" onclick="toggleCarrinho()">
🛒 <span id="cart-count">0</span>
</button>

</div>

</nav>

</header>



<main class="main-layout">

<h2 class="titulo-sessao">
🔥 TABELA EXCLUSIVA PARA PARCEIROS
</h2>

<div id="produtos" class="produtos-grid"></div>

</main>



<div id="carrinho-drawer" class="drawer">

<div class="drawer-header">

<h3>Seu Pedido</h3>

<button onclick="toggleCarrinho()">✕</button>

</div>


<div style="padding:15px">

<div style="display:flex;justify-content:space-between;font-size:12px">

<span>Progresso do Pedido</span>

<span id="valor-falta">Faltam R$ 200</span>

</div>

<div style="background:#334155;height:8px;border-radius:10px">

<div id="barra-fill" style="height:100%;width:0%;background:#ff00ff"></div>

</div>

</div>



<div class="drawer-content">

<div id="status-carrinho"></div>

<div id="lista-itens-carrinho"></div>


<form id="form-pedido"
action="https://formsubmit.co/claudia-galvao@hotmail.com"
method="POST">

<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="pedido_detalhes" id="pedido-corpo">

<div class="dados-nf">

<h4>Dados da Empresa</h4>

<input name="razao_social" id="razao-social" placeholder="Razão Social *" required>

<input name="cnpj" placeholder="CNPJ / CPF *" required>

<input name="whatsapp" placeholder="WhatsApp *" required>

<textarea name="endereco" placeholder="Endereço *"></textarea>


<h4>Pagamento</h4>

<select name="pagamento">

<option>Pix</option>
<option>Boleto</option>
<option>Cartão</option>

</select>


<h4>Forma de envio</h4>

<select name="envio" required>

<option value="">Escolha</option>

<option>Retirada</option>
<option>Motoboy</option>
<option>Transportadora</option>
<option>Correios</option>

</select>

</div>

</form>

</div>



<div class="drawer-footer">

<button onclick="enviarWhatsApp()" class="btn-whatsapp-ativo">
Enviar WhatsApp
</button>

<button onclick="enviarEmail()" class="btn-pdf-ativo">
Enviar Email
</button>

<button onclick="gerarPDF()" class="btn-pdf-ativo">
Gerar PDF
</button>

<button onclick="esvaziarCarrinhoTotal()" class="btn-limpar">
Limpar
</button>

</div>

</div>



<div id="modal-img" class="modal" onclick="fecharModal()">
<img id="img-ampliada" onclick="fecharModal()">
</div>



<script src="api/produtos.js"></script>
<script src="script.js"></script>

</body>
</html>
