<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Crazy Fantasy | Catálogo de Fantasias</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <h1 style="color: #ff00ff; margin: 0; font-size: 1.5rem;">CRAZY <span style="color: #00ffff;">FANTASY</span></h1>
                <small style="color: #94a3b8;">Portal de Compras B2B</small>
            </div>
            
            <div class="busca-container">
                <input type="text" id="busca" placeholder="O que você procura?" onkeyup="filtrarBusca()">
            </div>

            <div class="cart-icon-container" onclick="toggleCarrinho()">
                <span id="cart-count">0</span>
                <svg viewBox="0 0 24 24" width="28" fill="white"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </div>
        </div>
    </header>

    <nav id="menu-categorias" class="categorias-nav"></nav>

    <main id="produtos" class="produtos-grid"></main>

    <div id="carrinho-drawer" class="drawer">
        <div class="drawer-header">
            <h3>Seu Pedido</h3>
            <button onclick="toggleCarrinho()" class="close-btn">✕</button>
        </div>

        <div id="barra-progresso">
            <div class="progresso-info">
                <span>Pedido Mínimo: R$ 200</span>
                <span id="falta-texto"></span>
            </div>
            <div class="barra-container">
                <div id="barra-fill"></div>
            </div>
        </div>

        <div id="lista-itens-carrinho"></div>

        <div id="formulario-fechamento">
            <h4 class="form-title">DADOS DA EMPRESA</h4>
            <input type="text" id="razao-social" class="dados-nf" placeholder="RAZÃO SOCIAL">
            <input type="text" id="cnpj-empresa" class="dados-nf" placeholder="CNPJ (OPCIONAL)">
            <input type="text" id="tel-empresa" class="dados-nf" placeholder="TELEFONE DE CONTATO">
            
            <h4 class="form-title" style="margin-top:15px">PAGAMENTO E ENVIO</h4>
            <select id="forma-envio-pagamento" class="dados-nf">
                <option value="" disabled selected>COMO DESEJA RECEBER?</option>
                <option value="Pix (5% extra) + Retirada Valinhos">Pix (5% extra) + Retirada Valinhos</option>
                <option value="Pix (5% extra) + Envio Transportadora">Pix (5% extra) + Envio Transportadora</option>
                <option value="Boleto + Retirada Valinhos">Boleto + Retirada Valinhos</option>
                <option value="Boleto + Envio Transportadora">Boleto + Envio Transportadora</option>
            </select>

            <div id="status-carrinho"></div>

            <div class="acoes-carrinho">
                <button id="btn-zap" class="btn-desativado" onclick="finalizar('zap')">ENVIAR VIA WHATSAPP</button>
                <button id="btn-pdf" class="btn-desativado">FINALIZAR NO FORM</button>
            </div>
        </div>
    </div>

    <div id="modal-img" class="modal" onclick="this.style.display='none'">
        <img id="img-ampliada" src="" alt="Produto ampliado">
    </div>

    <script src="js/script.js"></script>
</body>
</html>
