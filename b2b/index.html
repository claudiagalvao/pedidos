<div id="carrinho-drawer" class="drawer">
    <div class="drawer-header">
        <h3>Seu Pedido</h3>
        <button onclick="toggleCarrinho()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer">✕</button>
    </div>

    <div id="barra-progresso" style="padding:15px 20px; background:#1e293b">
        <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#94a3b8; margin-bottom:5px">
            <span>Pedido Mínimo: R$ 200</span>
            <span id="falta-texto"></span>
        </div>
        <div style="width:100%; height:8px; background:#334155; border-radius:10px; overflow:hidden">
            <div id="barra-fill" style="width:0%; height:100%; background:linear-gradient(90deg, #ff00ff, #00ffff); transition:0.3s"></div>
        </div>
    </div>

    <div id="lista-itens-carrinho" style="flex:1; overflow-y:auto; padding:20px"></div>

    <div id="formulario-fechamento" style="padding:20px; background:#0f172a; border-top:1px solid #334155">
        <h4 style="color:#ff00ff; font-size:0.7rem; margin-bottom:10px">DADOS DA EMPRESA</h4>
        <input type="text" id="razao-social" class="dados-nf" placeholder="RAZÃO SOCIAL">
        <input type="text" id="cnpj-empresa" class="dados-nf" placeholder="CNPJ (OPCIONAL)">
        <input type="text" id="tel-empresa" class="dados-nf" placeholder="TELEFONE">
        
        <h4 style="color:#ff00ff; font-size:0.7rem; margin:15px 0 10px">PAGAMENTO E ENVIO</h4>
        <select id="forma-envio-pagamento" class="dados-nf">
            <option value="" disabled selected>COMO DESEJA RECEBER?</option>
            <option value="Pix (5% extra) + Retirada Valinhos">Pix (5% extra) + Retirada Valinhos</option>
            <option value="Pix (5% extra) + Envio Transportadora">Pix (5% extra) + Envio Transportadora</option>
            <option value="Boleto + Retirada Valinhos">Boleto + Retirada Valinhos</option>
            <option value="Boleto + Envio Transportadora">Boleto + Envio Transportadora</option>
        </select>

        <div id="status-carrinho" style="margin-top:20px"></div>

        <button id="btn-zap" class="btn-desativado" onclick="finalizar('zap')" style="margin-top:10px">FINALIZAR WHATSAPP</button>
        <button id="btn-pdf" class="btn-desativado" style="margin-top:10px">Finalizar no Form</button>
    </div>
</div>
