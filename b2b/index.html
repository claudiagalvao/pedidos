<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy - B2B Faturamento</title>

    <style>
        :root { --primary: #6c2bd9; --secondary: #e63946; --whatsapp: #25d366; --bg: #f0f2f5; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        .banner-container { width: 100%; background: var(--primary); border-radius: 15px; margin-bottom: 20px; overflow: hidden; min-height: 120px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .banner-container img { width: 100%; height: auto; display: block; }

        .form-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--primary); }
        h3 { color: var(--primary); border-bottom: 2px solid #f8f0ff; padding-bottom: 10px; margin-top: 0; font-size: 18px; }
        
        .grid-nf { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-size: 14px; outline: none; }
        
        .tabela-scroll { max-height: 500px; overflow-y: auto; border-radius: 8px; border: 1px solid #eee; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--primary); color: white; padding: 12px; position: sticky; top: 0; z-index: 5; font-size: 11px; text-transform: uppercase; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        
        .estoque-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 11px; }
        .qtd-input { width: 60px; padding: 8px; text-align: center; border: 2px solid var(--primary); border-radius: 6px; font-weight: bold; }
        
        .resumo-financeiro { display: flex; justify-content: space-between; align-items: center; padding: 25px; background: #1a1a1a; color: white; border-radius: 12px; margin-top: 15px; gap: 20px; }
        .bloco-valor { flex: 1; text-align: center; }
        .bloco-valor small { color: #888; text-transform: uppercase; font-size: 10px; display: block; margin-bottom: 5px; }
        .bloco-valor h2 { margin: 0; font-size: 24px; color: #fff; }
        .separador { width: 2px; height: 40px; background: #333; }

        .btn-group { display: flex; gap: 15px; margin-top: 20px; justify-content: flex-end; }
        .acao { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; transition: 0.3s; }
        .btn-pdf { background: var(--secondary); }
        .btn-whatsapp { background: var(--whatsapp); }
    </style>
</head>

    </div>

    <div class="form-box">

            <div><label>E-mail para XML *</label><input type="email" id="nf_email"></div>

            <div><label>Cidade/UF *</label><input type="text" id="nf_cidade"></div>
        </div>
    </div>

    <div class="form-box">

        <div class="resumo-financeiro">
            <div class="bloco-valor">

            </div>
            <div class="separador"></div>
            <div class="bloco-valor">

        </div>

        <div class="btn-group">

    function render() {
        const corpo = document.getElementById("corpo-tabela");
        corpo.innerHTML = "";
        produtos.sort((a, b) => a.n.localeCompare(b.n)).forEach((p, i) => {
            // Regra: se valor > 200, desconto de 25% no B2B
            let pB2B = p.p > 200 ? p.p * 0.75 : p.p;
            corpo.innerHTML += `
                <tr>
                    <td style="text-align:left; padding-left:15px;"><b>${p.n}</b></td>
                    <td>${p.t}</td>
                    <td>R$ ${p.p.toFixed(2).replace('.', ',')}</td>
                    <td style="color:var(--secondary)"><b>R$ ${pB2B.toFixed(2).replace('.', ',')}</b></td>
                    <td><span class="estoque-badge">${p.est} un</span></td>
                    <td><input type="number" class="qtd-input" data-index="${produtos.indexOf(p)}" min="0" max="${p.est}" value="0" onchange="travarQtd(this)"></td>
                </tr>`;
        });
    }

    function travarQtd(input) {
        let idx = input.dataset.index;
        if (parseInt(input.value) > produtos[idx].est) {
            alert("Estoque insuficiente para este item!");
            input.value = produtos[idx].est;
        }
        atualizarTotal();
    }

    function atualizarTotal() {
        let cheio = 0; let b2b = 0;
        document.querySelectorAll(".qtd-input").forEach((input) => {
            let q = parseInt(input.value) || 0;
            let idx = input.dataset.index;
            cheio += q * produtos[idx].p;
            let vFinal = produtos[idx].p > 200 ? produtos[idx].p * 0.75 : produtos[idx].p;
            b2b += q * vFinal;
        });
        document.getElementById("subtotal-cheio").innerText = `R$ ${cheio.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        document.getElementById("valor-total").innerText = `R$ ${b2b.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const nomeCli = document.getElementById("nf_nome").value || "Cliente";

        doc.setFillColor(108, 43, 217);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255);
        doc.setFontSize(20);
        doc.text("SOLICITAÇÃO DE NF - CRAZY FANTASY", 105, 25, {align: "center"});

        doc.setTextColor(0); doc.setFontSize(10);
        let y = 50;
        doc.setFont("helvetica", "bold");
        doc.text("DADOS DO CLIENTE:", 15, y);
        doc.setFont("helvetica", "normal");
        y += 6;
        doc.text(`RAZÃO: ${nomeCli.toUpperCase()}`, 15, y);
        doc.text(`CNPJ: ${document.getElementById("nf_doc").value}`, 120, y);
        y += 6;
        doc.text(`ENDEREÇO: ${document.getElementById("nf_end").value}`, 15, y);
        doc.text(`E-MAIL: ${document.getElementById("nf_email").value}`, 120, y);
        
        y += 15;
        doc.setFont("helvetica", "bold");
        doc.text("PRODUTO", 15, y); doc.text("QTD", 120, y); doc.text("VLR. B2B", 145, y); doc.text("TOTAL", 180, y);
        doc.line(15, y+2, 195, y+2);
        
        y += 10;
        doc.setFont("helvetica", "normal");
        document.querySelectorAll(".qtd-input").forEach((input) => {
            let q = parseInt(input.value);
            if(q > 0) {
                let idx = input.dataset.index;
                let vFinal = produtos[idx].p > 200 ? produtos[idx].p * 0.75 : produtos[idx].p;
                doc.text(`${produtos[idx].n} (${produtos[idx].t})`, 15, y);
                doc.text(q.toString(), 122, y);
                doc.text(vFinal.toFixed(2), 145, y);
                doc.text((q*vFinal).toFixed(2), 180, y);
                y += 7;
                if(y > 275) { doc.addPage(); y = 20; }
            }
        });

        doc.setFontSize(14); doc.setFont("helvetica", "bold");
        doc.text(`TOTAL FINAL: ${document.getElementById("valor-total").innerText}`, 195, y+15, {align: "right"});
        doc.save(`Pedido_B2B_${nomeCli.replace(/\s+/g, '_')}.pdf`);
    }

    function enviarWhatsApp() {
        let nome = document.getElementById("nf_nome").value || "Não informado";
        let msg = `*CRAZY FANTASY - NOVO PEDIDO B2B*\n\n`;
        msg += `*Cliente:* ${nome}\n`;
        msg += `*Doc:* ${document.getElementById("nf_doc").value}\n\n`;
        
        document.querySelectorAll(".qtd-input").forEach((input) => {
            let q = parseInt(input.value);
            if(q > 0) {
                let idx = input.dataset.index;
                let vFinal = produtos[idx].p > 200 ? produtos[idx].p * 0.75 : produtos[idx].p;
                msg += `✅ ${produtos[idx].n} (${produtos[idx].t}) x${q} = R$ ${(q*vFinal).toFixed(2).replace('.', ',')}\n`;
            }
        });
        
        msg += `\n*VALOR TOTAL: ${document.getElementById("valor-total").innerText}*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }
