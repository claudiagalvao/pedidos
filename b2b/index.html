<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy - B2B</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="carrinho-drawer" class="drawer">
        <div class="drawer-content">
            <span class="close-btn" onclick="toggleCarrinho()">×</span>
            <h3 class="drawer-title">Seu Pedido</h3>

            <div id="status-carrinho">
                </div>

            <div id="lista-itens-carrinho"></div>

            <div id="resumo-valores-container"></div>

            <div class="secao-faturamento">
                <h4 class="titulo-faturamento">Dados para faturamento</h4>
                
                <div class="form-faturamento">
                    <div class="campo-grupo">
                        <label>Razão Social / Nome</label>
                        <input type="text" id="razao-social" placeholder="Digite o nome completo">
                    </div>
                    
                    <div class="dados-grid">
                        <div class="campo-grupo">
                            <label>CNPJ / CPF</label>
                            <input type="text" id="cnpj">
                        </div>
                        <div class="campo-grupo">
                            <label>Email</label>
                            <input type="email" id="email">
                        </div>
                        <div class="campo-grupo">
                            <label>Telefone</label>
                            <input type="text" id="telefone">
                        </div>
                        <div class="campo-grupo">
                            <label>I.E.</label>
                            <input type="text" id="ie">
                        </div>
                    </div>
                    
                    <div class="dados-grid">
                        <div class="campo-grupo">
                            <label>Pagamento</label>
                            <select id="pagamento">
                                <option value="">Selecione</option>
                                <option>PIX</option>
                                <option>Boleto</option>
                                <option>Cartão</option>
                            </select>
                        </div>
                        <div class="campo-grupo">
                            <label>Frete</label>
                            <select id="frete">
                                <option value="">Selecione</option>
                                <option>Correios</option>
                                <option>Transportadora</option>
                                <option>Retirada</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="acoes-carrinho">
                <div class="menu-envio">
                    <button onclick="toggleMenuEnvio()" class="btn-enviar">📤 Enviar Pedido</button>
                    <div id="menu-envio-opcoes" class="menu-opcoes">
                        <button onclick="enviarWhatsApp()">📲 WhatsApp</button>
                        <button onclick="gerarPDF()">📄 Gerar PDF</button>
                        <button onclick="enviarEmail()">✉ Email</button>
                    </div>
                </div>
                <button onclick="limparCarrinho()" class="btn-limpar">🗑️ Limpar Carrinho</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
