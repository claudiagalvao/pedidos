<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy - B2B</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-b2b">
        <div class="banner-container">
            <img src="banner.png" alt="Crazy Fantasy B2B" class="banner-img">
        </div>
    </header>

    <nav class="nav-bar">
        <div class="menu-scroll-container">
            <div id="menu-categorias" class="menu-cats">
                </div>
        </div>

        <div class="header-right">
            <div class="busca-container">
                <input type="text" id="busca" onkeyup="filtrarBusca()" placeholder="Buscar produto...">
            </div>
            <button class="btn-carrinho-abrir" onclick="toggleCarrinho()">
                🛒 <span id="cart-count">0</span>
            </button>
        </div>
    </nav>

    <main class="main-layout">
        <h1 class="titulo-sessao">🔥 TABELA EXCLUSIVA PARA PARCEIROS</h1>
        <div id="produtos" class="produtos-grid">
            </div>
    </main>

    <div id="carrinho-drawer" class="drawer">
        <div class="drawer-header">
            <h3>Seu Pedido</h3>
            <span class="close-btn" onclick="toggleCarrinho()" style="cursor:pointer; font-size:1.5rem;">&times;</span>
        </div>
        
        <div class="drawer-content">
            <div id="status-carrinho"></div>
            <div id="lista-itens-carrinho"></div>

            <div class="dados-nf">
                <h4>Dados da Empresa</h4>
                <input type="text" id="razao-social" placeholder="Razão Social / Nome *" required>
            </div>
        </div>

        <div class="drawer-footer">
            <button onclick="enviarWhatsApp()" class="btn-whatsapp-ativo">Enviar WhatsApp</button>
            <button onclick="enviarEmail()" class="btn-pdf-ativo">Gerar PDF do Pedido</button>
            <button onclick="limparCarrinho()" class="btn-limpar">Limpar Carrinho</button>
        </div>

        <form id="form-pedido" action="../api/gerar-pdf.php" method="POST" style="display:none;">
            <input type="hidden" name="pedido" id="pedido-corpo">
        </form>
    </div>

    <div id="modal-img" class="modal" onclick="fecharModal()">
        <img id="img-ampliada" src="">
    </div>

    <script src="script.js"></script>
</body>
</html>
