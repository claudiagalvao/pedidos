<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal B2B Crazy Fantasy</title>

<link rel="stylesheet" href="./style.css">

</head>

<body>

<div class="container">

<!-- TOPO -->
<div class="topo">

<img src="logo.png" class="logo">

<div class="mensagem">
🔥 Tabela exclusiva para parceiros | Descontos B2B progressivos
</div>

<input
type="text"
id="busca"
placeholder="🔎 Buscar produto"
>

</div>


<!-- LISTA DE PRODUTOS -->
<div id="produtos"></div>

</div>



<!-- CARRINHO -->
<div class="carrinho">

<h2>🛒 Pedido (0 itens)</h2>

<p>Total B2B: R$ 0,00</p>
<p>Desconto aplicado: 0%</p>
<p>Faltam R$ 200,00 para pedido mínimo</p>

<div class="barra-progresso"></div>

<p>Economia com descontos: R$ 0,00</p>

<hr>

<h3>Dados para Nota Fiscal</h3>

<div class="form">

<input placeholder="Razão Social">
<input placeholder="CNPJ">
<input placeholder="IE">

<input placeholder="Responsável">
<input placeholder="WhatsApp">
<input placeholder="Email">

<input placeholder="Endereço">

<div class="linha">
<input placeholder="Cidade">
<input placeholder="Estado">
<input placeholder="CEP">
</div>

<select>
<option>Forma de entrega</option>
</select>

<select>
<option>Forma de pagamento</option>
</select>

<textarea placeholder="Observações"></textarea>

<button id="btnEnviar">Enviar Pedido</button>
<button id="btnWhatsapp">WhatsApp</button>
<button id="btnPDF">Gerar PDF</button>
<button id="btnLimpar">Limpar</button>

</div>

</div>


<script src="./script.js"></script>

</body>
</html>
