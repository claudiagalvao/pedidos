<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal B2B Crazy Fantasy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f5fb;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

h2{
margin-top:20px;
}

.menu{
margin:20px 0;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.menu button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#e6e1ff;
cursor:pointer;
}

.search input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:20px;
}

.layout{
display:flex;
gap:30px;
}

.produtos{
flex:3;
}

.carrinho{
flex:1;
background:white;
padding:15px;
border-radius:10px;
height:fit-content;
box-shadow:0 0 10px rgba(0,0,0,0.05);
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#e6e1ff;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.prod-img{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;
}

.total{
font-size:20px;
margin-top:10px;
}

.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.limpar{background:#555;color:white;}
.pdf{background:#ff5c6c;color:white;}
.email{background:#1abc9c;color:white;}

</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="banner.png">
</div>

<h2>Portal B2B Crazy Fantasy</h2>

<div class="menu" id="menu"></div>

<div class="search">
<input placeholder="Buscar produto..." onkeyup="buscar(this.value)">
</div>

<div class="layout">

<div class="produtos">

<table>

<thead>
<tr>
<th>Foto</th>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<div class="carrinho">

<h3>Carrinho</h3>

<div id="listaCarrinho"></div>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<div id="descontoInfo"></div>

<div class="buttons">
<button class="limpar" onclick="limpar()">Limpar</button>
<button class="pdf" onclick="gerarPDF()">Gerar PDF</button>
<button class="email" onclick="enviarEmail()">Enviar Pedido</button>
</div>

</div>

</div>

</div>

<script>

let produtos=[]
let produtosFormatados=[]
let carrinho={}

const pedidoMinimo=200

Papa.parse("produtos.csv",{

download:true,
header:true,

complete:function(results){

produtos=results.data
normalizar()

}

})

function normalizar(){

produtosFormatados=produtos.map(p=>{

return{

nome:p["Nome"],
categoria:p["Categorias"],
preco:parseFloat(p["Preço"]||0),
variacao1:p["Valor da variação 1"]||"",
variacao2:p["Valor da variação 2"]||"",
variacao3:p["Valor da variação 3"]||"",
sku:p["SKU"]

}

})

criarCategorias()

}

function criarCategorias(){

let cats=[...new Set(produtosFormatados.map(p=>p.categoria))]

let menu=document.getElementById("menu")

cats.forEach(c=>{
menu.innerHTML+=`<button onclick="mostrar('${c}')">${c}</button>`
})

mostrar(cats[0])

}

function mostrar(cat){

let tabela=document.getElementById("tabela")

tabela.innerHTML=""

produtosFormatados
.filter(p=>p.categoria==cat)
.forEach(p=>{

tabela.innerHTML+=`

<tr>

<td>
<img class="prod-img" src="produtos/${p.sku}.jpg">
</td>

<td>

${p.nome}

<br>

<select onchange="selecionar('${p.sku}',this.value,${p.preco})">

<option value="">Selecionar</option>

${p.variacao1?`<option>${p.variacao1}</option>`:""}
${p.variacao2?`<option>${p.variacao2}</option>`:""}
${p.variacao3?`<option>${p.variacao3}</option>`:""}

</select>

</td>

<td>R$ ${p.preco.toFixed(2)}</td>

<td>
<input type="number" min="0" onchange="quantidade('${p.sku}',this.value)">
</td>

<td id="sub-${p.sku}">0.00</td>

</tr>

`

})

}

function selecionar(sku,variante,preco){

if(!carrinho[sku]){

carrinho[sku]={

nome:variante,
preco:preco,
qtd:0

}

}

}

function quantidade(sku,qtd){

if(!carrinho[sku])return

carrinho[sku].qtd=parseInt(qtd)

calcular()

}

function calcular(){

let total=0

let lista=""

Object.keys(carrinho).forEach(k=>{

let item=carrinho[k]

let sub=item.preco*item.qtd

if(item.qtd>0){

lista+=`${item.nome} x ${item.qtd}<br>`

}

total+=sub

document.getElementById("sub-"+k).innerText=sub.toFixed(2)

})

let desconto=descontoProgressivo(total)

let totalFinal=total*(1-desconto)

document.getElementById("listaCarrinho").innerHTML=lista

document.getElementById("total").innerText=totalFinal.toFixed(2)

document.getElementById("descontoInfo").innerHTML=`Desconto aplicado: ${desconto*100}%`

}

function descontoProgressivo(total){

if(total>=1000) return 0.18
if(total>=600) return 0.15
if(total>=300) return 0.12
return 0.10

}

function buscar(txt){

txt=txt.toLowerCase()

document.querySelectorAll("#tabela tr").forEach(l=>{

let nome=l.innerText.toLowerCase()

l.style.display=nome.includes(txt)?"":"none"

})

}

function limpar(){

location.reload()

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let y=20

doc.text("Pedido Crazy Fantasy B2B",10,10)

Object.values(carrinho).forEach(i=>{

if(i.qtd>0){

doc.text(`${i.nome} x ${i.qtd}`,10,y)

y+=8

}

})

doc.save("pedido.pdf")

}

function enviarEmail(){

let total=parseFloat(document.getElementById("total").innerText)

if(total<pedidoMinimo){

alert("Pedido mínimo R$"+pedidoMinimo)

return

}

let texto="Pedido Crazy Fantasy B2B%0D%0A"

Object.values(carrinho).forEach(i=>{

if(i.qtd>0){

texto+=`${i.nome} x ${i.qtd}%0D%0A`

}

})

window.location.href=`mailto:lojacrazyfantasy@hotmail.com?subject=Pedido B2B&body=${texto}`

}

</script>

</body>
</html>
