<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal B2B Crazy Fantasy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f3f3f3;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:10px;
}

/* BANNER */

.banner{
width:100%;
height:auto;
display:block;
border-radius:10px;
margin-top:10px;
}

/* BUSCA */

.search{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* LAYOUT */

.layout{
display:flex;
gap:20px;
margin-top:10px;
flex-wrap:wrap;
}

.produtos{
flex:3;
min-width:300px;
}

/* TABELA */

table{
width:100%;
margin-top:10px;
background:white;
border-radius:8px;
border-collapse:collapse;
}

th{
background:#dcd0f7;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

.prodimg{
width:60px;
border-radius:6px;
}

/* PREÇOS */

.precoOriginal{
text-decoration:line-through;
font-size:12px;
color:#888;
}

.precoB2B{
color:#e60023;
font-weight:bold;
}

/* CARRINHO */

.carrinho{
width:260px;
background:white;
padding:15px;
border-radius:10px;
}

/* BOTÕES */

button{
border:none;
padding:8px 10px;
border-radius:10px;
cursor:pointer;
}

.btnclear{
background:#444;
color:white;
width:100%;
margin-top:5px;
}

.btnpdf{
background:#ff5b6b;
color:white;
width:100%;
margin-top:5px;
}

.btnsend{
background:#27ae60;
color:white;
width:100%;
margin-top:5px;
}

/* PROGRESSO */

.progressBox{
background:white;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.progressBar{
width:100%;
height:14px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-top:6px;
}

#progressFill{
height:100%;
width:0%;
background:#e74c3c;
transition:width 0.4s ease;
}

/* MENU */

.categorias{
margin-top:15px;
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.catGrupo{
margin-bottom:12px;
}

.catGrupo b{
display:block;
font-size:15px;
margin-bottom:6px;
color:#333;
}

.categorias button{
background:#efe8ff;
border:none;
padding:6px 12px;
margin:4px;
border-radius:20px;
cursor:pointer;
font-size:13px;
transition:all 0.2s;
}

.categorias button:hover{
background:#cdbdff;
}

/* WHATSAPP */

.whatsappBtn{
position:fixed;
bottom:20px;
right:20px;
width:65px;
height:65px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
cursor:pointer;
z-index:999;
}

.whatsappBtn img{
width:32px;
height:32px;
}

.whatsappBtn:hover{
transform:scale(1.1);
}

/* MOBILE */

@media (max-width:768px){

.layout{
flex-direction:column;
}

.carrinho{
width:100%;
}

.prodimg{
width:40px;
}

}

</style>

</head>

<body>

<div class="container">

<picture>
<source media="(max-width:768px)" srcset="banner-mobile.png">
<img src="banner.png" class="banner">
</picture>

<h2>Portal B2B Crazy Fantasy</h2>

<p>✔ Preços exclusivos para parceiros e revendedores</p>

<div class="progressBox">

<div id="progressText">
Pedido mínimo: R$200
</div>

<div class="progressBar">
<div id="progressFill"></div>
</div>

</div>

<div id="categorias" class="categorias"></div>

<input type="text" id="busca" class="search" placeholder="Buscar produto...">

<div class="layout">

<div class="produtos">

<table>

<thead>
<tr>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

<div class="carrinho">

<h3>Carrinho</h3>

<p>Itens: <b id="itens">0</b></p>

<h2>Total: R$ <span id="total">0</span></h2>

<button class="btnclear" onclick="limpar()">Limpar</button>
<button class="btnpdf" onclick="gerarPDF()">Gerar PDF</button>

</div>

</div>

</div>

<a class="whatsappBtn" onclick="enviarWhatsapp()">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>

let produtos=[]
let carrinho={}

Papa.parse("produtos.csv",{

download:true,
header:true,

complete:function(res){

let data=res.data
let mapa={}

data.forEach(p=>{

let id=p["Identificador URL"]
if(!id) return

let categoria=p["Categorias"]

if(!categoria && mapa[id]){
categoria=mapa[id].categoria
}

if(!categoria){
categoria="Outros"
}

if(!mapa[id]){

mapa[id]={

nome:p["Nome"],
categoria:categoria,
preco:parseFloat((p["Preço"]||"0").replace(",",".")),
variacoes:[]

}

}

let variacao=p["Valor da variação 1"]

if(variacao && mapa[id]){
mapa[id].variacoes.push(variacao)
}

})

produtos=Object.values(mapa)

renderCategorias()
render(produtos)

}

})

function renderCategorias(){

let mapa={}

produtos.forEach(p=>{

let partes=p.categoria.split(">")

let pai=partes[0].trim()
let filho=partes[1]?.trim()

if(!mapa[pai]) mapa[pai]=new Set()

if(filho) mapa[pai].add(filho)

})

let html=""

Object.keys(mapa).forEach(cat=>{

html+=`<div class="catGrupo"><b>${cat}</b>`

mapa[cat].forEach(sub=>{
html+=`<button onclick="filtrar('${cat} > ${sub}')">${sub}</button>`
})

html+=`</div>`

})

document.getElementById("categorias").innerHTML=html

}

function filtrar(cat){

let filtrados=produtos.filter(p=>p.categoria.includes(cat))
render(filtrados)

}

function render(lista){

let html=""

lista.forEach((p,i)=>{

let precoOriginal=p.preco
let precoB2B=p.preco*0.9

let variacaoHTML=""

if(p.variacoes.length){

variacaoHTML=`
<select>
<option>Selecionar</option>
${p.variacoes.map(v=>`<option>${v}</option>`).join("")}
</select>
`

}

html+=`

<tr>

<td>${p.nome}<br>${variacaoHTML}</td>

<td>

<span class="precoOriginal">R$ ${precoOriginal.toFixed(2)}</span><br>
<span class="precoB2B">R$ ${precoB2B.toFixed(2)}</span>

</td>

<td>
<input type="number" min="0" onchange="calc(${i},this.value)">
</td>

<td id="t${i}">0</td>

</tr>

`

})

document.getElementById("lista").innerHTML=html

}

function calc(i,q){

q=parseInt(q)

let linha=document.getElementById("t"+i).closest("tr")

let preco=parseFloat(
linha.querySelector(".precoB2B")
.innerText
.replace("R$","")
.replace(",",".")
)

if(isNaN(q)||q<=0){

delete carrinho[i]
document.getElementById("t"+i).innerText="0"
calcTotal()
return

}

let total=preco*q

document.getElementById("t"+i).innerText=total.toFixed(2)

carrinho[i]={

q:q,
total:total

}

calcTotal()

}

function calcTotal(){

let soma=0
let itens=0

Object.values(carrinho).forEach(p=>{

soma+=p.total
itens+=p.q

})

document.getElementById("total").innerText=soma.toFixed(2)
document.getElementById("itens").innerText=itens

let minimo=200
let progresso=Math.min((soma/minimo)*100,100)

let barra=document.getElementById("progressFill")

barra.style.width=progresso+"%"

if(soma>=200){

barra.style.background="#27ae60"
document.getElementById("progressText").innerText="Pedido mínimo atingido 🎉"

}
else if(soma>=150){

barra.style.background="#f1c40f"

let falta=(200-soma).toFixed(2)

document.getElementById("progressText").innerText="Quase lá! Faltam R$ "+falta

}
else{

barra.style.background="#e74c3c"

let falta=(200-soma).toFixed(2)

document.getElementById("progressText").innerText="Faltam R$ "+falta+" para atingir o pedido mínimo"

}

}

function limpar(){
location.reload()
}

function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let y=20

doc.text("Pedido Crazy Fantasy B2B",20,y)

y+=10

Object.keys(carrinho).forEach(nome=>{

let p=carrinho[nome]

doc.text(`${nome} - ${p.q} un`,20,y)

y+=8

})

doc.save("pedido.pdf")

}

function enviarWhatsapp(){

let total=parseFloat(document.getElementById("total").innerText)

if(total<=0){
alert("Adicione produtos ao pedido")
return
}

let mensagem="Pedido Crazy Fantasy B2B%0A%0A"

Object.keys(carrinho).forEach(nome=>{

let p=carrinho[nome]

mensagem+=`${nome} - ${p.q} un%0A`

})

mensagem+=`%0ATotal: R$ ${total.toFixed(2)}`

let telefone="5519992850208"

let url=`https://wa.me/${telefone}?text=${mensagem}`

window.open(url,"_blank")

}

</script>

</body>
</html>
