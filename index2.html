<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy - Catálogo de Produtos</title>

<style>

body{
font-family:Arial;
background:#f5f6fb;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:20px 0;
}

.menu button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#e4dcff;
cursor:pointer;
}

.menu button:hover{
background:#cfc4ff;
}

.search{
margin-bottom:20px;
}

.search input{
padding:12px;
width:100%;
border-radius:6px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#e4dcff;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.desconto{
background:#fff1f3;
}

.preco-antigo{
text-decoration:line-through;
color:#888;
}

.preco-desc{
color:#e60023;
font-weight:bold;
}

.badge{
background:#e60023;
color:white;
padding:3px 6px;
border-radius:6px;
font-size:11px;
margin-left:6px;
}

.total{
font-size:22px;
text-align:right;
margin-top:20px;
font-weight:bold;
}

button.limpar{
margin-top:20px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#444;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="banner.png">
</div>

<h2>Catálogo de Produtos</h2>

<div class="menu" id="menu"></div>

<div class="search">
<input type="text" placeholder="Buscar produto..." onkeyup="buscar(this.value)">
</div>

<table>

<thead>

<tr>
<th>Produto</th>
<th>Preço</th>
<th>Preço com desconto</th>
<th>Qtd</th>
<th>Total</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<button class="limpar" onclick="limpar()">Limpar pedido</button>

</div>

<script>

const catalogo = {
"Barbas e Bigodes":[
["Barba de Papai Noel Branca com Bigode Acessório Fantasia Natal",49.99],
["Kit Papai Noel Completo Peruca e Barba Branca com Bigode Fantasia Natal",69.99]
],

"Acessórios Gerais":[
["Bastão Taco Fantasia Cosplay Festa Vilã Arlequina Good Night 80cm",49.9]
],

"Kits":[
["Colar Vitoriano Steampunk com Relógio Vintage",39.99],
["Kit Detetive Sherlock Holmes Adulto",80],
["Kit Fantasia Rocker Completo",49.99],
["Kit Fantasia Vilã Cosplay Peruca Rosa Azul + Bastão+ Meia",119.7],
["Kit Peruca Rosa Azul + Bastão Good Night Cosplay",85]
],

"Coroas,Tiaras e Varinhas":[
["Coroa de Rainha Dourada Luxo",19.99],
["Coroa de Rei Dourada Luxo",12.99],
["Mini Coroa Princesa",3.99],
["Tiara Princesa Glitter",15],
["Tiara Princesa Prata",12],
["Varinha Princesa",7.99]
],

"Maquiagens e Sprays":[
["Kbelo Maluco Rostinho Pintado",19.9],
["Tinta Spray Temporária Cabelo",19.99]
],

"Meias e Luvas":[
["Meia Calça Arrastão Preta",49.9]
],

"Perucas":[
["Peruca Amy Winehouse",119.99],
["Peruca Arlequina Rosa Azul",49.9],
["Peruca Loira Ondulada Barbie",59.9],
["Peruca Punk Colorida",30]
]

}

let categoriaAtual = Object.keys(catalogo)[0]

function gerarMenu(){

const menu = document.getElementById("menu")

Object.keys(catalogo).forEach(cat=>{

menu.innerHTML += `
<button onclick="mostrarCategoria('${cat}')">${cat}</button>
`

})

}

function mostrarCategoria(cat){

categoriaAtual = cat
render()

}

function render(){

const tabela = document.getElementById("tabela")
tabela.innerHTML=""

catalogo[categoriaAtual].forEach(p=>{

let preco = p[1]
let desconto = preco>200?preco*0.9:preco
let classe = preco>200?"desconto":""

tabela.innerHTML += `
<tr class="${classe}">

<td>${p[0]}</td>

<td class="${preco>200?'preco-antigo':''}">
${preco.toFixed(2)}
</td>

<td class="preco-desc">
${desconto.toFixed(2)}
${preco>200?'<span class="badge">10% OFF</span>':''}
</td>

<td>
<input type="number" min="0" onchange="calcular()">
</td>

<td class="subtotal">0.00</td>

</tr>
`

})

}

function calcular(){

let total = 0

document.querySelectorAll("#tabela tr").forEach(linha=>{

let preco = parseFloat(linha.children[2].innerText)

let qtd = linha.querySelector("input").value || 0

let subtotal = preco*qtd

linha.querySelector(".subtotal").innerText=subtotal.toFixed(2)

total += subtotal

})

document.getElementById("total").innerText=total.toFixed(2)

}

function limpar(){

document.querySelectorAll("input").forEach(i=>i.value="")
document.querySelectorAll(".subtotal").forEach(i=>i.innerText="0.00")
document.getElementById("total").innerText="0.00"

}

function buscar(texto){

texto = texto.toLowerCase()

const tabela = document.getElementById("tabela")

document.querySelectorAll("#tabela tr").forEach(linha=>{

const nome = linha.children[0].innerText.toLowerCase()

linha.style.display = nome.includes(texto) ? "" : "none"

})

}

gerarMenu()
render()

</script>

</body>
</html>
