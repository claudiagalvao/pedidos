<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy B2B</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f5fb;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

.menu{
margin:20px 0;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.menu button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#e6e1ff;
cursor:pointer;
}

.search input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#e6e1ff;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.prod-img{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;
}

.preco-original{
text-decoration:line-through;
color:#888;
font-size:13px;
}

.preco-b2b{
color:red;
font-weight:bold;
}

.total{
text-align:right;
font-size:22px;
margin-top:20px;
font-weight:bold;
}

.desconto-info{
font-size:14px;
color:#444;
margin-top:5px;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
}

.buttons button{
padding:12px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}

.limpar{background:#444;color:white;}
.pdf{background:#ff5c6c;color:white;}
.email{background:#1abc9c;color:white;}

</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="banner.png">
</div>

<h2>Portal B2B Crazy Fantasy</h2>

<div class="menu" id="menu"></div>

<div class="search">
<input placeholder="Buscar produto..." onkeyup="buscar(this.value)">
</div>

<table>

<thead>
<tr>
<th>Foto</th>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<div class="desconto-info" id="descontoInfo"></div>

<div class="buttons">
<button class="limpar" onclick="limpar()">Limpar</button>
<button class="pdf" onclick="gerarPDF()">Gerar PDF</button>
<button class="email" onclick="enviarEmail()">Enviar Pedido</button>
</div>

</div>

<script>

let produtos=[]
let produtosVisiveis=[]
const pedidoMinimo=200

Papa.parse("produtos.csv",{

download:true,
header:true,

complete:function(results){

produtos = results.data
criarCategorias()

}

})

function criarCategorias(){

let cats=[...new Set(produtos.map(p=>p.Category).filter(Boolean))]

let menu=document.getElementById("menu")

cats.forEach(c=>{

menu.innerHTML+=`<button onclick="mostrar('${c}')">${c}</button>`

})

mostrar(cats[0])

}

function mostrar(cat){

let tabela=document.getElementById("tabela")
tabela.innerHTML=""

produtosVisiveis = produtos.filter(p=>p.Category==cat)

produtosVisiveis.forEach(p=>{

let preco=parseFloat(p.Price)||0

tabela.innerHTML+=`

<tr>

<td>
<img class="prod-img" src="${p['Image URL']||''}">
</td>

<td>${p.Name}</td>

<td>
R$ ${preco.toFixed(2)}
</td>

<td>
<input type="number" min="0" onchange="calcular()">
</td>

<td class="subtotal">0.00</td>

</tr>

`

})

}

function descontoProgressivo(total){

if(total>=1000) return 0.18
if(total>=600) return 0.15
if(total>=300) return 0.12

return 0.10

}

function calcular(){

let total=0

document.querySelectorAll("#tabela tr").forEach(l=>{

let preco=parseFloat(l.children[2].innerText.replace("R$",""))
let qtd=l.querySelector("input").value||0
let sub=preco*qtd

l.querySelector(".subtotal").innerText=sub.toFixed(2)

total+=sub

})

let desconto=descontoProgressivo(total)

let totalFinal=total*(1-desconto)

document.getElementById("total").innerText=totalFinal.toFixed(2)

let info=document.getElementById("descontoInfo")

if(total<pedidoMinimo){

info.innerHTML=`⚠ Pedido mínimo: R$ ${pedidoMinimo}`

}else{

info.innerHTML=`Desconto aplicado: ${desconto*100}%`

}

}

function buscar(txt){

txt=txt.toLowerCase()

document.querySelectorAll("#tabela tr").forEach(l=>{

let nome=l.children[1].innerText.toLowerCase()
l.style.display=nome.includes(txt)?"":"none"

})

}

function limpar(){

document.querySelectorAll("input").forEach(i=>i.value="")
document.querySelectorAll(".subtotal").forEach(s=>s.innerText="0.00")
document.getElementById("total").innerText="0.00"
document.getElementById("descontoInfo").innerHTML=""

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let y=20

doc.text("Pedido Crazy Fantasy B2B",10,10)

document.querySelectorAll("#tabela tr").forEach(l=>{

let qtd=l.querySelector("input").value

if(qtd>0){

let nome=l.children[1].innerText
let total=l.querySelector(".subtotal").innerText

doc.text(`${nome} - ${qtd} un - R$ ${total}`,10,y)

y+=8

}

})

doc.text("Total final: R$ "+document.getElementById("total").innerText,10,y+10)

doc.save("pedido.pdf")

}

function enviarEmail(){

let total=parseFloat(document.getElementById("total").innerText)

if(total<pedidoMinimo){

alert("Pedido mínimo é R$"+pedidoMinimo)

return

}

let texto="Pedido Crazy Fantasy B2B%0D%0A%0D%0A"

document.querySelectorAll("#tabela tr").forEach(l=>{

let qtd=l.querySelector("input").value

if(qtd>0){

let nome=l.children[1].innerText
let total=l.querySelector(".subtotal").innerText

texto+=`${nome} - ${qtd} un - R$ ${total}%0D%0A`

}

})

texto+="%0D%0ATotal final: R$ "+document.getElementById("total").innerText

window.location.href=`mailto:lojacrazyfantasy@hotmail.com?subject=Pedido B2B&body=${texto}`

}

</script>

</body>
</html>
