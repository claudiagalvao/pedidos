<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal B2B Crazy Fantasy</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

<div class="catalogo">

<div class="banner">
<img src="banner.png">
</div>

<div class="barraInfo">
Tabela exclusiva para parceiros • Desconto progressivo B2B
</div>

<div id="menuCategorias"></div>

<input id="busca" placeholder="🔎 Buscar produto ou SKU">

<div id="produtos" class="gridProdutos"></div>

</div>



<div class="carrinho">

<h2>
🛒 Pedido
<span id="contadorItens">(0 itens)</span>
</h2>

<div class="total">
Total B2B: R$ <span id="total">0</span>
</div>

<div class="economiaPedido">
💰 Economia: R$ <span id="economia">0</span>
</div>

<div id="proximoDesconto"></div>

<div class="barraProgresso">
<div id="barra"></div>
</div>

<div id="msgMinimo"></div>

<div id="listaPedido"></div>

<h3>Dados do Cliente</h3>

<input id="empresa" placeholder="Empresa / Razão Social">
<input id="cnpj" placeholder="CNPJ">
<input id="ie" placeholder="Inscrição Estadual">
<input id="nome" placeholder="Nome do responsável">
<input id="whatsapp" placeholder="WhatsApp">
<input id="email" placeholder="Email">

<textarea id="endereco" placeholder="Endereço completo"></textarea>

<h3>Entrega</h3>

<select id="entrega">

<option value="">Selecione</option>
<option>Correios</option>
<option>Transportadora</option>
<option>Retirada na loja</option>

</select>

<h3>Pagamento</h3>

<select id="pagamento">

<option value="">Selecione</option>
<option>PIX</option>
<option>Boleto</option>
<option>Cartão</option>
<option>Transferência bancária</option>

</select>

<h3>Observações</h3>

<textarea id="observacoes"></textarea>


<div class="botoesPedido">

<button onclick="copiarPedido()">Copiar Pedido (ERP)</button>

<button onclick="enviarWhatsApp()">WhatsApp</button>

<button onclick="gerarPDF()">Gerar PDF</button>

<button onclick="limparCarrinho()">Limpar</button>

</div>

</div>

</div>

<div class="footer">

Crazy Fantasy B2B

<br><br>

Descontos progressivos

<br>

R$200 → 10%

<br>

R$500 → 12%

<br>

R$1000 → 15%

</div>

<script src="script.js"></script>

</body>
</html>
