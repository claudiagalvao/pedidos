<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy | Catálogo B2B</title>

<link rel="stylesheet" href="estilo.css">

</head>

<body>

<div class="banner">
<img src="banner.png">
</div>

<div class="info-parceiros">

<h2>Tabela exclusiva para parceiros</h2>

<div class="info-grid">

<div class="info-box">
<h3>💰 Descontos</h3>
<p>Tabela especial para lojistas e revendedores parceiros.</p>
</div>

<div class="info-box">
<h3>📦 Pedido mínimo</h3>
<p>Pedidos a partir de <strong>R$200</strong>.</p>
</div>

<div class="info-box">
<h3>🚚 Frete</h3>
<p>Frete calculado após envio do pedido.</p>
</div>

<div class="info-box">
<h3>💳 Pagamento</h3>
<p>PIX, boleto ou cartão.</p>
</div>

</div>

</div>

<div class="menu">

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('Perucas')">Perucas</button>
<button onclick="filtrar('Acessórios')">Acessórios</button>
<button onclick="filtrar('Maquiagem')">Maquiagem</button>

</div>

<div class="catalogo">

<h1>Catálogo Crazy Fantasy</h1>

<div id="produtos"></div>

</div>

<div class="carrinho">

<h2>Pedido</h2>

<div id="lista"></div>

<h3 id="total">Total: R$0</h3>

<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>

<form>

<input placeholder="Empresa">

<input placeholder="Nome">

<input placeholder="Email">

<button type="button" onclick="enviarPedido()">
Enviar Pedido
</button>

</form>

</div>

<script>

let produtos={}
let carrinho=[]

/* CARREGAR CSV */

fetch("produtos.csv")

.then(res=>res.text())

.then(text=>{

let linhas=text.trim().split("\n")

linhas.slice(1).forEach(linha=>{

let [categoria,nome,variacao,preco]=linha.split(",")

if(!produtos[nome]){

produtos[nome]={

categoria:categoria,
preco:parseFloat(preco),
variacoes:[]
}

}

produtos[nome].variacoes.push(variacao)

})

render(produtos)

})

/* RENDER PRODUTOS */

function render(lista){

let div=document.getElementById("produtos")

div.innerHTML=""

for(let nome in lista){

let p=lista[nome]

let html=`

<div class="produto">

<h3>${nome}</h3>

<select id="var-${nome}">

${p.variacoes.map(v=>`<option>${v}</option>`).join("")}

</select>

<input type="number" value="1" min="1" id="qtd-${nome}">

<button onclick="add('${nome}')">Adicionar</button>

</div>

`

div.innerHTML+=html

}

}

/* ADICIONAR AO CARRINHO */

function add(nome){

let qtd=parseInt(document.getElementById("qtd-"+nome).value)

let produto=produtos[nome]

let item=carrinho.find(i=>i.nome==nome)

if(item){

item.qtd+=qtd

}else{

carrinho.push({

nome:nome,
preco:produto.preco,
qtd:qtd

})

}

renderCarrinho()

}

/* ATUALIZAR CARRINHO */

function renderCarrinho(){

let lista=document.getElementById("lista")

lista.innerHTML=""

let total=0

carrinho.forEach(i=>{

lista.innerHTML+=`${i.nome} x${i.qtd}<br>`

total+=i.preco*i.qtd

})

document.getElementById("total").innerText="Total: R$"+total.toFixed(2)

let barra=Math.min((total/200)*100,100)

document.getElementById("barra").style.width=barra+"%"

}

/* ENVIAR PEDIDO */

function enviarPedido(){

let texto="Pedido Crazy Fantasy\n\n"

carrinho.forEach(i=>{

texto+=`${i.nome} x${i.qtd}\n`

})

let url="https://wa.me/?text="+encodeURIComponent(texto)

window.open(url)

}

/* FILTRO MENU */

function filtrar(cat){

if(cat=="todos"){

render(produtos)

return

}

let filtrados={}

for(let nome in produtos){

if(produtos[nome].categoria==cat){

filtrados[nome]=produtos[nome]

}

}

render(filtrados)

}

</script>

</body>
</html>
