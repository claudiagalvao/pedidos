<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy - Catálogo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fb;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:20px 0;
}

.menu button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#e4dcff;
cursor:pointer;
}

.menu button:hover{
background:#cfc4ff;
}

.search input{
padding:12px;
width:100%;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#e4dcff;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.prod-img{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;
}

.desconto{
background:#fff1f3;
}

.preco-antigo{
text-decoration:line-through;
color:#888;
}

.preco-desc{
color:#e60023;
font-weight:bold;
}

.badge{
background:#e60023;
color:white;
padding:3px 6px;
border-radius:6px;
font-size:11px;
margin-left:6px;
}

.total{
font-size:22px;
text-align:right;
margin-top:20px;
font-weight:bold;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.limpar{background:#444;color:white;}
.pdf{background:#ff4d6d;color:white;}
.enviar{background:#00c897;color:white;}

select{
padding:6px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="banner.png">
</div>

<h2>Catálogo de Produtos</h2>

<div class="menu" id="menu"></div>

<div class="search">
<input type="text" placeholder="Buscar produto..." onkeyup="buscar(this.value)">
</div>

<form action="https://formsubmit.co/lojacrazyfantasy@hotmail.com" method="POST">

<input type="hidden" name="pedido" id="pedido_email">

<table>

<thead>
<tr>
<th>Foto</th>
<th>Produto</th>
<th>Variação</th>
<th>Preço</th>
<th>Preço c/ desconto</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<div class="buttons">

<button type="button" class="limpar" onclick="limpar()">Limpar</button>

<button type="button" class="pdf" onclick="gerarPDF()">Gerar PDF</button>

<button type="submit" class="enviar" onclick="prepararEmail()">Enviar Pedido</button>

</div>

</form>

</div>

<script>

const produtos = [

{codigo:"PRD00019",nome:"Barba Papai Noel",categoria:"Barbas",preco:49.99,cor:"N/D",modelo:"N/D",tamanho:"N/D"},
{codigo:"PRD00002",nome:"Bastão Arlequina",categoria:"Acessórios",preco:49.9,cor:"N/D",modelo:"N/D",tamanho:"N/D"},
{codigo:"PRD00021",nome:"Colar Steampunk",categoria:"Acessórios",preco:39.99,cor:"N/D",modelo:"N/D",tamanho:"N/D"},
{codigo:"PRD00011",nome:"Coroa Rainha",categoria:"Coroas",preco:19.99,cor:"Dourada",modelo:"Luxo",tamanho:"N/D"},
{codigo:"PRD00010",nome:"Coroa Rei",categoria:"Coroas",preco:12.99,cor:"Dourada",modelo:"Luxo",tamanho:"N/D"}

]

let categoriaAtual = null

function gerarMenu(){

const categorias=[...new Set(produtos.map(p=>p.categoria))]

const menu=document.getElementById("menu")

categorias.forEach(cat=>{
menu.innerHTML+=`<button onclick="mostrarCategoria('${cat}')">${cat}</button>`
})

categoriaAtual=categorias[0]
render()

}

function mostrarCategoria(cat){

categoriaAtual=cat
render()

}

function render(){

const tabela=document.getElementById("tabela")
tabela.innerHTML=""

produtos
.filter(p=>p.categoria===categoriaAtual)
.forEach(p=>{

let preco=p.preco
let desconto=preco>200?preco*0.9:preco

let variacoes=[]

if(p.cor!="N/D") variacoes.push(p.cor)
if(p.modelo!="N/D") variacoes.push(p.modelo)
if(p.tamanho!="N/D") variacoes.push(p.tamanho)

let selectHTML="—"

if(variacoes.length>0){

selectHTML=`<select>${variacoes.map(v=>`<option>${v}</option>`).join("")}</select>`

}

tabela.innerHTML+=`

<tr class="${preco>200?'desconto':''}">

<td>
<img src="produtos/${p.codigo}.jpg" class="prod-img">
</td>

<td>${p.nome}</td>

<td>${selectHTML}</td>

<td class="${preco>200?'preco-antigo':''}">
${preco.toFixed(2)}
</td>

<td class="preco-desc">
${desconto.toFixed(2)}
${preco>200?'<span class="badge">10% OFF</span>':''}
</td>

<td>
<input type="number" min="0" onchange="calcular()">
</td>

<td class="subtotal">0.00</td>

</tr>

`

})

}

function calcular(){

let total=0

document.querySelectorAll("#tabela tr").forEach(linha=>{

let preco=parseFloat(linha.children[4].innerText)
let qtd=linha.querySelector("input").value||0

let subtotal=preco*qtd

linha.querySelector(".subtotal").innerText=subtotal.toFixed(2)

total+=subtotal

})

document.getElementById("total").innerText=total.toFixed(2)

}

function limpar(){

document.querySelectorAll("input[type=number]").forEach(i=>i.value="")
document.querySelectorAll(".subtotal").forEach(i=>i.innerText="0.00")
document.getElementById("total").innerText="0.00"

}

function prepararEmail(){

let resumo="Pedido Crazy Fantasy\n\n"

document.querySelectorAll("#tabela tr").forEach(linha=>{

let produto=linha.children[1].innerText
let variacao=linha.children[2].innerText
let qtd=linha.querySelector("input").value

if(qtd>0){

resumo+=produto+" - "+variacao+" - "+qtd+" unidades\n"

}

})

resumo+="\nTOTAL: R$ "+document.getElementById("total").innerText

document.getElementById("pedido_email").value=resumo

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let pdf=new jsPDF()

pdf.text("Pedido Crazy Fantasy",20,20)

let y=40

document.querySelectorAll("#tabela tr").forEach(linha=>{

let produto=linha.children[1].innerText
let qtd=linha.querySelector("input").value

if(qtd>0){

pdf.text(produto+" - "+qtd,20,y)
y+=10

}

})

pdf.text("Total: R$ "+document.getElementById("total").innerText,20,y+10)

pdf.save("pedido.pdf")

}

function buscar(texto){

texto=texto.toLowerCase()

document.querySelectorAll("#tabela tr").forEach(linha=>{

const nome=linha.children[1].innerText.toLowerCase()

linha.style.display=nome.includes(texto)?"":"none"

})

}

gerarMenu()

</script>

</body>
</html>
