<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy | Catálogo B2B</title>

<style>

body{
font-family: Arial;
background:#0b0b0b;
margin:0;
color:white;
}

.banner img{
width:100%;
display:block;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.search{
width:100%;
padding:14px;
border-radius:8px;
border:none;
font-size:16px;
margin-bottom:20px;
}

.categories{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.categories button{
background:#1c1c1c;
color:white;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
}

.categories button:hover{
background:#ff0066;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:25px;
}

.card{
background:#1a1a1a;
padding:18px;
border-radius:10px;
}

.card h3{
margin-top:0;
}

.card input{
width:60px;
padding:5px;
}

.card button{
margin-top:10px;
background:#ff0066;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.cart{
margin-top:40px;
background:#111;
padding:25px;
border-radius:10px;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.form{
display:grid;
gap:10px;
margin-top:15px;
}

.form input{
padding:10px;
border-radius:6px;
border:none;
}

.send{
background:#00c853;
padding:12px;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="banner">
<img src="banner.png">
</div>

<div class="container">

<input class="search" id="search" placeholder="Buscar produto...">

<div class="categories" id="categories"></div>

<div class="products" id="products"></div>

<div class="cart">

<h2>Pedido</h2>

<div id="cart"></div>

<div class="total" id="total">Total: R$0</div>

<div class="form">

<input id="empresa" placeholder="Empresa">
<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="email" placeholder="Email">

<button class="send" onclick="enviar()">Enviar Pedido</button>

</div>

</div>

</div>

<script>

let produtos=[]
let carrinho=[]

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRi59vKsbA6E1scWbYOexo2YInRb22e20v5u3sfKc6gdGrciEvdSa7--OfIP-P_xatipf52xeM28MrN/pub?output=csv")

.then(res=>res.text())

.then(text=>{

let linhas=text.trim().split("\n")

for(let i=1;i<linhas.length;i++){

let c=linhas[i].split(",")

produtos.push({

categoria:c[0],
nome:c[1],
preco:parseFloat(c[2])

})

}

renderCategorias()
renderProdutos(produtos)

})

function renderCategorias(){

let cats=[...new Set(produtos.map(p=>p.categoria))]

let div=document.getElementById("categories")

cats.forEach(cat=>{

let b=document.createElement("button")

b.innerText=cat

b.onclick=()=>{

renderProdutos(produtos.filter(p=>p.categoria==cat))

}

div.appendChild(b)

})

}

function renderProdutos(lista){

let div=document.getElementById("products")

div.innerHTML=""

lista.forEach(p=>{

let id=p.nome.replace(/\s/g,'')

let el=document.createElement("div")

el.className="card"

el.innerHTML=`

<h3>${p.nome}</h3>

<div>R$ ${p.preco.toFixed(2)}</div>

<input type="number" value="1" min="1" id="${id}">

<br>

<button onclick="add('${p.nome}',${p.preco},'${id}')">Adicionar</button>

`

div.appendChild(el)

})

}

function add(nome,preco,id){

let qtd=parseInt(document.getElementById(id).value)

let item=carrinho.find(i=>i.nome==nome)

if(item){

item.qtd+=qtd

}else{

carrinho.push({nome,preco,qtd})

}

renderCarrinho()

}

function renderCarrinho(){

let div=document.getElementById("cart")

div.innerHTML=""

let total=0

carrinho.forEach(i=>{

div.innerHTML+=`${i.nome} x${i.qtd} - R$ ${(i.preco*i.qtd).toFixed(2)}<br>`

total+=i.preco*i.qtd

})

document.getElementById("total").innerText="Total: R$"+total.toFixed(2)

}

function enviar(){

let texto="Pedido Crazy Fantasy\n\n"

carrinho.forEach(i=>{

texto+=`${i.nome} x${i.qtd}\n`

})

let url="https://wa.me/?text="+encodeURIComponent(texto)

window.open(url)

}

document.getElementById("search")

.addEventListener("input",function(){

let t=this.value.toLowerCase()

renderProdutos(produtos.filter(p=>p.nome.toLowerCase().includes(t)))

})

</script>

</body>
</html>
