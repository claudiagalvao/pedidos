<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy | Portal B2B</title>

<link rel="stylesheet" href="estilo.css">

</head>

<body>

<div class="catalogo">

<h1>Catálogo Crazy Fantasy</h1>

<div id="produtos"></div>

</div>

<div class="carrinho">

<h2>Pedido</h2>

<div id="lista"></div>

<h3 id="total">Total: R$0</h3>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<p id="faltam"></p>

<form action="https://formsubmit.co/lojacrazyfantasy@hotmailcom" method="POST">

<input type="hidden" name="pedido" id="pedido">

<input type="text" name="empresa" placeholder="Empresa" required>

<input type="text" name="nome" placeholder="Nome" required>

<input type="email" name="email" placeholder="Email" required>

<button type="submit">Enviar Pedido</button>

</form>

</div>

<script>

let produtos={}
let carrinho=[]
const minimo=200

fetch("produtos.csv")

.then(r=>r.text())

.then(text=>{

let linhas=text.trim().split("\n").slice(1)

linhas.forEach(l=>{

let c=l.split(",")

let categoria=c[0]
let nome=c[1]
let variacao=c[2]
let preco=parseFloat(c[3])

if(!produtos[nome]){

produtos[nome]={variacoes:[],preco}

}

produtos[nome].variacoes.push(variacao)

})

render()

})

function render(){

let div=document.getElementById("produtos")

for(let nome in produtos){

let p=produtos[nome]

let html=`
<div class="produto">

<h3>${nome}</h3>

<select id="var-${nome}">
${p.variacoes.map(v=>`<option>${v}</option>`).join("")}
</select>

<br>

<input type="number" value="1" min="1" id="qtd-${nome}">

<br>

<button onclick="add('${nome}',${p.preco})">
Adicionar
</button>

</div>
`

div.innerHTML+=html

}

}

function add(nome,preco){

let variacao=document.getElementById("var-"+nome).value
let qtd=parseInt(document.getElementById("qtd-"+nome).value)

carrinho.push({nome,variacao,qtd,preco})

renderCarrinho()

}

function renderCarrinho(){

let div=document.getElementById("lista")
div.innerHTML=""

let total=0

carrinho.forEach(i=>{

div.innerHTML+=`${i.nome} (${i.variacao}) x${i.qtd}<br>`

total+=i.qtd*i.preco

})

document.getElementById("total").innerText="Total: R$"+total.toFixed(2)

let perc=Math.min((total/minimo)*100,100)

document.getElementById("progress").style.width=perc+"%"

if(total<minimo){

document.getElementById("faltam").innerText=
"Faltam R$"+(minimo-total).toFixed(2)+" para o pedido mínimo"

}else{

document.getElementById("faltam").innerText="Pedido mínimo atingido"

}

document.getElementById("pedido").value=JSON.stringify(carrinho)

}

</script>

</body>
</html>
