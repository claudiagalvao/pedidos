<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy - Catálogo</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f6fb;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

h2{
margin-top:40px;
}

.form-box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

input{
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#e4dcff;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.desconto{
background:#fff1f3;
}

.preco-antigo{
text-decoration:line-through;
color:#888;
}

.preco-desc{
color:#e60023;
font-weight:bold;
}

.badge{
background:#e60023;
color:white;
padding:3px 6px;
border-radius:6px;
font-size:11px;
margin-left:6px;
}

.total{
font-size:22px;
text-align:right;
margin-top:20px;
font-weight:bold;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.limpar{background:#444;color:white;}
.enviar{background:#00c897;color:white;}

</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="banner.png">
</div>

<h2>Pedido para Parceiros & Revendedores</h2>

<div class="form-box">

<div class="grid">

<input placeholder="Empresa">
<input placeholder="CNPJ">
<input placeholder="Contato">
<input placeholder="Telefone">
<input placeholder="Email">

</div>

</div>

<div id="catalogo"></div>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<div class="buttons">
<button class="limpar" onclick="limpar()">Limpar</button>
<button class="enviar">Enviar Pedido</button>
</div>

</div>

<script>

const catalogo={

"Fantasias Femininas":[
["Arlequina",180],
["Elsa",269.9],
["Rapunzel",269.9],
["Cinderela",269.9]
],

"Fantasias Masculinas":[
["Batman",199.9],
["Homem Aranha",199.9],
["Super Homem",209.9]
],

"Acessórios":[
["Varinha",39.9],
["Coroa",29.9],
["Capa",59.9]
]

}

const divCatalogo=document.getElementById("catalogo")

Object.keys(catalogo).forEach(categoria=>{

let html=`<h2>${categoria}</h2>`

html+=`
<table>

<tr>
<th>Produto</th>
<th>Preço</th>
<th>Preço c/ desconto</th>
<th>Qtd</th>
<th>Total</th>
</tr>
`

catalogo[categoria].forEach(p=>{

let preco=p[1]
let desconto=preco>200?preco*0.9:preco
let temDesconto=preco>200

html+=`

<tr class="${temDesconto?'desconto':''}">

<td>${p[0]}</td>

<td class="${temDesconto?'preco-antigo':''}">
${preco.toFixed(2)}
</td>

<td class="preco-desc">
${desconto.toFixed(2)}
${temDesconto?'<span class="badge">10% OFF</span>':''}
</td>

<td>
<input type="number" min="0" class="qtd" onchange="calcular()">
</td>

<td class="subtotal">0.00</td>

</tr>
`

})

html+=`</table>`

divCatalogo.innerHTML+=html

})

function calcular(){

let total=0

document.querySelectorAll("table tr").forEach((linha,i)=>{

if(linha.querySelector(".qtd")){

let preco=parseFloat(linha.children[2].innerText)

let qtd=parseInt(linha.querySelector(".qtd").value)||0

let subtotal=preco*qtd

linha.querySelector(".subtotal").innerText=subtotal.toFixed(2)

total+=subtotal

}

})

document.getElementById("total").innerText=total.toFixed(2)

}

function limpar(){

document.querySelectorAll(".qtd").forEach(q=>q.value="")
document.querySelectorAll(".subtotal").forEach(s=>s.innerText="0.00")
document.getElementById("total").innerText="0.00"

}

</script>

</body>
</html>
