<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Crazy Fantasy B2B</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="banner">

<img src="banner.jpg">

</header>


<section class="info">

<h2>Tabela exclusiva para parceiros</h2>

<div class="cards-info">

<div>
<h3>💰 Descontos</h3>
<p>Tabela especial para lojistas e revendedores parceiros.</p>
</div>

<div>
<h3>📦 Pedido mínimo</h3>
<p>Pedidos a partir de R$200</p>
</div>

<div>
<h3>🚚 Frete</h3>
<p>Frete calculado após envio do pedido</p>
</div>

</div>

</section>


<div class="container">

<div class="catalogo">

<h2>Catálogo Crazy Fantasy</h2>

<input id="busca" placeholder="🔎 Buscar produto...">

<div id="produtos"></div>

</div>


<aside class="carrinho">

<h2>Pedido</h2>

<div id="listaPedido"></div>

<div class="total">

Total: R$ <span id="total">0</span>

</div>

<div class="progresso">

<div id="barra"></div>

</div>

<p id="msgMinimo"></p>


<input placeholder="Empresa">
<input placeholder="Nome">
<input placeholder="Email">

<button class="btnEnviar">

Enviar Pedido

</button>

</aside>

</div>


<script src="script.js"></script>

</body>
</html>
