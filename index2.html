<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy - Catálogo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fb;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:20px 0;
}

.menu button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#e4dcff;
cursor:pointer;
}

.search input{
padding:12px;
width:100%;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#e4dcff;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.prod-img{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;
}

.var{
font-size:12px;
color:#555;
}

.preco-desc{
color:#e60023;
font-weight:bold;
}

.total{
font-size:22px;
text-align:right;
margin-top:20px;
font-weight:bold;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.limpar{background:#444;color:white;}
.pdf{background:#ff4d6d;color:white;}
.enviar{background:#00c897;color:white;}

</style>

</head>

<body>

<div class="container">

<div class="banner">
<img src="banner.png">
</div>

<h2>Catálogo de Produtos</h2>

<div class="menu" id="menu"></div>

<div class="search">
<input type="text" placeholder="Buscar produto..." onkeyup="buscar(this.value)">
</div>

<table>

<thead>

<tr>
<th>Foto</th>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<div class="buttons">

<button class="limpar" onclick="limpar()">Limpar</button>
<button class="pdf" onclick="gerarPDF()">Gerar PDF</button>

</div>

</div>

<script>

const produtos = [

{cod:"PRD00019",nome:"Barba de Papai Noel Branca com Bigode Acessório Fantasia Natal",cat:"Barbas e Bigodes",preco:49.99,cor:"N/D",modelo:"N/D",tam:"N/D"},

{cod:"PRD00002",nome:"Bastão Taco Fantasia Cosplay Festa Vilã Arlequina Good Night 80cm",cat:"Acessórios Gerais",preco:49.9,cor:"N/D",modelo:"N/D",tam:"N/D"},

{cod:"PRD00021",nome:"Colar Vitoriano Steampunk com Relógio Vintage",cat:"Acessórios Gerais",preco:39.99,cor:"N/D",modelo:"N/D",tam:"N/D"},

{cod:"PRD00011",nome:"Coroa de Rainha Dourada Luxo",cat:"Coroas,Tiaras e Varinhas",preco:19.99,cor:"Dourada",modelo:"Luxo",tam:"N/D"},

{cod:"PRD00010",nome:"Coroa de Rei Dourada Luxo",cat:"Coroas,Tiaras e Varinhas",preco:12.99,cor:"Dourada",modelo:"Luxo",tam:"N/D"}

]

let categoriaAtual="Barbas e Bigodes"

function gerarMenu(){

const cats=[...new Set(produtos.map(p=>p.cat))]

const menu=document.getElementById("menu")

cats.forEach(c=>{
menu.innerHTML+=`<button onclick="mostrar('${c}')">${c}</button>`
})

mostrar(cats[0])

}

function mostrar(cat){

categoriaAtual=cat

const tabela=document.getElementById("tabela")
tabela.innerHTML=""

produtos
.filter(p=>p.cat===cat)
.forEach(p=>{

let variacoes=""

if(p.cor!="N/D") variacoes+="<div class='var'>Cor: "+p.cor+"</div>"
if(p.modelo!="N/D") variacoes+="<div class='var'>Modelo: "+p.modelo+"</div>"
if(p.tam!="N/D") variacoes+="<div class='var'>Tamanho: "+p.tam+"</div>"

tabela.innerHTML+=`

<tr>

<td>
<img src="produtos/${p.cod}.jpg" class="prod-img">
</td>

<td>
${p.nome}
${variacoes}
</td>

<td class="preco-desc">
${p.preco.toFixed(2)}
</td>

<td>
<input type="number" min="0" onchange="calcular()">
</td>

<td class="subtotal">0.00</td>

</tr>
`

})

}

function calcular(){

let total=0

document.querySelectorAll("#tabela tr").forEach(l=>{

let preco=parseFloat(l.children[2].innerText)

let qtd=l.querySelector("input").value||0

let sub=preco*qtd

l.querySelector(".subtotal").innerText=sub.toFixed(2)

total+=sub

})

document.getElementById("total").innerText=total.toFixed(2)

}

function limpar(){

document.querySelectorAll("input").forEach(i=>i.value="")
document.querySelectorAll(".subtotal").forEach(i=>i.innerText="0.00")

document.getElementById("total").innerText="0.00"

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let pdf=new jsPDF()

pdf.text("Pedido Crazy Fantasy",20,20)

let y=40

document.querySelectorAll("#tabela tr").forEach(l=>{

let nome=l.children[1].innerText
let qtd=l.querySelector("input").value

if(qtd>0){

pdf.text(nome+" - "+qtd,20,y)
y+=10

}

})

pdf.text("Total: R$ "+document.getElementById("total").innerText,20,y+10)

pdf.save("pedido.pdf")

}

function buscar(txt){

txt=txt.toLowerCase()

document.querySelectorAll("#tabela tr").forEach(l=>{

let nome=l.children[1].innerText.toLowerCase()

l.style.display=nome.includes(txt)?"":"none"

})

}

gerarMenu()

</script>

</body>
</html>
