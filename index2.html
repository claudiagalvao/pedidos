<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Portal B2B Crazy Fantasy</title>

<style>

body{
font-family:Arial;
background:#f6f6f6;
margin:0;
padding:30px;
}

.banner img{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

.topo{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.info-b2b{
background:#eef2ff;
color:#4c51bf;
padding:8px 12px;
border-radius:6px;
font-size:13px;
display:inline-block;
margin-top:5px;
}

.progress-container{
width:100%;
height:12px;
background:#eee;
border-radius:10px;
margin-top:8px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:red;
transition:0.4s;
}

.categorias button{
margin:5px;
padding:8px 14px;
border-radius:20px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.busca input{
width:100%;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
margin-top:10px;
}

.container{
display:flex;
gap:20px;
}

.tabela{
flex:1;
background:white;
padding:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#c9b8e9;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

td a{
text-decoration:none;
color:#333;
font-weight:bold;
}

td a:hover{
text-decoration:underline;
}

.carrinho{
width:260px;
background:white;
padding:20px;
border-radius:10px;
}

.btn{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.whats{
background:#25D366;
color:white;
}

.email{
background:#6c63ff;
color:white;
}

.rodape{
margin-top:40px;
padding:25px;
background:#111;
color:white;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
border-radius:10px;
}

.rodape a{
color:#ddd;
text-decoration:none;
margin-right:15px;
}

.rodape a:hover{
color:white;
}

</style>

</head>

<body>

<div class="banner">
<img src="banner.jpg">
</div>

<div class="topo">

<h2>Portal B2B Crazy Fantasy</h2>

<div class="info-b2b">
Tabela exclusiva para lojistas • Frete FOB
</div>

<p>Pedido mínimo: R$200</p>

<div class="progress-container">
<div class="progress-bar" id="barra"></div>
</div>

<p id="textoBarra">Faltam R$200</p>

<div class="categorias">

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('Kits')">Kits</button>
<button onclick="filtrar('Perucas')">Perucas</button>
<button onclick="filtrar('Barbas')">Barbas</button>
<button onclick="filtrar('Acessórios')">Acessórios</button>
<button onclick="filtrar('Maquiagem')">Maquiagem</button>

</div>

<div class="busca">
<input type="text" placeholder="Buscar produto..." onkeyup="buscar(this.value)">
</div>

</div>

<div class="container">

<div class="tabela">

<table>

<thead>
<tr>
<th>Produto</th>
<th>Preço B2B</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

<div class="carrinho">

<h3>Pedido</h3>

Itens: <span id="itens">0</span>

<h2>R$ <span id="total">0</span></h2>

<button class="btn whats" onclick="enviarWhats()">
Enviar pedido WhatsApp
</button>

<form action="https://formsubmit.co/vendas@crazyfantasy.com.br" method="POST">

<input type="hidden" name="pedido" id="pedidoEmail">

<button class="btn email" onclick="prepararEmail()" type="submit">
Enviar pedido por Email
</button>

</form>

</div>

</div>

<footer class="rodape">

<div>

<strong>Crazy Fantasy</strong><br>
Fantasia, acessórios e maquiagem para festas e eventos.<br>
Portal B2B para empresas e escolas.

</div>

<div>

<a href="https://crazyfantasy.com.br" target="_blank">
Visitar Loja
</a>

<a href="https://instagram.com/crazyfantasy" target="_blank">
Instagram
</a>

<a href="https://wa.me/551999999999">
WhatsApp
</a>

</div>

</footer>

<script>

let produtos=[]
let carrinho={}

fetch("produtos.csv")
.then(res=>res.text())
.then(text=>{

let linhas=text.split("\n").slice(1)

linhas.forEach(l=>{

let c=l.split(",")

produtos.push({
nome:c[0],
preco:parseFloat(c[1]),
categoria:c[2],
link:c[3]
})

})

render(produtos)

})

function render(lista){

let html=""

lista.forEach((p,i)=>{

html+=`
<tr>

<td>
<a href="${p.link}" target="_blank">
${p.nome} 🔗
</a>
</td>

<td>R$ ${p.preco}</td>

<td>
<input type="number" min="0"
onchange="add(${i},this.value)">
</td>

<td id="t${i}">0</td>

</tr>
`

})

document.getElementById("lista").innerHTML=html

}

function filtrar(cat){

if(cat=="todos"){
render(produtos)
return
}

render(produtos.filter(p=>p.categoria==cat))

}

function buscar(txt){

txt=txt.toLowerCase()

render(produtos.filter(p=>
p.nome.toLowerCase().includes(txt)
))

}

function add(i,qtd){

qtd=parseInt(qtd)||0

let total=qtd*produtos[i].preco

document.getElementById("t"+i).innerText=total

carrinho[i]=total

atualizar()

}

function atualizar(){

let total=0
let itens=0

for(let i in carrinho){

total+=carrinho[i]

if(carrinho[i]>0) itens++

}

document.getElementById("total").innerText=total
document.getElementById("itens").innerText=itens

let minimo=200

let barra=document.getElementById("barra")

let progresso=(total/minimo)*100

if(progresso>100) progresso=100

barra.style.width=progresso+"%"

if(progresso<40) barra.style.background="red"
else if(progresso<100) barra.style.background="orange"
else barra.style.background="green"

let falta=minimo-total

document.getElementById("textoBarra").innerText=

falta>0
? "Faltam R$"+falta+" para o pedido mínimo"
: "Pedido mínimo atingido"

}

function enviarWhats(){

let msg="Pedido Crazy Fantasy%0A%0A"

for(let i in carrinho){

if(carrinho[i]>0){

msg+=produtos[i].nome+"%0A"

}

}

msg+="%0ATotal: R$"+document.getElementById("total").innerText

window.open(
"https://wa.me/551999999999?text="+msg
)

}

function prepararEmail(){

let msg="Pedido Crazy Fantasy\n\n"

for(let i in carrinho){

if(carrinho[i]>0){

msg+=produtos[i].nome+"\n"

}

}

msg+="\nTotal: R$"+document.getElementById("total").innerText

document.getElementById("pedidoEmail").value = msg

}

</script>

</body>
</html>
