<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy Catálogo</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fb;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:20px 0;
}

.menu button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#e4dcff;
cursor:pointer;
}

.search input{
padding:12px;
width:100%;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#e4dcff;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.prod-img{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;
}

.var{
font-size:12px;
color:#666;
}

.total{
font-size:22px;
text-align:right;
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="banner">
<img src="banner.png">
</div>

<h2>Catálogo de Produtos</h2>

<div class="menu" id="menu"></div>

<div class="search">
<input type="text" placeholder="Buscar produto..." onkeyup="buscar(this.value)">
</div>

<table>

<thead>

<tr>
<th>Foto</th>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

</div>

<script>

let produtos=[]

fetch("produtos.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

let workbook = XLSX.read(data,{type:"array"})

let sheet = workbook.Sheets[workbook.SheetNames[0]]

produtos = XLSX.utils.sheet_to_json(sheet)

gerarMenu()

})

function gerarMenu(){

let cats=[...new Set(produtos.map(p=>p["Família de Produto"]))]

const menu=document.getElementById("menu")

cats.forEach(c=>{

menu.innerHTML+=`<button onclick="mostrar('${c}')">${c}</button>`

})

mostrar(cats[0])

}

function mostrar(cat){

const tabela=document.getElementById("tabela")

tabela.innerHTML=""

produtos
.filter(p=>p["Família de Produto"]==cat)
.forEach(p=>{

let variacoes=""

if(p["Característica - Cor"]!="N/D")
variacoes+="<div class='var'>Cor: "+p["Característica - Cor"]+"</div>"

if(p["Característica - Modelo"]!="N/D")
variacoes+="<div class='var'>Modelo: "+p["Característica - Modelo"]+"</div>"

if(p["Característica - Tamanho"]!="N/D")
variacoes+="<div class='var'>Tamanho: "+p["Característica - Tamanho"]+"</div>"

let preco=parseFloat(p["Preço Unitário de Venda"])

tabela.innerHTML+=`

<tr>

<td>
<img src="produtos/${p["Código do Produto"]}.jpg" class="prod-img">
</td>

<td>
${p["Descrição do Produto"]}
${variacoes}
</td>

<td>${preco.toFixed(2)}</td>

<td>
<input type="number" min="0" onchange="calcular()">
</td>

<td class="subtotal">0.00</td>

</tr>

`

})

}

function calcular(){

let total=0

document.querySelectorAll("#tabela tr").forEach(l=>{

let preco=parseFloat(l.children[2].innerText)

let qtd=l.querySelector("input").value||0

let sub=preco*qtd

l.querySelector(".subtotal").innerText=sub.toFixed(2)

total+=sub

})

document.getElementById("total").innerText=total.toFixed(2)

}

function buscar(txt){

txt=txt.toLowerCase()

document.querySelectorAll("#tabela tr").forEach(l=>{

let nome=l.children[1].innerText.toLowerCase()

l.style.display=nome.includes(txt)?"":"none"

})

}

</script>

</body>
</html>
