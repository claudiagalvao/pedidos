<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Portal B2B Crazy Fantasy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.container{
width:1200px;
margin:auto;
}

.banner{
width:100%;
margin-top:20px;
border-radius:10px;
}

.info{
color:#6a5acd;
font-weight:bold;
margin-top:10px;
}

.descontoInfo{
background:#efe8ff;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.categorias{
margin-top:15px;
}

.catbtn{
background:#ddd3f5;
border:none;
padding:8px 14px;
margin:4px;
border-radius:8px;
cursor:pointer;
}

.search{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:10px;
}

.layout{
display:flex;
gap:20px;
margin-top:10px;
}

.produtos{
flex:3;
}

.carrinho{
flex:1;
background:white;
padding:20px;
border-radius:10px;
height:fit-content;
}

.carrinho button{
width:100%;
margin-top:8px;
}

table{
width:100%;
background:white;
border-radius:10px;
margin-top:10px;
}

th{
background:#ddd3f5;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

.prodimg{
width:60px;
border-radius:6px;
}

.precoOriginal{
text-decoration:line-through;
color:#999;
font-size:12px;
}

.precoB2B{
color:#e60023;
font-weight:bold;
}

.b2bLabel{
font-size:11px;
color:#555;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btnclear{background:#444;color:white;}
.btnpdf{background:#ff5b6b;color:white;}
.btnsend{background:#27ae60;color:white;}

</style>

</head>

<body>

<div class="container">

<img src="banner.png" class="banner">

<h1>Portal B2B Crazy Fantasy</h1>

<p class="info">
✔ Preços exclusivos para parceiros e revendedores
</p>

<div class="descontoInfo">
Descontos automáticos:
<br>10% padrão B2B
<br>12% acima de R$500
<br>15% acima de R$1000
</div>

<div id="categorias" class="categorias"></div>

<input type="text" id="busca" class="search" placeholder="Buscar produto...">

<div class="layout">

<div class="produtos">

<table>

<thead>
<tr>
<th>Foto</th>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

<div class="carrinho">

<h3>Carrinho</h3>

<h2>Total: R$ <span id="total">0</span></h2>

<p>Desconto aplicado: <b><span id="desconto">10%</span></b></p>

<button class="btnclear" onclick="limpar()">Limpar</button>
<button class="btnpdf" onclick="gerarPDF()">Gerar PDF</button>
<button class="btnsend" onclick="enviar()">Enviar Pedido</button>

</div>

</div>

</div>

<script>

let produtos=[]
let carrinho={}
let desconto=0.10

Papa.parse("produtos.csv",{

download:true,
header:true,

complete:function(res){

let data=res.data
let agrupado={}

data.forEach(p=>{

let id=p["Identificador URL"]

if(!id)return

if(!agrupado[id]){

agrupado[id]={

nome:p["Nome"],
categoria:p["Categorias"] || "Outros",
preco:parseFloat(p["Preço"]) || 0,
imagem:p["Imagem 1"] || "",
variacoes:[]

}

}

let v=p["Valor da variação 1"]

if(v) agrupado[id].variacoes.push(v)

})

produtos=Object.values(agrupado)

renderCategorias()
renderProdutos(produtos)

}

})

function renderCategorias(){

let cats=[...new Set(produtos.map(p=>p.categoria))]

let html=""

cats.forEach(c=>{

html+=`<button class="catbtn" onclick="filtrar('${c}')">${c}</button>`

})

document.getElementById("categorias").innerHTML=html

}

function filtrar(cat){

let filtrados=produtos.filter(p => p.categoria && p.categoria.includes(cat))

renderProdutos(filtrados)

}

function renderProdutos(lista){

let html=""

lista.forEach((p,i)=>{

let precoOriginal=p.preco
let precoB2B=p.preco*(1-desconto)

let variacaoHTML=""

if(p.variacoes.length){

variacaoHTML=`<select>
<option>Selecionar</option>
${p.variacoes.map(v=>`<option>${v}</option>`).join("")}
</select>`

}

let img=p.imagem ? `<img src="${p.imagem}" class="prodimg">` : ""

html+=`

<tr>

<td>${img}</td>

<td>
${p.nome}<br>
${variacaoHTML}
</td>

<td>

<span class="precoOriginal">
R$ ${precoOriginal.toFixed(2)}
</span>

<br>

<span class="precoB2B">
R$ ${precoB2B.toFixed(2)}
</span>

<br>

<span class="b2bLabel">Preço B2B</span>

</td>

<td>
<input type="number" min="0" onchange="calc(${i},this.value)">
</td>

<td id="t${i}">0</td>

</tr>

`

})

document.getElementById("lista").innerHTML=html

}

function calc(i,q){

let p = produtos[i]

q = parseInt(q)

if(isNaN(q) || q <= 0){
delete carrinho[p.nome]
document.getElementById("t"+i).innerText="0"
calcTotal()
return
}

let preco = p.preco * (1 - desconto)

let total = preco * q

document.getElementById("t"+i).innerText = total.toFixed(2)

carrinho[p.nome] = {
nome:p.nome,
q:q,
preco:preco,
total:total
}

calcTotal()

}

let p=produtos[i]

let preco=p.preco*(1-desconto)

let total=preco*q

document.getElementById("t"+i).innerText=total.toFixed(2)

carrinho[p.nome]={q:q,preco:preco,total:total}

calcTotal()

}

function calcTotal(){

let soma=0

Object.values(carrinho).forEach(p=>{

soma+=parseFloat(p.total)

})

if(soma>=1000){
desconto=0.15
}
else if(soma>=500){
desconto=0.12
}
else{
desconto=0.10
}

document.getElementById("desconto").innerText=(desconto*100)+"%"

document.getElementById("total").innerText=soma.toFixed(2)

}

function limpar(){
location.reload()
}

function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let y=20

doc.text("Pedido Crazy Fantasy",20,y)

y+=10

Object.keys(carrinho).forEach(nome=>{

let p=carrinho[nome]

doc.text(`${nome} - ${p.q} un`,20,y)

y+=8

})

doc.save("pedido.pdf")

}

function enviar(){

let total=parseFloat(document.getElementById("total").innerText)

if(total<200){

alert("Pedido mínimo para atacado: R$200")

return

}

alert("Pedido enviado com sucesso!")

}

document.getElementById("busca").addEventListener("input",function(){

let termo=this.value.toLowerCase()

let filtrados=produtos.filter(p=>p.nome.toLowerCase().includes(termo))

renderProdutos(filtrados)

})

</script>

</body>
</html>
