<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal B2B Crazy Fantasy</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

<div class="catalogo">

<div class="banner">
<img src="banner.png">
</div>

<div class="barraInfo">
🔥 Tabela exclusiva para parceiros • Desconto progressivo B2B
</div>

<div id="menuCategorias" class="menuCategorias"></div>

<input id="busca" placeholder="🔎 Buscar produto ou SKU">

<div id="produtos" class="gridProdutos"></div>

</div>


<div class="carrinho">

<h2>
🛒 Pedido
<span id="contadorItens">(0 itens)</span>
</h2>

<div class="total">
Total B2B: R$ <span id="total">0</span>
</div>

<div class="economiaPedido">
💰 Economia: R$ <span id="economia">0</span>
</div>

<div class="barraProgresso">
<div id="barra"></div>
</div>

<div id="msgMinimo"></div>

<div id="listaPedido"></div>

<h3>Dados do Cliente</h3>

<input id="empresa" placeholder="Empresa / Razão Social">
<input id="cnpj" placeholder="CNPJ">
<input id="ie" placeholder="Inscrição Estadual">
<input id="nome" placeholder="Nome do responsável">
<input id="whatsapp" placeholder="WhatsApp">
<input id="email" placeholder="Email">

<textarea id="endereco" placeholder="Endereço completo"></textarea>

<h3>Entrega</h3>

<select id="entrega">
<option value="">Selecione</option>
<option>Correios</option>
<option>Transportadora</option>
<option>Retirada</option>
</select>

<h3>Pagamento</h3>

<select id="pagamento">
<option value="">Selecione</option>
<option>PIX</option>
<option>Boleto</option>
<option>Cartão</option>
</select>

<textarea id="observacoes" placeholder="Observações"></textarea>

<button onclick="copiarPedido()" class="btnEmail">
Copiar Pedido (ERP)
</button>

<button onclick="enviarWhatsApp()" class="btnWhats">
WhatsApp
</button>

<button onclick="gerarPDF()" class="btnPdf">
Gerar PDF
</button>

<button onclick="limparCarrinho()" class="btnLimpar">
Limpar
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
