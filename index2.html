<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal B2B Crazy Fantasy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f5fb;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

.menu{
margin:20px 0;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.menu button{
padding:8px 14px;
border:none;
border-radius:8px;
background:#e6e1ff;
cursor:pointer;
}

.search input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:20px;
}

.layout{
display:flex;
gap:30px;
}

.produtos{
flex:3;
}

.carrinho{
flex:1;
background:white;
padding:20px;
border-radius:10px;
height:fit-content;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#e6e1ff;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.prod-img{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;
}

.total{
font-size:20px;
margin-top:10px;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:8px;
}

.limpar{background:#444;color:white;}
.pdf{background:#ff5c6c;color:white;}
.email{background:#1abc9c;color:white;}

</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="banner.png">
</div>

<h2>Portal B2B Crazy Fantasy</h2>

<div class="menu" id="menu"></div>

<div class="search">
<input placeholder="Buscar produto..." onkeyup="buscar(this.value)">
</div>

<div class="layout">

<div class="produtos">

<table>

<thead>
<tr>
<th>Foto</th>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<div class="carrinho">

<h3>Carrinho</h3>

<div id="listaCarrinho"></div>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<div id="desconto"></div>

<button class="limpar" onclick="limpar()">Limpar</button>
<button class="pdf" onclick="gerarPDF()">Gerar PDF</button>
<button class="email" onclick="enviarEmail()">Enviar Pedido</button>

</div>

</div>

</div>

<script>

let produtos=[]
let produtosAgrupados=[]
let carrinho={}

const pedidoMinimo=200

Papa.parse("produtos.csv",{

download:true,
header:true,

complete:function(results){

produtos=results.data
agruparProdutos()

}

})

function agruparProdutos(){

let mapa={}

produtos.forEach(p=>{

let nome=p["Nome"]
let categoria=p["Categorias"]
let preco=parseFloat(p["Preço"]||0)

let imagem=p["Imagem"] || p["Image URL"] || ""

let variacao=p["Valor da variação 1"] || ""

if(!mapa[nome]){

mapa[nome]={

nome:nome,
categoria:categoria,
preco:preco,
imagem:imagem,
variacoes:[]

}

}

if(variacao){

mapa[nome].variacoes.push(variacao)

}

})

produtosAgrupados=Object.values(mapa)

criarCategorias()

}

function criarCategorias(){

let cats=[...new Set(produtosAgrupados.map(p=>p.categoria))]

let menu=document.getElementById("menu")

cats.forEach(c=>{

menu.innerHTML+=`<button onclick="mostrar('${c}')">${c}</button>`

})

mostrar(cats[0])

}

function mostrar(cat){

let tabela=document.getElementById("tabela")

tabela.innerHTML=""

produtosAgrupados
.filter(p=>p.categoria==cat)
.forEach(p=>{

tabela.innerHTML+=`

<tr>

<td>
<img class="prod-img" src="${p.imagem}">
</td>

<td>

${p.nome}

<br>

<select onchange="selecionar('${p.nome}',this.value,${p.preco})">

<option value="">Selecionar</option>

${p.variacoes.map(v=>`<option>${v}</option>`).join("")}

</select>

</td>

<td>R$ ${p.preco.toFixed(2)}</td>

<td>

<input type="number" min="0" onchange="quantidade('${p.nome}',this.value)">

</td>

<td id="sub-${p.nome}">0.00</td>

</tr>

`

})

}

function selecionar(nome,variacao,preco){

if(!carrinho[nome]){

carrinho[nome]={

nome:variacao,
preco:preco,
qtd:0

}

}

}

function quantidade(nome,qtd){

if(!carrinho[nome]) return

carrinho[nome].qtd=parseInt(qtd)

calcular()

}

function calcular(){

let total=0
let lista=""

Object.values(carrinho).forEach(i=>{

let sub=i.preco*i.qtd

if(i.qtd>0){

lista+=`${i.nome} x ${i.qtd}<br>`

}

total+=sub

})

let desconto=descontoProgressivo(total)

let totalFinal=total*(1-desconto)

document.getElementById("listaCarrinho").innerHTML=lista
document.getElementById("total").innerText=totalFinal.toFixed(2)

document.getElementById("desconto").innerHTML=`Desconto aplicado: ${desconto*100}%`

}

function descontoProgressivo(total){

if(total>=1000) return 0.18
if(total>=600) return 0.15
if(total>=300) return 0.12
return 0.10

}

function buscar(txt){

txt=txt.toLowerCase()

document.querySelectorAll("#tabela tr").forEach(l=>{

let nome=l.innerText.toLowerCase()

l.style.display=nome.includes(txt)?"":"none"

})

}

function limpar(){

location.reload()

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let y=20

doc.text("Pedido Crazy Fantasy B2B",10,10)

Object.values(carrinho).forEach(i=>{

if(i.qtd>0){

doc.text(`${i.nome} x ${i.qtd}`,10,y)

y+=8

}

})

doc.save("pedido.pdf")

}

function enviarEmail(){

let total=parseFloat(document.getElementById("total").innerText)

if(total<pedidoMinimo){

alert("Pedido mínimo R$"+pedidoMinimo)

return

}

let texto="Pedido Crazy Fantasy B2B%0D%0A"

Object.values(carrinho).forEach(i=>{

if(i.qtd>0){

texto+=`${i.nome} x ${i.qtd}%0D%0A`

}

})

window.location.href=`mailto:lojacrazyfantasy@hotmail.com?subject=Pedido B2B&body=${texto}`

}

</script>

</body>
</html>
