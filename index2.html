<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal B2B Crazy Fantasy</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

<div class="catalogo">

<div class="banner">
<img src="banner.png">
</div>

<div class="barraInfo">
🔥 Tabela exclusiva para parceiros | Desconto progressivo B2B
</div>

<div id="menuCategorias"></div>

<input id="busca" placeholder="🔎 Buscar produto">

<div id="produtos" class="gridProdutos"></div>

</div>



<div class="carrinho">

<h2>
🛒 Pedido
<span id="contadorItens">(0 itens)</span>
</h2>

<div class="total">
Total B2B: R$ <span id="total">0</span>
</div>

<div class="economiaPedido">
💰 Economia: R$ <span id="economia">0</span>
</div>

<div class="barraProgresso">
<div id="barra"></div>
</div>

<div id="msgMinimo"></div>

<div id="listaPedido"></div>

<h3>Dados do Cliente</h3>

<input id="empresa" placeholder="Empresa">
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="whatsapp" placeholder="WhatsApp do cliente">

<div class="botoesPedido">

<button class="btnEmail" onclick="enviarEmail()">Enviar Email</button>

<button class="btnWhats" onclick="enviarWhatsApp()">WhatsApp</button>

<button class="btnPdf" onclick="gerarPDF()">Gerar PDF</button>

<button class="btnLimpar" onclick="limparCarrinho()">Limpar</button>

</div>

</div>

</div>

<div class="footer">

Crazy Fantasy B2B

<br><br>

Descontos progressivos

<br>

R$200 → 10%

<br>

R$500 → 12%

<br>

R$1000 → 15%

</div>

<script src="script.js"></script>

</body>
</html>
