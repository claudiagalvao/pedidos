<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Portal B2B Crazy Fantasy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
width:1200px;
margin:auto;
}

.banner{
width:100%;
border-radius:10px;
margin-top:20px;
}

h1{
margin-top:20px;
}

.categorias{
margin:15px 0;
}

.catbtn{
background:#dcd3f3;
border:none;
padding:8px 14px;
border-radius:8px;
margin:4px;
cursor:pointer;
}

.search{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:10px;
}

.layout{
display:flex;
gap:20px;
}

.produtos{
flex:3;
}

.carrinho{
flex:1;
background:white;
padding:20px;
border-radius:10px;
height:fit-content;
}

table{
width:100%;
background:white;
border-radius:10px;
}

th{
background:#dcd3f3;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

.prodimg{
width:60px;
border-radius:6px;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btnpdf{
background:#ff5b6b;
color:white;
}

.btnsend{
background:#27ae60;
color:white;
}

.btnclear{
background:#444;
color:white;
}

</style>

</head>

<body>

<div class="container">

<img src="banner.png" class="banner">

<h1>Portal B2B Crazy Fantasy</h1>

<div id="categorias" class="categorias"></div>

<input type="text" id="busca" class="search" placeholder="Buscar produto...">

<div class="layout">

<div class="produtos">

<table>

<thead>

<tr>
<th>Foto</th>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>

</thead>

<tbody id="lista"></tbody>

</table>

</div>

<div class="carrinho">

<h3>Carrinho</h3>

<h2>Total: R$ <span id="total">0</span></h2>

<button class="btnclear" onclick="limpar()">Limpar</button>

<button class="btnpdf" onclick="gerarPDF()">Gerar PDF</button>

<button class="btnsend" onclick="enviar()">Enviar Pedido</button>

</div>

</div>

</div>

<script>

let produtos=[]
let carrinho={}

Papa.parse("produtos.csv",{

download:true,
header:true,
complete:function(res){

let data=res.data

let agrupado={}

data.forEach(p=>{

let id=p["Identificador URL"]

if(!id)return

if(!agrupado[id]){

agrupado[id]={

nome:p["Nome"],
categoria:p["Categorias"]||"Outros",
preco:parseFloat(p["Preço"])||0,
imagem:p["Imagem 1"]||"",
variacoes:[]

}

}

let v=p["Valor da variação 1"]

if(v)agrupado[id].variacoes.push(v)

})

produtos=Object.values(agrupado)

renderCategorias()

renderProdutos(produtos)

}

})

function renderCategorias(){

let cats=[...new Set(produtos.map(p=>p.categoria))]

let html=""

cats.forEach(c=>{

html+=`<button class="catbtn" onclick="filtrar('${c}')">${c}</button>`

})

document.getElementById("categorias").innerHTML=html

}

function filtrar(cat){

let filtrados=produtos.filter(p=>p.categoria==cat)

renderProdutos(filtrados)

}

function renderProdutos(lista){

let html=""

lista.forEach((p,i)=>{

let preco=(p.preco*0.9).toFixed(2)

let variacaoHTML=""

if(p.variacoes.length){

variacaoHTML=`<select>
<option>Selecionar</option>
${p.variacoes.map(v=>`<option>${v}</option>`).join("")}
</select>`

}

let img=p.imagem?`<img src="${p.imagem}" class="prodimg">`:""

html+=`

<tr>

<td>${img}</td>

<td>
${p.nome}<br>
${variacaoHTML}
</td>

<td>R$ ${preco}</td>

<td>

<input type="number" min="0" onchange="calc(${i},this.value)">

</td>

<td id="t${i}">0</td>

</tr>

`

})

document.getElementById("lista").innerHTML=html

}

function calc(i,q){

let p=produtos[i]

let preco=p.preco*0.9

let total=(preco*q).toFixed(2)

document.getElementById("t"+i).innerText=total

carrinho[p.nome]={q,preco,total}

calcTotal()

}

function calcTotal(){

let soma=0

Object.values(carrinho).forEach(p=>{

soma+=parseFloat(p.total)

})

document.getElementById("total").innerText=soma.toFixed(2)

}

function limpar(){

location.reload()

}

function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let y=20

doc.text("Pedido Crazy Fantasy",20,y)

y+=10

Object.keys(carrinho).forEach(nome=>{

let p=carrinho[nome]

doc.text(`${nome} - ${p.q} un`,20,y)

y+=8

})

doc.save("pedido.pdf")

}

function enviar(){

alert("Pedido enviado!")

}

document.getElementById("busca").addEventListener("input",function(){

let termo=this.value.toLowerCase()

let filtrados=produtos.filter(p=>p.nome.toLowerCase().includes(termo))

renderProdutos(filtrados)

})

</script>

</body>

</html>
