<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal B2B - Crazy Fantasy</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#0b0b0b;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.banner{
width:100%;
height:400px;
background:url("banner.jpg") center/cover no-repeat;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.search{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:20px;
border-radius:8px;
border:none;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.menu button{
padding:10px 16px;
border:none;
border-radius:20px;
background:#1f1f1f;
color:white;
cursor:pointer;
}

.menu button:hover{
background:#ff0066;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.product{
background:#1a1a1a;
padding:15px;
border-radius:10px;
}

.product h3{
margin:0 0 10px 0;
font-size:18px;
}

.product input{
width:60px;
padding:6px;
}

.product button{
margin-top:10px;
padding:8px 10px;
background:#ff0066;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.cart{
margin-top:40px;
background:#111;
padding:20px;
border-radius:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.form{
margin-top:20px;
display:grid;
gap:10px;
}

.form input{
padding:10px;
border-radius:6px;
border:none;
}

.send{
padding:12px;
background:#00c853;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
Portal B2B - Crazy Fantasy
</header>

<div class="banner"></div>

<div class="container">

<input class="search" type="text" id="search" placeholder="Buscar produto...">

<div class="menu" id="menu"></div>

<div class="products" id="products"></div>

<div class="cart">
<h2>Pedido</h2>

<div id="cart"></div>

<div class="total" id="total">Total: R$0</div>

<div class="form">
<input id="empresa" placeholder="Empresa">
<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="email" placeholder="Email">
<button class="send" onclick="enviarPedido()">Enviar Pedido</button>
</div>

</div>

</div>

<script>

let produtos=[]
let carrinho=[]

fetch("produtos.csv")
.then(res=>res.text())
.then(text=>{

let linhas=text.split("\n")

for(let i=1;i<linhas.length;i++){

let col=linhas[i].split(",")

if(col.length>3){

produtos.push({
categoria:col[0],
nome:col[1],
preco:parseFloat(col[2])
})

}

}

renderMenu()
renderProdutos(produtos)

})

function renderMenu(){

let categorias=[...new Set(produtos.map(p=>p.categoria))]

let menu=document.getElementById("menu")

menu.innerHTML=""

categorias.forEach(cat=>{

let btn=document.createElement("button")
btn.innerText=cat
btn.onclick=()=>{

let filtrados=produtos.filter(p=>p.categoria==cat)
renderProdutos(filtrados)

}

menu.appendChild(btn)

})

}

function renderProdutos(lista){

let div=document.getElementById("products")

div.innerHTML=""

lista.forEach(p=>{

let el=document.createElement("div")
el.className="product"

el.innerHTML=`

<h3>${p.nome}</h3>
<div>R$ ${p.preco}</div>
<input type="number" min="1" value="1" id="${p.nome}">
<br>
<button onclick="addCarrinho('${p.nome}',${p.preco})">Adicionar</button>

`

div.appendChild(el)

})

}

function addCarrinho(nome,preco){

let qtd=parseInt(document.getElementById(nome).value)

let item=carrinho.find(i=>i.nome==nome)

if(item){

item.qtd+=qtd

}else{

carrinho.push({nome,preco,qtd})

}

renderCarrinho()

}

function renderCarrinho(){

let div=document.getElementById("cart")

div.innerHTML=""

let total=0

carrinho.forEach(i=>{

let linha=document.createElement("div")
linha.className="cart-item"

linha.innerHTML=`${i.nome} x${i.qtd} - R$ ${i.preco*i.qtd}`

div.appendChild(linha)

total+=i.preco*i.qtd

})

document.getElementById("total").innerText="Total: R$"+total

}

function enviarPedido(){

let empresa=document.getElementById("empresa").value
let nome=document.getElementById("nome").value
let telefone=document.getElementById("telefone").value
let email=document.getElementById("email").value

let texto="Pedido Crazy Fantasy\n\n"

carrinho.forEach(i=>{

texto+=`${i.nome} x${i.qtd}\n`

})

texto+=`\nEmpresa: ${empresa}\nNome: ${nome}\nTelefone: ${telefone}\nEmail: ${email}`

let url="https://wa.me/?text="+encodeURIComponent(texto)

window.open(url)

}

document.getElementById("search").addEventListener("input",function(){

let termo=this.value.toLowerCase()

let filtrados=produtos.filter(p=>p.nome.toLowerCase().includes(termo))

renderProdutos(filtrados)

})

</script>

</body>
</html>
