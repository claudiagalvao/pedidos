<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal B2B Crazy Fantasy</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#c8b6e2;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

input{
width:60px;
}

.carrinho{
position:fixed;
right:40px;
top:200px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:220px;
}

button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
width:100%;
}

.btn-pdf{
background:#ff5a5a;
color:white;
}

.btn-enviar{
background:#28a745;
color:white;
}

</style>
</head>

<body>

<h1>Portal B2B Crazy Fantasy</h1>

<table id="tabela">

<thead>
<tr>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody>

<tr>
<td>Peruca Amy Winehouse</td>
<td class="preco">107.99</td>
<td><input type="number" class="qtd" value="0" min="0"></td>
<td class="total">0.00</td>
</tr>

<tr>
<td>Peruca Arlequina</td>
<td class="preco">59.90</td>
<td><input type="number" class="qtd" value="0" min="0"></td>
<td class="total">0.00</td>
</tr>

<tr>
<td>Tinta Spray de Cabelo</td>
<td class="preco">35.99</td>
<td><input type="number" class="qtd" value="0" min="0"></td>
<td class="total">0.00</td>
</tr>

<tr>
<td>Tiara de Princesa</td>
<td class="preco">29.90</td>
<td><input type="number" class="qtd" value="0" min="0"></td>
<td class="total">0.00</td>
</tr>

</tbody>

</table>

<div class="carrinho">

<h3>Carrinho</h3>

<p>Itens: <span id="itens">0</span></p>

<h2>Total: R$ <span id="total">0.00</span></h2>

<button class="btn-pdf">Gerar PDF</button>

<button class="btn-enviar">Enviar Pedido</button>

</div>

<script>

function atualizar(){

let linhas = document.querySelectorAll("#tabela tbody tr");

let totalCarrinho = 0;
let itens = 0;

linhas.forEach(linha => {

let preco = parseFloat(linha.querySelector(".preco").innerText);

let qtd = parseInt(linha.querySelector(".qtd").value) || 0;

let total = preco * qtd;

linha.querySelector(".total").innerText = total.toFixed(2);

if(qtd>0){

itens += qtd;
totalCarrinho += total;

}

});

document.getElementById("total").innerText = totalCarrinho.toFixed(2);
document.getElementById("itens").innerText = itens;

}

document.querySelectorAll(".qtd").forEach(input => {

input.addEventListener("input", atualizar);

});

</script>

</body>
</html>
