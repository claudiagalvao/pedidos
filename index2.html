<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">

<header class="banner">

<div id="produtos"></div>

</section>


<aside class="carrinho">

<h2>
Pedido
<span id="contadorItens">(0 itens)</span>
</h2>
