<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Portal B2B Crazy Fantasy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f3f3f3;
margin:0;
}

.container{
width:1200px;
margin:auto;
}

.banner{
width:100%;
margin-top:20px;
border-radius:10px;
}

.search{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

.layout{
display:flex;
gap:20px;
margin-top:10px;
}

.produtos{
flex:3;
}

table{
width:100%;
margin-top:10px;
background:white;
border-radius:8px;
}

th{
background:#dcd0f7;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

.prodimg{
width:60px;
border-radius:6px;
}

.precoOriginal{
text-decoration:line-through;
font-size:12px;
color:#888;
}

.precoB2B{
color:#e60023;
font-weight:bold;
}

.carrinho{
width:260px;
background:white;
padding:15px;
border-radius:10px;
}

button{
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.btnclear{
background:#444;
color:white;
width:100%;
margin-top:5px;
}

.btnpdf{
background:#ff5b6b;
color:white;
width:100%;
margin-top:5px;
}

.btnsend{
background:#27ae60;
color:white;
width:100%;
margin-top:5px;
}

.progressBox{
background:white;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.progressBar{
width:100%;
height:14px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-top:6px;
}

#progressFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#6c63ff,#9b6dff);
}

.categorias{
margin-top:10px;
}

.categorias button{
background:#dcd0f7;
border:none;
padding:6px 10px;
margin:4px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<img src="banner.png" class="banner">

<h2>Portal B2B Crazy Fantasy</h2>

<p>✔ Preços exclusivos para parceiros e revendedores</p>

<div class="progressBox">

<div id="progressText">
Pedido mínimo: R$200
</div>

<div class="progressBar">
<div id="progressFill"></div>
</div>

</div>

<div id="categorias" class="categorias"></div>

<input type="text" id="busca" class="search" placeholder="Buscar produto...">

<div class="layout">

<div class="produtos">

<table>

<thead>
<tr>
<th>Foto</th>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

<div class="carrinho">

<h3>Carrinho</h3>

<p>Itens: <b id="itens">0</b></p>

<h2>Total: R$ <span id="total">0</span></h2>

<p>Desconto aplicado: <span id="desconto">10%</span></p>

<button class="btnclear" onclick="limpar()">Limpar</button>
<button class="btnpdf" onclick="gerarPDF()">Gerar PDF</button>
<button class="btnsend" onclick="enviar()">Enviar Pedido</button>

</div>

</div>

</div>

<script>

let produtos=[]
let categorias=[]
let carrinho={}
let desconto=0.10

Papa.parse("produtos.csv",{

download:true,
header:true,

complete:function(res){

let data=res.data
let mapa={}
let cats=new Set()

data.forEach(p=>{

let id=p["Identificador URL"]
if(!id) return

let categoria=p["Categorias"] || "Outros"

cats.add(categoria)

if(!mapa[id]){

mapa[id]={

nome:p["Nome"],
categoria:categoria,
preco:parseFloat((p["Preço"]||"0").replace(",",".")),
imagem:p["Imagem 1"]||"",
variacoes:[]

}

}

let v=p["Valor da variação 1"]
if(v) mapa[id].variacoes.push(v)

})

produtos=Object.values(mapa)
categorias=[...cats]

renderCategorias()
render(produtos)

}

})

function renderCategorias(){

let html=""

categorias.forEach(c=>{
html+=`<button onclick="filtrar('${c}')">${c}</button>`
})

document.getElementById("categorias").innerHTML=html

}

function filtrar(cat){

let filtrados=produtos.filter(p=>p.categoria.includes(cat))
render(filtrados)

}

function render(lista){

let html=""

lista.forEach((p,i)=>{

let precoOriginal=p.preco
let precoB2B=p.preco*(1-desconto)

let variacaoHTML=""

if(p.variacoes.length){

variacaoHTML=`
<select>
<option>Selecionar</option>
${p.variacoes.map(v=>`<option>${v}</option>`).join("")}
</select>
`

}

let img=p.imagem?`<img src="${p.imagem}" class="prodimg">`:""

html+=`

<tr data-preco="${precoB2B}">

<td>${img}</td>

<td>${p.nome}<br>${variacaoHTML}</td>

<td>
<span class="precoOriginal">R$ ${precoOriginal.toFixed(2)}</span><br>
<span class="precoB2B">R$ ${precoB2B.toFixed(2)}</span>
</td>

<td>
<input type="number" min="0" onchange="calc(${i},this)">
</td>

<td id="t${i}">0</td>

</tr>

`

})

document.getElementById("lista").innerHTML=html

}

function calc(i,input){

let q=parseInt(input.value)

let linha=input.closest("tr")

let preco=parseFloat(linha.dataset.preco)

if(isNaN(q)||q<=0){

delete carrinho[i]
document.getElementById("t"+i).innerText="0"
calcTotal()
return

}

let total=preco*q

document.getElementById("t"+i).innerText=total.toFixed(2)

carrinho[i]={

q:q,
preco:preco,
total:total

}

calcTotal()

}

function calcTotal(){

let soma=0
let itens=0

Object.values(carrinho).forEach(p=>{
soma+=p.total
itens+=p.q
})

if(soma>=1000) desconto=0.15
else if(soma>=500) desconto=0.12
else desconto=0.10

document.getElementById("desconto").innerText=(desconto*100)+"%"
document.getElementById("total").innerText=soma.toFixed(2)
document.getElementById("itens").innerText=itens

let minimo=200

let progresso=Math.min((soma/minimo)*100,100)

document.getElementById("progressFill").style.width=progresso+"%"

if(soma<200){

let falta=(200-soma).toFixed(2)

document.getElementById("progressText").innerText=
"Faltam R$ "+falta+" para atingir o pedido mínimo"

}else{

document.getElementById("progressText").innerText=
"Pedido mínimo atingido"

}

}

function limpar(){
location.reload()
}

function gerarPDF(){

const {jsPDF}=window.jspdf
let doc=new jsPDF()
let y=20

doc.text("Pedido Crazy Fantasy B2B",20,y)
y+=10

Object.keys(carrinho).forEach(nome=>{
let p=carrinho[nome]
doc.text(`${nome} - ${p.q} un`,20,y)
y+=8
})

doc.save("pedido.pdf")

}

function enviar(){

let total=parseFloat(document.getElementById("total").innerText)

if(total<200){
alert("Pedido mínimo: R$200")
return
}

alert("Pedido enviado!")

}

document.getElementById("busca").addEventListener("input",function(){

let termo=this.value.toLowerCase()

let filtrados=produtos.filter(p=>p.nome.toLowerCase().includes(termo))

render(filtrados)

})

</script>

</body>
</html>
