<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal B2B Crazy Fantasy</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>


<body>


<div class="container">


<div class="catalogo">


<div class="banner">

<img src="banner.png">

</div>


<div class="barraInfo">

🔥 Tabela exclusiva para parceiros | Desconto progressivo B2B

</div>


<div id="menuCategorias" class="menuCategorias"></div>


<h1>Portal B2B Crazy Fantasy</h1>


<input id="busca" placeholder="🔎 Buscar produto">


<div id="produtos" class="gridProdutos"></div>


</div>



<div class="carrinho">


<h2>Pedido <span id="contadorItens">(0 itens)</span></h2>


<div class="total">

Total: R$ <span id="total">0</span>

</div>


<div class="barraProgresso">

<div id="barra"></div>

</div>


<div id="msgMinimo" class="msgMinimo"></div>


<div id="listaPedido"></div>



<h3>Dados do Cliente</h3>


<input id="empresa" placeholder="Empresa">

<input id="nome" placeholder="Nome">

<input id="email" placeholder="Email">



<form action="https://formsubmit.co/seuemail@email.com"
method="POST"
onsubmit="prepararPedido()">

<input type="hidden" name="pedido" id="pedidoTexto">

<button class="btnEmail">

Enviar Pedido por Email

</button>

</form>


<button class="btnWhats" onclick="enviarWhatsApp()">

Enviar por WhatsApp

</button>


<button class="btnPdf" onclick="gerarPDF()">

Gerar PDF do Pedido

</button>


<button class="btnLimpar" onclick="limparCarrinho()">

Limpar Pedido

</button>



</div>



</div>


<script src="script.js"></script>


</body>

</html>
