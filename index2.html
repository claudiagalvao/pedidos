<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal de Pedidos - Crazy Fantasy</title>

<style>

body{
font-family: Arial;
background:#f6f6f6;
margin:0;
padding:30px;
}

h1{
margin-bottom:5px;
}

.topo{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.categorias{
margin:15px 0;
}

.categorias button{
margin:5px;
padding:8px 14px;
border-radius:20px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.categorias button:hover{
background:#eee;
}

.busca{
margin:10px 0 20px 0;
}

.busca input{
width:100%;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
font-size:14px;
}

.container{
display:flex;
gap:20px;
}

.tabela{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#c9b8e9;
padding:10px;
text-align:left;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

input.qtd{
width:50px;
}

.carrinho{
width:260px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
height:fit-content;
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-limpar{
background:#333;
color:white;
}

.btn-pdf{
background:#ff6f61;
color:white;
}

.alerta{
margin-top:10px;
color:red;
font-size:13px;
}

</style>
</head>

<body>

<div class="topo">

<h1>Portal B2B Crazy Fantasy</h1>

<p>Frete por conta do cliente (FOB)</p>
<p><b>Pedido mínimo: R$200</b></p>

<div class="categorias">

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('kits')">Kits</button>
<button onclick="filtrar('perucas')">Perucas</button>
<button onclick="filtrar('barbas')">Barbas</button>
<button onclick="filtrar('acessorios')">Acessórios</button>
<button onclick="filtrar('maquiagem')">Maquiagem</button>

</div>

<div class="busca">
<input type="text" placeholder="Buscar produto..." onkeyup="buscar(this.value)">
</div>

</div>

<div class="container">

<div class="tabela">

<table>

<thead>
<tr>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="listaProdutos"></tbody>

</table>

</div>

<div class="carrinho">

<h3>🛒 Carrinho</h3>

<p>Itens: <span id="itens">0</span></p>

<h2>Total: R$ <span id="total">0</span></h2>

<button class="btn btn-limpar" onclick="limpar()">Limpar</button>

<button class="btn btn-pdf" onclick="gerarPDF()">Gerar PDF</button>

<div class="alerta" id="alerta"></div>

</div>

</div>

<script>

let produtos = [

{nome:"Kit Sherlock Holmes", preco:120, categoria:"kits"},
{nome:"Kit Arlequina", preco:110, categoria:"kits"},

{nome:"Peruca Punk Rock", preco:55, categoria:"perucas"},
{nome:"Peruca Barbie", preco:60, categoria:"perucas"},

{nome:"Barba Viking", preco:35, categoria:"barbas"},
{nome:"Bigode Mexicano", preco:18, categoria:"barbas"},

{nome:"Tiara Princesa", preco:20, categoria:"acessorios"},
{nome:"Bastão Arlequina", preco:35, categoria:"acessorios"},
{nome:"Meia Arrastão", preco:25, categoria:"acessorios"},

{nome:"Spray Cabelo Colorido", preco:22, categoria:"maquiagem"}

]

let carrinho={}

function render(lista){

let html=""

lista.forEach((p,i)=>{

html+=`

<tr>

<td>${p.nome}</td>

<td>R$ ${p.preco}</td>

<td>
<input class="qtd" type="number" min="0"
onchange="add(${i},this.value)">
</td>

<td id="t${i}">R$ 0</td>

</tr>

`

})

document.getElementById("listaProdutos").innerHTML=html

}

render(produtos)

function filtrar(cat){

if(cat=="todos"){
render(produtos)
return
}

let filtrado = produtos.filter(p=>p.categoria==cat)

render(filtrado)

}

function buscar(txt){

txt=txt.toLowerCase()

let filtrado = produtos.filter(p=>
p.nome.toLowerCase().includes(txt)
)

render(filtrado)

}

function add(i,qtd){

qtd=parseInt(qtd)

if(!qtd) qtd=0

let preco = produtos[i].preco

let total = preco*qtd

document.getElementById("t"+i).innerText="R$ "+total

carrinho[i]=total

atualizar()

}

function atualizar(){

let total=0
let itens=0

for(let i in carrinho){

total+=carrinho[i]

if(carrinho[i]>0) itens++

}

document.getElementById("total").innerText=total
document.getElementById("itens").innerText=itens

}

function limpar(){

location.reload()

}

function gerarPDF(){

let total = parseFloat(document.getElementById("total").innerText)

if(total<200){

document.getElementById("alerta").innerText=
"Pedido mínimo é R$200"

return

}

alert("PDF seria gerado aqui.")

}

</script>

</body>
</html>
