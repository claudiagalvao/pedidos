<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Portal B2B Crazy Fantasy</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
margin:40px;
}

h1{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#b8a7d6;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

input{
width:60px;
padding:4px;
}

.total{
font-weight:bold;
}

.carrinho{
position:fixed;
right:40px;
top:180px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
width:250px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
font-size:14px;
}

.pdf{
background:#ff5a5a;
color:white;
}

.enviar{
background:#2da44e;
color:white;
}

</style>
</head>

<body>

<h1>Portal B2B Crazy Fantasy</h1>

<table id="tabela">

<thead>

<tr>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>

</thead>

<tbody>

<tr>
<td>Peruca Amy Winehouse</td>
<td class="preco">107.99</td>
<td><input type="number" class="qtd" min="0" value="0"></td>
<td class="total">0.00</td>
</tr>

<tr>
<td>Peruca Arlequina</td>
<td class="preco">59.90</td>
<td><input type="number" class="qtd" min="0" value="0"></td>
<td class="total">0.00</td>
</tr>

<tr>
<td>Tinta Spray de Cabelo</td>
<td class="preco">35.99</td>
<td><input type="number" class="qtd" min="0" value="0"></td>
<td class="total">0.00</td>
</tr>

<tr>
<td>Tiara de Princesa</td>
<td class="preco">29.90</td>
<td><input type="number" class="qtd" min="0" value="0"></td>
<td class="total">0.00</td>
</tr>

</tbody>

</table>

<div class="carrinho">

<h3>Carrinho</h3>

<p>Itens: <span id="itens">0</span></p>

<h2>Total: R$ <span id="total">0,00</span></h2>

<button class="pdf">Gerar PDF</button>

<button class="enviar">Enviar Pedido</button>

</div>

<script>

function formatarMoeda(valor){

return valor.toLocaleString('pt-BR', {
minimumFractionDigits:2,
maximumFractionDigits:2
});

}

function atualizarCarrinho(){

let linhas = document.querySelectorAll("#tabela tbody tr")

let totalCarrinho = 0
let itens = 0

linhas.forEach(linha => {

let preco = parseFloat(linha.querySelector(".preco").innerText)

let qtd = parseInt(linha.querySelector(".qtd").value) || 0

let total = preco * qtd

linha.querySelector(".total").innerText = formatarMoeda(total)

if(qtd > 0){

itens += qtd
totalCarrinho += total

}

})

document.getElementById("itens").innerText = itens
document.getElementById("total").innerText = formatarMoeda(totalCarrinho)

}

document.querySelectorAll(".qtd").forEach(input => {

input.addEventListener("input", atualizarCarrinho)

})

</script>

</body>
</html>
