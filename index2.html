<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal B2B Crazy Fantasy</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>


<body>

<div class="container">

<div class="catalogo">

<!-- COLUNA ESQUERDA -->

<div>

<div class="banner">
<img src="banner.png" alt="Crazy Fantasy">
</div>

<div class="barraInfo">
🔥 Tabela exclusiva para parceiros • Desconto progressivo B2B
</div>

<div class="categorias" id="categorias"></div>

<div class="busca">
<input type="text" id="busca" placeholder="🔎 Buscar produto ou SKU">
</div>

<div id="produtos" class="produtos"></div>

</div>


<!-- CARRINHO -->

<div class="carrinho">

<h2>🛒 Pedido (<span id="contador">0</span> itens)</h2>

<div class="total">
Total B2B: R$ <span id="total">0.00</span>
</div>

<div class="economia">
💰 Economia: R$ <span id="economia">0.00</span>
</div>

<div class="progress">
<div id="barra" class="progress-bar"></div>
</div>

<div id="itens" class="itens"></div>


<h3>Dados do Cliente</h3>

<div class="form">

<input id="empresa" placeholder="Empresa / Razão Social">

<input id="cnpj" placeholder="CNPJ">

<input id="ie" placeholder="Inscrição Estadual">

<input id="responsavel" placeholder="Nome do responsável">

<input id="whatsapp" placeholder="WhatsApp">

<input id="email" placeholder="Email">

<textarea id="endereco" placeholder="Endereço completo"></textarea>

<select id="entrega">
<option value="">Forma de entrega</option>
<option>Retirada</option>
<option>Transportadora</option>
<option>Correios</option>
</select>

<select id="pagamento">
<option value="">Forma de pagamento</option>
<option>Pix</option>
<option>Boleto</option>
<option>Cartão</option>
</select>

<textarea id="obs" placeholder="Observações"></textarea>

</div>

<div class="acoes">

<button class="btn btn-whats" onclick="enviarWhats()">Enviar WhatsApp</button>

<button class="btn btn-pdf" onclick="gerarPDF()">Gerar PDF</button>

<button class="btn btn-copiar" onclick="copiarPedido()">Copiar Pedido</button>

<button class="btn btn-limpar" onclick="limparCarrinho()">Limpar</button>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
