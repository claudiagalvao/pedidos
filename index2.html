<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crazy Fantasy | Catálogo B2B</title>

<link rel="stylesheet" href="estilo.css">

</head>

<body>

<div class="banner">
<img src="banner.png">
</div>

<div class="info-parceiros">

<h2>Tabela exclusiva para parceiros</h2>

<div class="info-grid">

<div class="info-box">
<h3>💰 Descontos</h3>
<p>Tabela especial para lojistas e revendedores parceiros.</p>
</div>

<div class="info-box">
<h3>📦 Pedido mínimo</h3>
<p>Pedidos a partir de <strong>R$200</strong>.</p>
</div>

<div class="info-box">
<h3>🚚 Frete</h3>
<p>Frete calculado após envio do pedido.</p>
</div>

<div class="info-box">
<h3>💳 Pagamento</h3>
<p>PIX, boleto ou cartão.</p>
</div>

</div>

</div>

<div class="menu" id="menu"></div>

<div class="catalogo">

<h1>Catálogo Crazy Fantasy</h1>

<input id="busca" class="busca" placeholder="🔎 Buscar produto...">

<div id="produtos"></div>

</div>

<div class="carrinho">

<h2>Pedido (<span id="contador">0</span>)</h2>

<div id="lista"></div>

<h3 id="total">Total: R$0</h3>

<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>

<p id="minimo-msg"></p>

<form>

<input placeholder="Empresa">
<input placeholder="Nome">
<input placeholder="Email">

<button type="button" onclick="enviarPedido()">
Enviar Pedido
</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
