<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal B2B Crazy Fantasy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
    <div class="catalogo">
        <img class="bannerTopo" src="banner.png">
        
        <div class="barraInfo">
            🔥 Tabela exclusiva para parceiros | Desconto progressivo B2B
        </div>

        <div id="menuCategorias"></div>

        <input id="busca" placeholder="🔎 Buscar produto">

        <div id="produtos" class="gridProdutos"></div>
    </div>

    <div class="carrinho">
        <h2>🛒 Pedido <span id="contadorItens">(0 itens)</span></h2>

        <div class="total">
            Total B2B: R$ <span id="total">0,00</span>
        </div>

        <div class="progressoContainer">
            <div id="msgMinimo">Faltam R$ 200,00 para pedido mínimo</div>
            <div class="barraFundo">
                <div id="barra" class="barraProgresso"></div>
            </div>
        </div>

        <div class="economia">
            Você está economizando: R$ <span id="economia">0,00</span>
        </div>

        <div id="listaPedido" class="listaPedido"></div>

        <div class="formPedido">
            <div class="linha2">
                <input id="responsavel" placeholder="Responsável">
                <input id="whatsapp" placeholder="WhatsApp">
            </div>
            <input id="email" placeholder="Email">
            <input id="endereco" placeholder="Endereço">
            <div class="linha3">
                <input id="cidade" placeholder="Cidade">
                <input id="estado" placeholder="Estado">
                <input id="cep" placeholder="CEP">
            </div>
            <div class="linha2">
                <select id="entrega">
                    <option value="">Forma de entrega</option>
                    <option>Retirada na loja</option>
                    <option>Correios</option>
                    <option>Transportadora</option>
                </select>
                <select id="pagamento">
                    <option value="">Forma de pagamento</option>
                    <option>Pix</option>
                    <option>Boleto</option>
                    <option>Cartão</option>
                </select>
            </div>
            <textarea id="observacoes" placeholder="Observações"></textarea>
        </div>

        <div class="botoesPedido">
            <button class="btnEmail" onclick="enviarEmail()">Enviar por Email</button>
            <button class="btnWhats" onclick="enviarWhatsApp()">WhatsApp</button>
            <button class="btnPdf" onclick="gerarPDF()">Gerar PDF</button>
            <button class="btnLimpar" onclick="limparCarrinho()">Limpar</button>
        </div>
    </div>
</div>

<footer class="footer">
    <p>Crazy Fantasy - Portal de Vendas B2B</p>
    <p>© 2026 Todos os direitos reservados</p>
</footer>

<script src="script.js"></script>
</body>
</html>
