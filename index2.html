<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal B2B Crazy Fantasy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
}

.banner{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.clienteBox{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.clienteBox input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:8px;
border-radius:6px;
border:1px solid #ccc;
}

.layout{
display:flex;
gap:20px;
}

.produtos{
flex:3;
}

.carrinho{
flex:1;
background:white;
padding:15px;
border-radius:10px;
height:fit-content;
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:8px;
overflow:hidden;
}

th{
background:#dcd0f7;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.precoOriginal{
text-decoration:line-through;
font-size:12px;
color:#888;
}

.precoB2B{
color:red;
font-weight:bold;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btnclear{background:#444;color:white;width:100%;margin-top:5px;}
.btnpdf{background:#ff5b6b;color:white;width:100%;margin-top:5px;}
.btnsend{background:#27ae60;color:white;width:100%;margin-top:5px;}

.search{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

.categorias{
background:white;
padding:10px;
border-radius:10px;
margin:10px 0;
}

.catGrupo{
margin-bottom:10px;
}

.categorias button{
background:#efe8ff;
margin:4px;
padding:6px 12px;
border-radius:20px;
}

.progressBox{
background:white;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.progressBar{
height:12px;
background:#eee;
border-radius:8px;
overflow:hidden;
margin-top:6px;
}

#progressFill{
height:100%;
width:0%;
background:#27ae60;
}

@media (max-width:768px){

.layout{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<img src="banner.png" class="banner">

<h2>Portal B2B Crazy Fantasy</h2>

<p>✔ Preços exclusivos para parceiros e revendedores</p>


<div class="clienteBox">

<h3>Dados do Cliente</h3>

<input type="text" id="clienteNome" placeholder="Nome do cliente / loja" required>

<input type="text" id="clienteTelefone" placeholder="Telefone / WhatsApp">

<input type="text" id="clienteCidade" placeholder="Cidade">

<input type="text" id="clienteEmpresa" placeholder="Empresa (opcional)">

</div>


<div class="progressBox">

<div id="progressText">
Pedido mínimo: R$200
</div>

<div class="progressBar">
<div id="progressFill"></div>
</div>

</div>


<div id="categorias" class="categorias"></div>

<input type="text" id="busca" class="search" placeholder="Buscar produto...">


<div class="layout">


<div class="produtos">

<table>

<thead>
<tr>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>


<div class="carrinho">

<h3>Carrinho</h3>

<p>Itens: <b id="itens">0</b></p>

<h2>Total: R$ <span id="total">0</span></h2>

<button class="btnclear" onclick="limpar()">Limpar</button>

<button class="btnpdf" onclick="gerarPDF()">Gerar PDF</button>

<button class="btnsend" onclick="enviarEmail()">Enviar por Email</button>

<button class="btnsend" onclick="enviarWhatsapp()">Enviar por WhatsApp</button>

</div>

</div>

</div>


<script>

let produtos=[]
let carrinho={}

Papa.parse("produtos.csv",{

download:true,
header:true,

complete:function(res){

let data=res.data
let mapa={}

data.forEach(p=>{

let id=p["Identificador URL"]
if(!id) return

let categoria=p["Categorias"] || "Outros"

if(!mapa[id]){

mapa[id]={

nome:p["Nome"],
categoria:categoria,
preco:parseFloat((p["Preço"]||"0").replace(",",".")),
variacoes:[]

}

}

let variacao=p["Valor da variação 1"]

if(variacao){
mapa[id].variacoes.push(variacao)
}

})

produtos=Object.values(mapa)

gerarMenu(produtos)
render(produtos)

}

})


function gerarMenu(lista){

let categorias={}

lista.forEach(p=>{

let cat=p.categoria || "Outros"

let partes=cat.split(">")

let principal=partes[0].trim()
let sub=partes[1] ? partes[1].trim() : null

if(!categorias[principal]){
categorias[principal]=[]
}

if(sub && !categorias[principal].includes(sub)){
categorias[principal].push(sub)
}

})

let html=""

Object.keys(categorias).forEach(cat=>{

html+=`<div class="catGrupo"><b>${cat}</b><br>`

categorias[cat].forEach(sub=>{

html+=`<button onclick="filtrar('${cat}','${sub}')">${sub}</button>`

})

html+=`</div>`

})

document.getElementById("categorias").innerHTML=html

}


function filtrar(cat,sub){

let filtrados = produtos.filter(p=>{

if(!p.categoria) return false

return p.categoria.includes(cat) && p.categoria.includes(sub)

})

render(filtrados)

}


function render(lista){

let html=""

lista.forEach((p,i)=>{

let precoOriginal=p.preco
let precoB2B=p.preco*0.9

html+=`

<tr>

<td>${p.nome}</td>

<td>

<span class="precoOriginal">R$ ${precoOriginal.toFixed(2)}</span><br>
<span class="precoB2B">R$ ${precoB2B.toFixed(2)}</span>

</td>

<td>
<input type="number" min="0" onchange="calc(${i},this.value)">
</td>

<td id="t${i}">0</td>

</tr>

`

})

document.getElementById("lista").innerHTML=html

}


function calc(i,q){

q=parseInt(q)

let linha=document.getElementById("t"+i).closest("tr")

let preco=parseFloat(
linha.querySelector(".precoB2B").innerText
.replace("R$","")
.replace(",",".")
)

if(isNaN(q)||q<=0){

delete carrinho[i]
document.getElementById("t"+i).innerText="0"
calcTotal()
return

}

let total=preco*q

document.getElementById("t"+i).innerText=total.toFixed(2)

carrinho[i]={

nome:linha.querySelector("td").innerText,
q:q,
total:total

}

calcTotal()

}


function calcTotal(){

let soma=0
let itens=0

Object.values(carrinho).forEach(p=>{

soma+=p.total
itens+=p.q

})

document.getElementById("total").innerText=soma.toFixed(2)
document.getElementById("itens").innerText=itens

let minimo=200

let progresso=Math.min((soma/minimo)*100,100)

document.getElementById("progressFill").style.width=progresso+"%"

}


function limpar(){
location.reload()
}


function gerarPDF(){

const {jsPDF}=window.jspdf

let doc=new jsPDF()

let y=20

doc.text("Pedido Crazy Fantasy B2B",20,y)

y+=10

Object.values(carrinho).forEach(p=>{

doc.text(`${p.nome} - ${p.q} un`,20,y)

y+=8

})

doc.save("pedido.pdf")

}


function enviarEmail(){

let nome=document.getElementById("clienteNome").value
let telefone=document.getElementById("clienteTelefone").value
let cidade=document.getElementById("clienteCidade").value
let empresa=document.getElementById("clienteEmpresa").value

let total=document.getElementById("total").innerText

let mensagem="Pedido Crazy Fantasy B2B\n\n"

mensagem+="Cliente: "+nome+"\n"
mensagem+="Telefone: "+telefone+"\n"
mensagem+="Cidade: "+cidade+"\n"
mensagem+="Empresa: "+empresa+"\n\n"

mensagem+="Itens:\n"

Object.values(carrinho).forEach(p=>{
mensagem+=`${p.nome} - ${p.q} un\n`
})

mensagem+=`\nTotal: R$ ${total}`

window.location.href=`mailto:lojacrazyfantasy@hotmail.com?subject=Pedido B2B Crazy Fantasy&body=${encodeURIComponent(mensagem)}`

}


function enviarWhatsapp(){

let nome=document.getElementById("clienteNome").value
let telefone=document.getElementById("clienteTelefone").value
let cidade=document.getElementById("clienteCidade").value
let empresa=document.getElementById("clienteEmpresa").value

let total=document.getElementById("total").innerText

let mensagem="Pedido Crazy Fantasy B2B%0A%0A"

mensagem+=`Cliente: ${nome}%0A`
mensagem+=`Telefone: ${telefone}%0A`
mensagem+=`Cidade: ${cidade}%0A`
mensagem+=`Empresa: ${empresa}%0A%0A`

mensagem+="Itens:%0A"

Object.values(carrinho).forEach(p=>{
mensagem+=`${p.nome} - ${p.q} un%0A`
})

mensagem+=`%0ATotal: R$ ${total}`

window.open(`https://wa.me/55199928502089?text=${mensagem}`,"_blank")

}

</script>

</body>
</html>
