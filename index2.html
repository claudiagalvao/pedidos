<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Portal B2B Crazy Fantasy</title>

<style>

body{
font-family:Arial;
background:#f6f6f6;
margin:0;
padding:30px;
}

.banner img{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

.topo{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.info{
font-size:13px;
color:#666;
margin-top:6px;
}

.progress{
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
width:0%;
background:red;
transition:0.3s;
}

.categorias button{
margin:5px;
padding:8px 14px;
border-radius:20px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.busca input{
width:100%;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
margin-top:10px;
}

.container{
display:flex;
gap:20px;
}

.tabela{
flex:1;
background:white;
padding:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#c9b8e9;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

td a{
text-decoration:none;
font-weight:bold;
color:#333;
}

.carrinho{
width:260px;
background:white;
padding:20px;
border-radius:10px;
}

.btn{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.whats{background:#25D366;color:white;}
.email{background:#6c63ff;color:white;}
.pdf{background:#ff9800;color:white;}
.clear{background:#444;color:white;}

footer{
margin-top:40px;
background:#111;
color:white;
padding:20px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

footer a{
color:#ddd;
text-decoration:none;
margin-right:15px;
}

</style>

</head>

<body>

<div class="banner">
<img src="banner.jpg">
</div>

<div class="topo">

<h2>Portal B2B Crazy Fantasy</h2>

<div class="info">
Tabela exclusiva para lojistas • Frete FOB • Pagamento antecipado
</div>

<p>Pedido mínimo: R$200</p>

<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>

<p id="textoBarra">Faltam R$200</p>

<div class="categorias">

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('Kits')">Kits</button>
<button onclick="filtrar('Perucas')">Perucas</button>
<button onclick="filtrar('Barbas')">Barbas</button>
<button onclick="filtrar('Acessórios')">Acessórios</button>
<button onclick="filtrar('Maquiagem')">Maquiagem</button>

</div>

<div class="busca">
<input type="text" placeholder="Buscar produto..." onkeyup="buscar(this.value)">
</div>

</div>

<div class="container">

<div class="tabela">

<table>

<thead>
<tr>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

<div class="carrinho">

<h3>Pedido</h3>

Itens: <span id="itens">0</span>

<h2>R$ <span id="total">0</span></h2>

<button class="btn clear" onclick="limpar()">Limpar</button>

<button class="btn pdf" onclick="gerarPDF()">Gerar PDF</button>

<button class="btn whats" onclick="enviarWhats()">Enviar pedido WhatsApp</button>

<button class="btn email" onclick="enviarEmail()">Enviar pedido por Email</button>

</div>

</div>

<footer>

<div>

<strong>Crazy Fantasy</strong><br>
Fantasias e acessórios para eventos.

</div>

<div>

<a href="https://crazyfantasy.com.br" target="_blank">Visitar Loja</a>
<a href="https://instagram.com/crazyfantasy" target="_blank">Instagram</a>
<a href="https://wa.me/551999999999">WhatsApp</a>

</div>

</footer>

<script>

let produtos=[]
let carrinho={}

fetch("produtos.csv")
.then(r=>r.text())
.then(t=>{

let linhas=t.split("\n").slice(1)

linhas.forEach(l=>{

let c=l.split(",")

produtos.push({
nome:c[0],
preco:parseFloat(c[1]),
categoria:c[2],
link:c[3]
})

})

render(produtos)

})

function render(lista){

let html=""

lista.forEach((p,i)=>{

html+=`

<tr>

<td>

<a href="${p.link}" target="_blank">

${p.nome} 🔗

</a>

</td>

<td>R$ ${p.preco}</td>

<td>

<input type="number" min="0"

onchange="add(${i},this.value)">

</td>

<td id="t${i}">0</td>

</tr>

`

})

document.getElementById("lista").innerHTML=html

}

function filtrar(cat){

if(cat=="todos"){render(produtos);return}

render(produtos.filter(p=>p.categoria==cat))

}

function buscar(txt){

txt=txt.toLowerCase()

render(produtos.filter(p=>p.nome.toLowerCase().includes(txt)))

}

function add(i,qtd){

qtd=parseInt(qtd)||0

carrinho[i]=qtd

let totalProduto=qtd*produtos[i].preco

document.getElementById("t"+i).innerText=totalProduto.toFixed(2)

atualizar()

}

function atualizar(){

let total=0
let itens=0

for(let i in carrinho){

let q=carrinho[i]

if(q>0){

itens+=q
total+=q*produtos[i].preco

}

}

document.getElementById("itens").innerText=itens
document.getElementById("total").innerText=total.toFixed(2)

let progresso=(total/200)*100
if(progresso>100)progresso=100

let barra=document.getElementById("barra")
barra.style.width=progresso+"%"

if(progresso<40)barra.style.background="red"
else if(progresso<100)barra.style.background="orange"
else barra.style.background="green"

let falta=200-total

document.getElementById("textoBarra").innerText=

falta>0?"Faltam R$"+falta.toFixed(2):"Pedido mínimo atingido"

}

function limpar(){

location.reload()

}

function enviarWhats(){

let msg="Pedido Crazy Fantasy%0A%0A"

for(let i in carrinho){

if(carrinho[i]>0){

msg+=produtos[i].nome+" x"+carrinho[i]+"%0A"

}

}

msg+="%0ATotal: R$"+document.getElementById("total").innerText

window.open("https://wa.me/551999999999?text="+msg)

}

function enviarEmail(){

let msg="Pedido Crazy Fantasy\n\n"

for(let i in carrinho){

if(carrinho[i]>0){

msg+=produtos[i].nome+" x"+carrinho[i]+"\n"

}

}

msg+="\nTotal: R$"+document.getElementById("total").innerText

window.location="mailto:vendas@crazyfantasy.com.br?subject=Pedido&body="+msg

}

function gerarPDF(){

window.print()

}

</script>

</body>
</html>
