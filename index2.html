<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal B2B - Crazy Fantasy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
    <main class="catalogo">
        <div class="barraInfo">
            🚀 PORTAL B2B CRAZY FANTASY | TABELA DE PREÇOS ATUALIZADA
        </div>

        <div id="menuCategorias"></div>

        <div class="busca-container">
            <input type="text" id="busca" placeholder="🔎 O que você está procurando hoje?">
        </div>

        <div id="produtos" class="gridProdutos"></div>
    </main>

    <aside class="carrinho">
        <h2>🛒 Seu Pedido <span id="contadorItens">(0 itens)</span></h2>

        <div class="total-container">
            <p>Total do Pedido:</p>
            <div class="total">R$ <span id="total">0,00</span></div>
        </div>

        <div class="progressoContainer">
            <div id="msgMinimo">Faltam R$ 200,00 para o pedido mínimo</div>
            <div class="barraFundo">
                <div id="barra" class="barraProgresso"></div>
            </div>
        </div>

        <div class="economia-box">
            Economia B2B: <strong>R$ <span id="economia">0,00</span></strong>
        </div>

        <div id="listaPedido" class="listaPedido"></div>

        <div class="formPedido">
            <div class="linha2">
                <input type="text" id="responsavel" placeholder="Nome do Responsável">
                <input type="text" id="whatsapp" placeholder="WhatsApp (DDD)">
            </div>
            <input type="email" id="email" placeholder="E-mail para contato">
            <input type="text" id="endereco" placeholder="Endereço de Entrega">
            
            <div class="linha3">
                <input type="text" id="cidade" placeholder="Cidade">
                <input type="text" id="estado" placeholder="UF">
                <input type="text" id="cep" placeholder="CEP">
            </div>

            <div class="linha2">
                <select id="entrega">
                    <option value="">Forma de Envio</option>
                    <option value="Retirada">Retirada na Loja</option>
                    <option value="Correios">Correios (PAC/SEDEX)</option>
                    <option value="Transportadora">Transportadora</option>
                    <option value="Motoboy">Motoboy (Região)</option>
                </select>
                <select id="pagamento">
                    <option value="">Pagamento</option>
                    <option value="Pix">Pix (Desconto Adicional)</option>
                    <option value="Boleto">Boleto Bancário</option>
                    <option value="Cartão">Cartão de Crédito</option>
                </select>
            </div>
            <textarea id="observacoes" placeholder="Alguma observação sobre o pedido?"></textarea>
        </div>

        <div class="botoesPedido">
            <button class="btnWhats" onclick="enviarWhatsApp()">✅ FINALIZAR VIA WHATSAPP</button>
            <div class="linha2">
                <button class="btnPdf" onclick="gerarPDF()">📄 SALVAR PDF</button>
                <button class="btnLimpar" onclick="limparCarrinho()">🗑️ LIMPAR</button>
            </div>
        </div>
    </aside>
</div>
