<div class="carrinho">
    <h2>Pedido <span id="contadorItens">(0 itens)</span></h2>

    <div class="resumo-valores">
        <div class="total">Total B2B: R$ <span id="total">0</span></div>
        <div class="economiaPedido">💰 Economia: R$ <span id="economia">0</span></div>
    </div>

    <div class="checkout-progresso">
        <span id="msgMinimo" class="status-desconto">Adicione produtos para ganhar descontos!</span>
        <div class="barra-container">
            <div class="marcador m1" data-label="10%"></div>
            <div class="marcador m2" data-label="12%"></div>
            <div class="marcador m3" data-label="15%"></div>
            <div id="barra" class="barra-preenchimento" style="--percentual: 0%;"></div>
        </div>
    </div>

    <div id="listaPedido"></div>

    <h3>Dados do Cliente</h3>
    <input id="empresa" placeholder="Empresa">
    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">

    <button class="btnEmail" onclick="enviarEmail()">Enviar Pedido por Email</button>
    <button class="btnWhats" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
    <button class="btnPdf" onclick="gerarPDF()">Gerar PDF do Pedido</button>
    <button class="btnLimpar" onclick="limparCarrinho()">Limpar Pedido</button>
</div>
