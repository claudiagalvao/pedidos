<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy - Catálogo & Estoque Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .banner-box { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #6c2bd9; }
        .banner-box img { width: 100%; height: auto; display: block; }
        .form-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input[type="text"] { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-size: 16px; }
        .tabela-scroll { max-height: 500px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #6c2bd9; color: white; padding: 15px; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        .cat-header { background: #f8f0ff; color: #6c2bd9; font-weight: bold; text-align: left; padding: 15px; border-left: 5px solid #6c2bd9; font-size: 18px; }
        .img-produto { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; background: #eee; margin-right: 10px; vertical-align: middle; }
        .estoque-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .qtd-input { width: 60px; padding: 8px; text-align: center; border: 1px solid #ccc; border-radius: 5px; font-weight: bold; }
        .total-container { padding: 25px; background: #6c2bd9; color: white; border-radius: 12px; text-align: right; font-size: 26px; font-weight: bold; margin-top: 15px; }
        .btn-group { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; flex-wrap: wrap; }
        button { padding: 15px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-pdf { background: #e63946; color: white; }
        .btn-whatsapp { background: #25d366; color: white; }
        .btn-clear { background: #6c757d; color: white; }
        button:hover { transform: translateY(-2px); filter: brightness(0.9); }
    </style>
</head>
<body>

<div class="container">
    <div class="banner-box">
        <img src="banner.png" alt="Crazy Fantasy - Banner">
    </div>

    <div class="form-box">
        <div class="grid-inputs">
            <input type="text" id="cliente" placeholder="Nome do Cliente (Empresa)">
            <input type="text" id="vendedora" placeholder="Nome da Vendedora">
        </div>

        <div class="tabela-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Tam</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Qtd</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    </tbody>
            </table>
        </div>

        <div class="total-container">
            Total: R$ <span id="valor-total">0.00</span>
        </div>

        <div class="btn-group">
            <button class="btn-clear" onclick="window.location.reload()">Limpar Pedido</button>
            <button class="btn-pdf" onclick="gerarPDF()">Gerar Orçamento PDF</button>
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar WhatsApp</button>
        </div>
    </div>
</div>

<script>
    // Configurações da sua Empresa (MUDE AQUI)
    const empresaInfo = {
        nome: "CRAZY FANTASY",
        cnpj: "00.000.000/0001-00",
        ie: "123.456.789.111",
        endereco: "Rua Exemplo, 123 - Bairro - Cidade/UF",
        contato: "(00) 00000-0000"
    };

    const imgTeste = "https://cdn-icons-png.flaticon.com/512/8636/8636549.png";

    // Exemplo de produtos (Pode replicar para os 80 itens)
    const feminino = [
        ["Arlequina", 180, "M"], ["Arlequina de casaco", 180, "G"], ["Mulher Maravilha", 125, "M"], ["Barbie", 125, "M"], ["Barbie", 125, "G"]
    ];
    const masculino = [
        ["Astronauta", 199.90, "M"], ["Policial", 199.99, "G"]
    ];

    function render() {
        const corpo = document.getElementById("corpo-tabela");
        corpo.innerHTML += `<tr><td colspan="5" class="cat-header">👑 MODA FEMININA</td></tr>`;
        feminino.forEach(p => corpo.innerHTML += criarLinha(p));
        corpo.innerHTML += `<tr><td colspan="5" class="cat-header">👔 MODA MASCULINA</td></tr>`;
        masculino.forEach(p => corpo.innerHTML += criarLinha(p));
    }

    function criarLinha(p) {
        let preco = p[1] > 200 ? p[1] * 0.9 : p[1];
        return `
            <tr>
                <td style="text-align:left"><img src="${imgTeste}" class="img-produto"> ${p[0]}</td>
                <td><strong>${p[2]}</strong></td>
                <td>R$ ${preco.toFixed(2)}</td>
                <td><span class="estoque-badge">1 un.</span></td>
                <td><input type="number" class="qtd-input" min="0" max="1" onchange="calcular()" data-nome="${p[0]}" data-tam="${p[2]}" data-preco="${preco}"></td>
            </tr>`;
    }

    function calcular() {
        let total = 0;
        document.querySelectorAll(".qtd-input").forEach(i => total += (parseInt(i.value) || 0) * parseFloat(i.dataset.preco));
        document.getElementById("valor-total").innerText = total.toFixed(2);
    }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // 1. Cabeçalho da Empresa
        doc.setFont("helvetica", "bold");
        doc.setFontSize(20);
        doc.setTextColor(108, 43, 217); // Roxo Crazy Fantasy
        doc.text(empresaInfo.nome, 105, 20, { align: "center" });

        doc.setFontSize(10);
        doc.setTextColor(50, 50, 50);
        doc.setFont("helvetica", "normal");
        doc.text(`CNPJ: ${empresaInfo.cnpj} | IE: ${empresaInfo.ie}`, 105, 27, { align: "center" });
        doc.text(empresaInfo.endereco, 105, 32, { align: "center" });

        // 2. Dados do Cliente e Vendedora
        doc.setFont("helvetica", "bold");
        doc.text("DADOS DO PEDIDO", 15, 45);
        doc.setFont("helvetica", "normal");
        doc.text(`Cliente: ${document.getElementById("cliente").value || "Não informado"}`, 15, 52);
