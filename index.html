<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy - Pedido de Vendas</title>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        /* BANNER CORRIGIDO */
        .banner-container { 
            width: 100%; 
            height: 200px; 
            background: #6c2bd9; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .banner-container img { width: 100%; height: 100%; object-fit: cover; }

        .form-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input[type="text"] { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        
        .tabela-scroll { max-height: 500px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #6c2bd9; color: white; padding: 12px; position: sticky; top: 0; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        
        .cat-header { background: #f8f0ff; color: #6c2bd9; font-weight: bold; text-align: left; padding: 10px; border-left: 4px solid #6c2bd9; }
        .qtd-input { width: 50px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        
        .total-container { margin-top: 20px; padding: 20px; background: #6c2bd9; color: white; border-radius: 10px; text-align: right; font-size: 22px; font-weight: bold; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-pdf { background: #e63946; color: white; }
        .btn-whatsapp { background: #25d366; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="banner-container">

    </div>

    <div class="form-box">
        <div class="grid-inputs">
            <input type="text" id="cliente" placeholder="Nome do Cliente / Loja">

        </div>

        <div class="tabela-scroll">
            <table>

                        <th>Produto</th>
                        <th>Tam</th>
                        <th>Preço (c/ desc)</th>
                        <th>Qtd</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    </tbody>
            </table>
        </div>

        <div class="total-container">
            Total: R$ <span id="valor-total">0.00</span>
        </div>

        <div class="btn-group">
            <button class="btn-pdf" onclick="gerarPDF()">Baixar PDF</button>
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar para o Omie (WhatsApp)</button>
        </div>
    </div>
</div>
