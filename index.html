<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy - Sistema de Pedidos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #6c2bd9; --secondary: #e63946; --whatsapp: #25d366; --bg: #f0f2f5; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        .banner-container { 
            width: 100%; 
            background: var(--primary); 
            border-radius: 15px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            min-height: 150px;
        }
        .banner-container img { width: 100%; height: auto; display: block; }

        .form-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--primary); }
        h3 { color: var(--primary); border-bottom: 2px solid #f8f0ff; padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        .grid-faturamento { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input, select { padding: 12px; border-radius: 6px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-size: 14px; }
        
        .filtros-box { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; align-items: center; }
        .busca-input { flex: 1; min-width: 250px; border: 2px solid #eee; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; }
        .busca-input:focus { border-color: var(--primary); }
        
        .btn-filtro { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; background: #eee; font-weight: bold; transition: 0.2s; }
        .btn-filtro.active { background: var(--primary); color: white; }
        
        .tabela-scroll { max-height: 600px; overflow-y: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 600px; }
        th { background: var(--primary); color: white; padding: 15px; position: sticky; top: 0; z-index: 5; font-size: 14px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        
        .estoque-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .qtd-input { width: 70px; padding: 8px; text-align: center; border: 2px solid var(--primary); border-radius: 6px; font-weight: bold; }
        
        .total-box { padding: 25px; background: var(--primary); color: white; border-radius: 12px; text-align: right; margin-top: 15px; box-shadow: 0 4px 10px rgba(108, 43, 217, 0.3); }
        .total-box h2 { margin: 0; font-size: 28px; }

        .btn-group { display: flex; gap: 15px; margin-top: 20px; justify-content: flex-end; }
        button.acao { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-pdf { background: var(--secondary); color: white; }
        .btn-whatsapp { background: var(--whatsapp); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .desconto-tag { color: #e63946; font-size: 11px; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="banner-container">
        <img id="imgBanner" src="https://claudia-galvao.github.io/pedidos/banner.png" alt="CRAZY FANTASY" onerror="this.style.display='none'; this.parentElement.innerHTML='<h1 style=\'color:white; line-height:150px\'>CRAZY FANTASY</h1>'">
    </div>

    <div class="form-box">
        <h3>📋 Dados do Pedido</h3>
        <div class="grid-faturamento">
            <div style="grid-column: span 2;"><label>Cliente / Razão Social *</label><input type="text" id="cli_nome" placeholder="Nome Completo"></div>
            <div><label>Vendedora *</label><input type="text" id="vendedora" placeholder="Seu nome"></div>
            <div><label>Pagamento</label>
                <select id="pagamento">
                    <option>PIX (25% OFF p/ itens > R$200)</option>
                    <option>Boleto</option>
                    <option>Cartão</option>
                </select>
            </div>
        </div>
    </div>

    <div class="form-box">
        <h3>🛍️ Catálogo de Fantasias</h3>
        <div class="filtros-box">
            <input type="text" id="busca" class="busca-input" placeholder="🔍 Digite o nome da fantasia..." onkeyup="filtrar()">
            <button class="btn-filtro active" onclick="setCat('todos', this)">Todos</button>
            <button class="btn-filtro" onclick="setCat('feminino', this)">Feminino</button>
            <button class="btn-filtro" onclick="setCat('masculino', this)">Masculino</button>
        </div>
        <div class="tabela-scroll">
            <table>
                <thead>
                    <tr>
                        <th style="text-align:left; padding-left:20px;">Produto</th>
                        <th>Tam</th>
                        <th>Preço Unit.</th>
                        <th>Estoque</th>
                        <th>Sua Qtd</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
        
        <div class="total-box">
            <small>Valor Total do Pedido</small>
            <h2 id="valor-total">R$ 0,00</h2>
        </div>

        <div class="btn-group">
            <button class="acao btn-pdf" onclick="gerarPDF()">📄 Gerar Orçamento PDF</button>
            <button class="acao btn-whatsapp" onclick="enviarWhatsApp()">🟢 Enviar via WhatsApp</button>
        </div>
    </div>
</div>

<script>
    const empresa = { nome: "Galvão Artigos para Festas Ltda", cnpj: "09.626.903/0001-57", end: "Valinhos/SP" };
    let catAtiva = 'todos';

    // BANCO DE DADOS ATUALIZADO DAS FOTOS
    const produtos = [
        // MASCULINO
        {n: "Astronauta", p: 199.90, t: "M", est: 2, c: "masculino"},
        {n: "Astronauta", p: 199.90, t: "G", est: 2, c: "masculino"},
        {n: "Exército", p: 180.00, t: "M", est: 1, c: "masculino"},
        {n: "Policial", p: 199.99, t: "G", est: 2, c: "masculino"},
        {n: "Bombeiro", p: 229.90, t: "M", est: 1, c: "masculino"},
        {n: "Bombeiro", p: 229.90, t: "G", est: 2, c: "masculino"},
        {n: "Pirata", p: 180.00, t: "M", est: 2, c: "masculino"},
        {n: "Pirata", p: 180.00, t: "G", est: 1, c: "masculino"},
        {n: "Woody", p: 189.99, t: "M", est: 1, c: "masculino"},
        {n: "Woody", p: 189.99, t: "G", est: 1, c: "masculino"},
        {n: "Flash Longo", p: 319.99, t: "M", est: 1, c: "masculino"},
        {n: "Flash Longo", p: 319.99, t: "G", est: 1, c: "masculino"},
        {n: "Catnoir", p: 289.99, t: "M", est: 1, c: "masculino"},
        // FEMININO
        {n: "Mulher Maravilha", p: 125.00, t: "M", est: 2, c: "feminino"},
        {n: "Sininho", p: 99.90, t: "M", est: 1, c: "feminino"},
        {n: "Jessie", p: 129.90, t: "M", est: 1, c: "feminino"},
        {n: "Astronauta Fem.", p: 199.90, t: "G", est: 1, c: "feminino"},
        {n: "Medica", p: 180.00, t: "M", est: 2, c: "feminino"},
        {n: "Medica", p: 180.00, t: "G", est: 2, c: "feminino"},
        {n: "Bela Adormecida", p: 269.90, t: "M", est: 1, c: "feminino"},
        {n: "Bela Adormecida", p: 269.90, t: "G", est: 1, c: "feminino"},
        {n: "Alice", p: 120.00, t: "M", est: 1, c: "feminino"},
        {n: "Policial Fem.", p: 130.00, t: "M", est: 1, c: "feminino"}
    ];

    function render() {
        const corpo = document.getElementById("corpo-tabela");
        corpo.innerHTML = "";
        produtos.forEach((p, i) => {
            let pFinal = p.p > 200 ? p.p * 0.75 : p.p;
            let precoHtml = p.p > 200 ? 
                `<s>R$ ${p.p.toFixed(2)}</s><br><b>R$ ${pFinal.toFixed(2)}</b><span class="desconto-tag">Atacado -25%</span>` : 
                `<b>R$ ${p.p.toFixed(2)}</b>`;
            
            corpo.innerHTML += `
                <tr class="linha-p" data-nome="${p.n.toLowerCase()}" data-cat="${p.c}">
                    <td style="text-align:left; padding-left:20px;">${p.n}</td>
                    <td>${p.t}</td>
                    <td>${precoHtml}</td>
                    <td><span class="estoque-badge">${p.est} un</span></td>
                    <td><input type="number" class="qtd-input" min="0" max="${p.est}" value="0" onchange="atualizarTotal()"></td>
                </tr>`;
        });
    }

    function atualizarTotal() {
        let total = 0;
        document.querySelectorAll(".linha-p").forEach((linha, i) => {
            let q = parseInt(linha.querySelector(".qtd-input").value) || 0;
            let pOriginal = produtos[i].p;
            let pComDesconto = pOriginal > 200 ? pOriginal * 0.75 : pOriginal;
            total += q * pComDesconto;
        });
        document.getElementById("valor-total").innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    function filtrar() {
        let busca = document.getElementById("busca").value.toLowerCase();
        document.querySelectorAll(".linha-p").forEach(linha => {
            let visivel = linha.dataset.nome.includes(busca) && (catAtiva === 'todos' || linha.dataset.cat === catAtiva);
            linha.style.display = visivel ? "" : "none";
        });
    }

    function setCat(cat, btn) {
        catAtiva = cat;
        document.querySelectorAll(".btn-filtro").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        filtrar();
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const nomeCli = document.getElementById("cli_nome").value || "Cliente";
        
        // Cabeçalho Roxo
        doc.setFillColor(108, 43, 217);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("CRAZY FANTASY", 105, 20, {align: "center"});
        doc.setFontSize(10);
        doc.text("Orçamento de Venda", 105, 30, {align: "center"});

        let y = 55;
        doc.setTextColor(0);
        doc.setFontSize(12);
        doc.text(`Cliente: ${nomeCli.toUpperCase()}`, 15, y);
        doc.text(`Vendedora: ${document.getElementById("vendedora").value}`, 120, y);
        
        y += 15;
        doc.setFillColor(240, 240, 240);
        doc.rect(15, y, 180, 8, 'F');
        doc.setFont("helvetica", "bold");
        doc.text("Produto", 20, y+6); doc.text("Qtd", 140, y+6); doc.text("Total", 170, y+6);
        
        y += 15;
        doc.setFont("helvetica", "normal");
        document.querySelectorAll(".linha-p").forEach((linha, i) => {
            let q = linha.querySelector(".qtd-input").value;
            if(q > 0) {
                let pFinal = produtos[i].p > 200 ? produtos[i].p * 0.75 : produtos[i].p;
                doc.text(`${produtos[i].n} (${produtos[i].t})`, 20, y);
                doc.text(q, 142, y);
                doc.text(`R$ ${(q * pFinal).toFixed(2)}`, 170, y);
                y += 8;
            }
        });

        y += 10;
        doc.setFontSize(16); doc.setFont("helvetica", "bold");
        doc.text(`TOTAL: ${document.getElementById("valor-total").innerText}`, 195, y, {align: "right"});
        
        doc.save(`Orcamento_Crazy_${nomeCli}.pdf`);
    }

    function enviarWhatsApp() {
        let msg = `*CRAZY FANTASY - NOVO PEDIDO*\nCliente: ${document.getElementById("cli_nome").value}\n\n`;
        document.querySelectorAll(".linha-p").forEach((linha, i) => {
            let q = linha.querySelector(".qtd-input").value;
            if(q > 0) {
                let pFinal = produtos[i].p > 200 ? produtos[i].p * 0.75 : produtos[i].p;
                msg += `✅ ${produtos[i].n} (${produtos[i].t}) x${q} = R$ ${(q*pFinal).toFixed(2)}\n`;
            }
        });
        msg += `\n*TOTAL: ${document.getElementById("valor-total").innerText}*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    render();
</script>
</body>
</html>
