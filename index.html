<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedido B2B - Crazy Fantasy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b15;
color:white;
}

.banner{
width:100%;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:25px;
}

.form-box{
background:#141426;
padding:25px;
border-radius:12px;
box-shadow:0 0 20px #ff00c8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}

input{
padding:10px;
border-radius:6px;
border:none;
}

.tabela-container{
max-height:420px;
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th{
background:#000;
color:white;
padding:10px;
}

td{
padding:8px;
text-align:center;
}

tr:nth-child(even){
background:#f3f3f3;
}

.total{
font-size:24px;
text-align:right;
margin-top:20px;
color:#00ff9c;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:15px 20px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.whats{
background:#25d366;
color:white;
}

.pdf{
background:#ff0077;
color:white;
}

.limpar{
background:#222;
color:white;
}

</style>

</head>

<body>

<img src="banner.jpg" class="banner">

<div class="container">

<h1>Pedido para Parceiros & Revendedores</h1>

<div class="form-box">

<div class="grid">

<input id="empresa" placeholder="Empresa">

<input id="cnpj" placeholder="CNPJ">

<input id="contato" placeholder="Contato">

<input id="telefone" placeholder="Telefone">

<input id="email" placeholder="Email">

</div>

<div class="tabela-container">

<table id="tabela">

<tr>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Total</th>
</tr>

</table>

</div>

<div class="total">
Total: R$ <span id="total">0</span>
</div>

<div class="buttons">

<button class="limpar" onclick="limpar()">Limpar Pedido</button>

<button class="pdf" onclick="gerarPDF()">Gerar PDF</button>

<button class="whats" onclick="enviarWhats()">Enviar Pedido WhatsApp</button>

</div>

</div>
</div>

<script>

const produtos = [
["Arlequina",180],
["Barbie",125],
["Elsa",269.9],
["Rapunzel",269.9],
["Cinderela",269.9],
["Moana",269.9],
["Branca de Neve",269.9],
["Bela",269.9],
["Alice",120],
["Mirabel",239.99],
["Lady Bug",199.99],
["Minnie",239.99]
]

const tabela = document.getElementById("tabela")

produtos.forEach(p=>{

tabela.innerHTML += `
<tr>
<td>${p[0]}</td>
<td data-preco="${p[1]}">${p[1]}</td>
<td><input type="number" class="qtd" onchange="calcular()"></td>
<td class="subtotal">0</td>
</tr>
`

})

function calcular(){

let total=0

document.querySelectorAll("#tabela tr").forEach((linha,i)=>{

if(i==0)return

let preco=parseFloat(linha.children[1].dataset.preco)

if(preco>200){
preco*=0.9
}

let qtd=linha.querySelector(".qtd").value

let subtotal=preco*qtd

linha.querySelector(".subtotal").innerText=subtotal.toFixed(2)

total+=subtotal

})

document.getElementById("total").innerText=total.toFixed(2)

}

function limpar(){

document.querySelectorAll(".qtd").forEach(i=>i.value="")
document.querySelectorAll(".subtotal").forEach(i=>i.innerText="0")

document.getElementById("total").innerText="0"

}

function gerarPDF(){

const { jsPDF } = window.jspdf
let pdf = new jsPDF()

let empresa=document.getElementById("empresa").value
let contato=document.getElementById("contato").value

pdf.text("CRAZY FANTASY",20,20)
pdf.text("Pedido B2B",20,30)

pdf.text("Empresa: "+empresa,20,50)
pdf.text("Contato: "+contato,20,60)

let y=80

document.querySelectorAll("#tabela tr").forEach((linha,i)=>{

if(i==0)return

let produto=linha.children[0].innerText
let qtd=linha.querySelector(".qtd").value

if(qtd>0){

pdf.text(produto+" - "+qtd,20,y)
y+=10

}

})

pdf.text("Total: R$ "+document.getElementById("total").innerText,20,y+20)

pdf.save("pedido-crazyfantasy.pdf")

}

function enviarWhats(){

let texto="Pedido Crazy Fantasy:%0A"

document.querySelectorAll("#tabela tr").forEach((linha,i)=>{

if(i==0)return

let produto=linha.children[0].innerText
let qtd=linha.querySelector(".qtd").value

if(qtd>0){
texto+=produto+" - "+qtd+" unidades%0A"
}

})

texto+="Total R$ "+document.getElementById("total").innerText

window.open("https://wa.me/5511999999999?text="+texto)

}

</script>

</body>
</html>
