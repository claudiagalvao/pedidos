<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy - Sistema de Pedidos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #6c2bd9; --secondary: #e63946; --whatsapp: #25d366; --bg: #f0f2f5; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .banner-box { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .banner-box img { width: 100%; height: auto; display: block; }
        .form-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--primary); }
        h3 { color: var(--primary); border-bottom: 2px solid #f8f0ff; padding-bottom: 10px; margin-top: 0; }
        .grid-faturamento { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input, select { padding: 12px; border-radius: 6px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-size: 14px; }
        .filtros-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .busca-input { flex: 1; min-width: 250px; border: 2px solid #eee; padding: 12px; border-radius: 8px; font-size: 16px; }
        .btn-filtro { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; background: #eee; font-weight: bold; }
        .btn-filtro.active { background: var(--primary); color: white; }
        .tabela-scroll { max-height: 500px; overflow-y: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--primary); color: white; padding: 15px; position: sticky; top: 0; z-index: 5; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        .img-produto { width: 45px; height: 45px; border-radius: 5px; object-fit: cover; background: #f9f9f9; vertical-align: middle; margin-right: 10px; }
        .estoque-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .qtd-input { width: 65px; padding: 8px; text-align: center; border: 2px solid var(--primary); border-radius: 5px; font-weight: bold; }
        .total-container { padding: 25px; background: var(--primary); color: white; border-radius: 12px; text-align: right; font-size: 26px; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 10px rgba(108, 43, 217, 0.3); }
        .btn-group { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
        .btn-pdf { background: var(--secondary); color: white; }
        .btn-whatsapp { background: var(--whatsapp); color: white; }
        button { padding: 15px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { filter: brightness(0.9); transform: translateY(-2px); }
        .obrigatorio { border: 2px solid var(--secondary) !important; background: #fff5f5; }
    </style>
</head>
<body>

<div class="container">
    <div class="banner-box">
        <img src="https://claudia-galvao.github.io/pedidos/banner.png" alt="Crazy Fantasy Banner">
    </div>

    <div class="form-box">
        <h3>📄 Dados para Nota Fiscal / Entrega</h3>
        <div class="grid-faturamento">
            <div style="grid-column: span 2;">
                <label>Razão Social / Nome Completo *</label>
                <input type="text" id="cli_nome" placeholder="Nome do cliente">
            </div>
            <div>
                <label>CNPJ / CPF *</label>
                <input type="text" id="cli_doc" placeholder="000.000.000-00">
            </div>
            <div>
                <label>Vendedora *</label>
                <input type="text" id="vendedora" placeholder="Seu nome">
            </div>
            <div>
                <label>Forma de Entrega</label>
                <select id="entrega">
                    <option>Retirada na Loja</option>
                    <option>Correios (Sedex)</option>
                    <option>Correios (PAC)</option>
                    <option>Motoboy / Transportadora</option>
                </select>
            </div>
            <div>
                <label>Pagamento</label>
                <select id="pagamento">
                    <option>PIX</option>
                    <option>Boleto Bancário (Omie)</option>
                    <option>Cartão de Crédito</option>
                    <option>Dinheiro / Débito</option>
                </select>
            </div>
        </div>
    </div>

    <div class="form-box">
        <h3>🛍️ Catálogo de Fantasias</h3>
        <div class="filtros-box">
            <input type="text" id="busca" class="busca-input" placeholder="🔍 Digite o nome da fantasia..." onkeyup="filtrar()">
            <button class="btn-filtro active" onclick="setCat('todos', this)">Todos</button>
            <button class="btn-filtro" onclick="setCat('feminino', this)">Feminino</button>
            <button class="btn-filtro" onclick="setCat('masculino', this)">Masculino</button>
        </div>

        <div class="tabela-scroll">
            <table>
                <thead>
                    <tr>
                        <th style="text-align:left; padding-left:20px;">Produto</th>
                        <th>Tam</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Sua Qtd</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>

        <div class="total-container">
            Total: R$ <span id="valor-total">0.00</span>
        </div>

        <div class="btn-group">
            <button class="btn-pdf" onclick="gerarPDF()">📄 Gerar Orçamento PDF</button>
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">🟢 Enviar WhatsApp</button>
        </div>
    </div>
</div>

<script>

            corpo.innerHTML += `

                    <td style="text-align:left; padding-left:20px;"><img src="${imgPadrao}" class="img-produto">${
