<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy - B2B Faturamento</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #6c2bd9; --secondary: #e63946; --whatsapp: #25d366; --bg: #f0f2f5; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        .banner-container { width: 100%; background: var(--primary); border-radius: 15px; margin-bottom: 20px; overflow: hidden; min-height: 120px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .banner-container img { width: 100%; height: auto; display: block; }

        .form-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--primary); }
        h3 { color: var(--primary); border-bottom: 2px solid #f8f0ff; padding-bottom: 10px; margin-top: 0; font-size: 18px; }
        
        .grid-nf { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-size: 14px; outline: none; }
        
        .tabela-scroll { max-height: 450px; overflow-y: auto; border-radius: 8px; border: 1px solid #eee; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--primary); color: white; padding: 12px; position: sticky; top: 0; z-index: 5; font-size: 11px; text-transform: uppercase; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        
        .estoque-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 11px; }
        .qtd-input { width: 60px; padding: 8px; text-align: center; border: 2px solid var(--primary); border-radius: 6px; font-weight: bold; }
        
        .resumo-financeiro { display: flex; justify-content: space-between; align-items: center; padding: 25px; background: #1a1a1a; color: white; border-radius: 12px; margin-top: 15px; gap: 20px; }
        .bloco-valor { flex: 1; text-align: center; }
        .bloco-valor small { color: #888; text-transform: uppercase; font-size: 10px; display: block; margin-bottom: 5px; }
        .bloco-valor h2 { margin: 0; font-size: 24px; color: #fff; }
        .separador { width: 2px; height: 40px; background: #333; }

        .btn-group { display: flex; gap: 15px; margin-top: 20px; justify-content: flex-end; }
        .acao { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; transition: 0.3s; }
        .btn-pdf { background: var(--secondary); }
        .btn-whatsapp { background: var(--whatsapp); }
    </style>
</head>
<body>

<div class="container">
    <div class="banner-container">
        <img id="bannerImg" src="https://claudia-galvao.github.io/pedidos/banner.png" crossorigin="anonymous" onerror="this.src='https://via.placeholder.com/1100x200/6c2bd9/ffffff?text=CRAZY+FANTASY+B2B'">
    </div>

    <div class="form-box">
        <h3>📑 Dados para Faturamento (NF-e)</h3>
        <div class="grid-nf">
            <div style="grid-column: span 2;"><label>Razão Social / Nome Completo *</label><input type="text" id="nf_nome"></div>
            <div><label>CNPJ / CPF *</label><input type="text" id="nf_doc"></div>
            <div><label>E-mail para XML *</label><input type="email" id="nf_email"></div>
            <div style="grid-column: span 2;"><label>Endereço de Entrega *</label><input type="text" id="nf_end"></div>
            <div><label>Cidade/UF *</label><input type="text" id="nf_cidade"></div>
        </div>
    </div>

    <div class="form-box">
        <h3>🛍️ Itens do Pedido</h3>
        <div class="tabela-scroll">
            <table>
                <thead>
                    <tr>
                        <th style="text-align:left; padding-left:15px;">Produto</th>
                        <th>Tam</th>
                        <th>Vlr. Unit.</th>
                        <th>Vlr. B2B (-25%)</th>
                        <th>Estoque</th>
                        <th>Qtd</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
        
        <div class="resumo-financeiro">
            <div class="bloco-valor">
                <small>Subtotal (Sem Desconto)</small>
                <h2 id="subtotal-cheio">R$ 0,00</h2>
            </div>
            <div class="separador"></div>
            <div class="bloco-valor">
                <small>Total com Desconto B2B</small>
                <h2 id="valor-total" style="color: #4ade80;">R$ 0,00</h2>
            </div>
        </div>

        <div class="btn-group">
            <button class="acao btn-pdf" onclick="gerarPDF()">📄 Gerar PDF p/ NF</button>
            <button class="acao btn-whatsapp" onclick="enviarWhatsApp()">🟢 Enviar WhatsApp</button>
        </div>
    </div>
</div>

<script>
    const produtos = [
        {n: "Astronauta", p: 199.90, t: "M", est: 2},
        {n: "Astronauta", p: 199.90, t: "G", est: 2},
        {n: "Exército", p: 180.00, t: "M", est: 1},
        {n: "Policial", p: 199.99, t: "G", est: 2},
        {n: "Medico", p: 169.99, t: "M", est: 2},
        {n: "Medico", p: 169.99, t: "G", est: 2},
        {n: "Bombeiro", p: 229.90, t: "M", est: 1},
        {n: "Bombeiro", p: 229.90, t: "G", est: 2},
        {n: "Flash Longo", p: 319.99, t: "M", est: 1},
        {n: "Catnoir", p: 289.99, t: "M", est: 1},
        {n: "Mulher Maravilha", p: 125.00, t: "M", est: 2},
        {n: "Sininho", p: 99.90, t: "M", est: 1},
        {n: "Bela Adormecida", p: 269.90, t: "G", est: 1}
    ];

    function render() {
        const corpo = document.getElementById("corpo-tabela");
        corpo.innerHTML = "";
        produtos.forEach((p, i) => {
            let pB2B = p.p > 200 ? p.p * 0.75 : p.p;
            corpo.innerHTML += `
                <tr>
                    <td style="text-align:left; padding-left:15px;"><b>${p.n}</b></td>
                    <td>${p.t}</td>
                    <td>R$ ${p.p.toFixed(2)}</td>
                    <td style="color:var(--secondary)"><b>R$ ${pB2B.toFixed(2)}</b></td>
                    <td><span class="estoque-badge">${p.est} un</span></td>
                    <td><input type="number" class="qtd-input" data-index="${i}" min="0" max="${p.est}" value="0" onchange="travarQtd(this)"></td>
                </tr>`;
        });
    }

    function travarQtd(input) {
        let idx = input.dataset.index;
        if (parseInt(input.value) > produtos[idx].est) {
            alert("Estoque insuficiente!");
            input.value = produtos[idx].est;
        }
        atualizarTotal();
    }

    function atualizarTotal() {
        let cheio = 0; let b2b = 0;
        document.querySelectorAll(".qtd-input").forEach((input) => {
            let q = parseInt(input.value) || 0;
            let idx = input.dataset.index;
            cheio += q * produtos[idx].p;
            b2b += q * (produtos[idx].p > 200 ? produtos[idx].p * 0.75 : produtos[idx].p);
        });
        document.getElementById("subtotal-cheio").innerText = `R$ ${cheio.toFixed(2).replace('.', ',')}`;
        document.getElementById("valor-total").innerText = `R$ ${b2b.toFixed(2).replace('.', ',')}`;
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const nomeCli = document.getElementById("nf_nome").value || "Cliente";

        // Cabeçalho
        doc.setFillColor(108, 43, 217);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255);
        doc.setFontSize(20);
        doc.text("SOLICITAÇÃO DE NF - CRAZY FANTASY", 105, 25, {align: "center"});

        doc.setTextColor(0);
        doc.setFontSize(10);
        let y = 50;
        doc.setFont("helvetica", "bold");
        doc.text("DADOS DO CLIENTE:", 15, y);
        doc.setFont("helvetica", "normal");
        y += 6;
        doc.text(`RAZÃO: ${nomeCli.toUpperCase()}`, 15, y);
        doc.text(`CNPJ: ${document.getElementById("nf_doc").value}`, 120, y);
        y += 6;
        doc.text(`ENDEREÇO: ${document.getElementById("nf_end").value}`, 15, y);
        doc.text(`E-MAIL: ${document.getElementById("nf_email").value}`, 120, y);
        
        y += 15;
        doc.setFont("helvetica", "bold");
        doc.text("PRODUTO", 15, y); doc.text("QTD", 130, y); doc.text("VLR. B2B", 155, y); doc.text("TOTAL", 185, y);
        doc.line(15, y+2, 195, y+2);
        
        y += 10;
        doc.setFont("helvetica", "normal");
        document.querySelectorAll(".qtd-input").forEach((input) => {
            let q = parseInt(input.value);
            if(q > 0) {
                let idx = input.dataset.index;
                let pFinal = produtos[idx].p > 200 ? produtos[idx].p * 0.75 : produtos[idx].p;
                doc.text(`${produtos[idx].n} (${produtos[idx].t})`, 15, y);
                doc.text(q.toString(), 132, y);
                doc.text(pFinal.toFixed(2), 155, y);
                doc.text((q*pFinal).toFixed(2), 185, y);
                y += 7;
            }
        });

        doc.setFontSize(14); doc.setFont("helvetica", "bold");
        doc.text(`TOTAL PEDIDO: ${document.getElementById("valor-total").innerText}`, 195, y+15, {align: "right"});
        doc.save(`Pedido_NF_${nomeCli}.pdf`);
    }

    function enviarWhatsApp() {
        let msg = `*CRAZY FANTASY - SOLICITAÇÃO B2B*\n\n`;
        msg += `*Cliente:* ${document.getElementById("nf_nome").value}\n\n`;
        document.querySelectorAll(".qtd-input").forEach((input) => {
            let q = parseInt(input.value);
            if(q > 0) {
                let idx = input.dataset.index;
                let pFinal = produtos[idx].p > 200 ? produtos[idx].p * 0.75 : produtos[idx].p;
                msg += `✅ ${produtos[idx].n} (${produtos[idx].t}) x${q} = R$ ${(q*pFinal).toFixed(2)}\n`;
            }
        });
        msg += `\n*TOTAL: ${document.getElementById("valor-total").innerText}*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    render();
</script>
</body>
</html>
