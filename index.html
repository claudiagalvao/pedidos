<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Fantasy - Catálogo de Produtos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f6fb;
            color: #333;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .banner-box img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        .form-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .tabela-container {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #d8cff8;
            padding: 12px;
            position: sticky;
            top: 0;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:nth-child(even) {
            background: #fafafa;
        }

        .qtd {
            width: 60px;
        }

        .desconto {
            background: #fff2f4;
        }

        .preco-antigo {
            text-decoration: line-through;
            color: #999;
        }

        .preco-desc {
            color: #e60023;
            font-weight: bold;
        }

        .badge {
            background: #e60023;
            color: white;
            font-size: 11px;
            padding: 4px 6px;
            border-radius: 6px;
            margin-left: 6px;
        }

        .total {
            font-size: 22px;
            text-align: right;
            margin-top: 20px;
            font-weight: bold;
            color: #6c2bd9;
        }

        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .limpar { background: #444; color: white; }
        .pdf { background: #ff4d6d; color: white; }
        .enviar { background: #00c897; color: white; }

        @media(max-width:700px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <div class="banner-box">
        <img src="banner.png" alt="Banner Crazy Fantasy">
    </div>

    <div class="container">
        <h2 style="text-align:center;">Pedido para Parceiros & Revendedores</h2>

        <form action="https://formsubmit.co/lojacrazyfantasy@hotmail.com" method="POST">
            <input type="hidden" name="pedido" id="pedido_email">

            <div class="form-box">
                <div class="grid">
                    <input name="empresa" placeholder="Empresa" required>
                    <input name="cnpj" placeholder="CNPJ">
                    <input name="contato" placeholder="Nome do contato" required>
                    <input name="telefone" placeholder="Telefone">
                    <input name="email" placeholder="Email" required>
                </div>

                <div class="tabela-container">
                    <table id="tabela">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Preço</th>
                                <th>Preço c/ desconto</th>
                                <th>Qtd</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela">
                            </tbody>
                    </table>
                </div>

                <div class="total">
                    Total: R$ <span id="total">0.00</span>
                </div>

                <div class="buttons">
                    <button type="button" class="limpar" onclick="limpar()">Limpar</button>
                    <button type="button" class="pdf" onclick="gerarPDF()">Gerar PDF</button>
                    <button type="submit" class="enviar" onclick="prepararEmail()">Enviar Pedido</button>
                </div>
            </div>
        </form>
    </div>
